name: Daily Update

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Playwright
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Fetch today's wallpaper
        id: fetch
        run: |
          curl -s "https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&setmkt=zh-CN" > today.json
          echo "✅ 获取今日壁纸"

      - name: Install Playwright and fetch description
        id: fetch_desc
        run: |
          pip install playwright
          playwright install chromium
          
          python3 << 'EOF'
          import re
          import json
          import urllib.parse
          import time
          from playwright.sync_api import sync_playwright
          
          # 读取 today.json
          with open('today.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          
          if not data.get('images'):
              print("❌ 没有获取到图片数据")
              exit(1)
          
          img = data['images'][0]
          enddate = img.get('enddate', '')
          copyright_text = img.get('copyright', '')
          
          # ✅ 从 copyright 中提取主题（用于搜索）
          topic = copyright_text
          # 去掉 (© ...) 部分
          topic = re.sub(r'\s*\(©[^)]*\)\s*', '', topic)
          # 去掉末尾的逗号
          topic = re.sub(r'\s*,\s*$', '', topic)
          # URL 编码
          encoded_topic = urllib.parse.quote(topic)
          
          # ✅ 构建正确的详情页 URL
          date_param = f"{enddate}_1600"
          detail_url = f"https://cn.bing.com/search?q={encoded_topic}&form=BGALM&filters=HpDate%3a%22{date_param}%22"
          print(f"🔗 访问详情页: {detail_url}")
          
          desc = ''
          
          try:
              with sync_playwright() as p:
                  # 启动浏览器（无头模式）
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  
                  # 访问页面
                  page.goto(detail_url, timeout=30000)
                  
                  # 等待页面加载完成
                  page.wait_for_load_state('networkidle')
                  
                  # 等待 encyclopedia-description 出现
                  try:
                      page.wait_for_selector('.encyclopedia-description', timeout=10000)
                  except:
                      print("⏳ 等待超时，尝试其他选择器")
                  
                  # 方法1: 通过 aria-label 提取
                  try:
                      element = page.locator('.encyclopedia-description')
                      desc = element.get_attribute('aria-label')
                      if not desc:
                          desc = element.text_content()
                      print("✅ 方法1提取成功")
                  except Exception as e:
                      print(f"⚠️ 方法1失败: {e}")
                  
                  # 方法2: 使用 JavaScript 提取
                  if not desc or len(desc) < 20:
                      try:
                          desc = page.evaluate('''
                              () => {
                                  // 尝试多个选择器
                                  const selectors = [
                                      '.encyclopedia-description',
                                      '[class*="encyclopedia-description"]',
                                      '.b_wpt_bl .encyclopedia-content .encyclopedia-text div:last-child'
                                  ];
                                  for (let sel of selectors) {
                                      const el = document.querySelector(sel);
                                      if (el) {
                                          const content = el.getAttribute('aria-label') || el.textContent;
                                          if (content && content.length > 50) {
                                              return content;
                                          }
                                      }
                                  }
                                  return '';
                              }
                          ''')
                          if desc and len(desc) > 20:
                              print("✅ 方法2提取成功")
                      except Exception as e:
                          print(f"⚠️ 方法2失败: {e}")
                  
                  # 方法3: 等待更长时间后重试
                  if not desc or len(desc) < 20:
                      try:
                          time.sleep(2)
                          desc = page.evaluate('''
                              () => {
                                  const el = document.querySelector('.encyclopedia-description');
                                  if (el) {
                                      return el.getAttribute('aria-label') || el.textContent;
                                  }
                                  return '';
                              }
                          ''')
                          if desc and len(desc) > 20:
                              print("✅ 方法3提取成功")
                      except Exception as e:
                          print(f"⚠️ 方法3失败: {e}")
                  
                  browser.close()
          except Exception as e:
              print(f"❌ Playwright 执行失败: {e}")
              desc = ''
          
          # 如果所有方法都失败，使用 copyright 作为备用
          if not desc or len(desc) < 20:
              desc = copyright_text
              print("⚠️ 使用 copyright 作为备用描述")
          
          # ✅ 清理 title：去掉 (© ...)
          clean_title = re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_text)
          clean_title = re.sub(r'\s*,\s*$', '', clean_title)
          
          # ✅ 提取 subtitle：按逗号分割，第一部分作 title，其余作 subtitle
          subtitle = ''
          if '，' in clean_title:
              parts = clean_title.split('，')
              if len(parts) > 1:
                  clean_title = parts[0].strip()
                  subtitle = '，'.join(parts[1:]).strip()
          
          # ✅ 构建日期
          if len(enddate) == 8:
              date_str = f"{enddate[:4]}-{enddate[4:6]}-{enddate[6:8]}"
          else:
              date_str = enddate
          
          # ✅ 构建 bing_url
          urlbase = img.get('urlbase', '')
          bing_url = f"https://bing.com{urlbase}_UHD.jpg" if urlbase else ''
          
          # ✅ 保存结果到文件
          result = {
              "title": clean_title,
              "subtitle": subtitle,
              "description": desc,
              "date": date_str,
              "bing_url": bing_url
          }
          
          with open('today_clean.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          
          print(f"✅ 处理完成")
          print(f"📝 标题: {clean_title}")
          print(f"📝 副标题: {subtitle}")
          print(f"📝 描述长度: {len(desc)} 字符")
          print(f"📅 日期: {date_str}")
          EOF

      - name: Merge into year file
        run: |
          CURRENT_YEAR=$(date +'%Y')
          YEAR_FILE="zh.${CURRENT_YEAR}.json"
          
          if [ ! -f "docs/${YEAR_FILE}" ]; then
            echo '[]' > "docs/${YEAR_FILE}"
          fi
          
          cat "docs/${YEAR_FILE}" > year_old.json
          
          # 合并去重
          jq -s '.[0] + [.[1]] | unique_by(.date) | sort_by(.date) | reverse' \
            year_old.json today_clean.json > "docs/${YEAR_FILE}"
          
          echo "✅ 已更新 ${YEAR_FILE}，共 $(jq 'length' "docs/${YEAR_FILE}") 张壁纸"

      - name: Generate combined history.json
        run: |
          echo '[]' > docs/history.json
          for year in $(seq 2020 $(date +'%Y')); do
            if [ -f "docs/zh.${year}.json" ]; then
              jq -s '.[0] + .[1]' docs/history.json "docs/zh.${year}.json" > docs/history_temp.json
              mv docs/history_temp.json docs/history.json
            fi
          done
          jq 'unique_by(.date) | sort_by(.date) | reverse' docs/history.json > docs/history_temp.json
          mv docs/history_temp.json docs/history.json
          echo "✅ 合并所有年份，共 $(jq 'length' docs/history.json) 张壁纸"

      - name: Touch index.html to refresh cache
        run: |
          touch docs/index.html
          echo "✅ Cache refreshed at $(date)" >> docs/cache.log

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.MY_GIT_TOKEN }}
        run: |
          git config --local user.email "liuxiaolei5214@gmail.com"
          git config --local user.name "liuxiaolei5214"
          git config --local --unset http.https://github.com/.extraheader || true
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/liuxiaolei5214/bing-wallpaper.git
          git add docs/zh.*.json docs/history.json docs/index.html docs/cache.log
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
