name: Daily Update

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch today's wallpaper with encyclopedia
        id: fetch
        run: |
          # 获取今日壁纸数据（含详情页）
          curl -s "https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&setmkt=zh-CN" > today.json
          echo "✅ 获取今日壁纸"

      - name: Fetch encyclopedia description
        id: fetch_desc
        run: |
          # 从 today.json 提取 enddate 和 urlbase
          ENDDATE=$(jq -r '.images[0].enddate' today.json)
          URLBASE=$(jq -r '.images[0].urlbase' today.json)
          
          # 构建详情页 URL（使用 Bing 的详情页）
          DETAIL_URL="https://cn.bing.com/search?q=${URLBASE}&form=HPNNNN&filters=HpDate%3a%22${ENDDATE}_1600%22"
          
          # 获取详情页 HTML
          curl -s "${DETAIL_URL}" > detail.html
          
          # 提取 encyclopedia-description 内容（使用 sed 或 awk 提取）
          # 先提取 aria-label 属性中的内容
          DESCRIPTION=$(cat detail.html | grep -oP 'encyclopedia-description" aria-label="\K[^"]*' | head -1)
          
          # 如果提取失败，尝试另一种方式
          if [ -z "$DESCRIPTION" ]; then
            DESCRIPTION=$(cat detail.html | sed -n 's/.*encyclopedia-description[^>]*>\([^<]*\)<.*/\1/p' | head -1)
          fi
          
          # 如果还是空，使用 copyright 作为备用
          if [ -z "$DESCRIPTION" ]; then
            DESCRIPTION=$(jq -r '.images[0].copyright' today.json)
          fi
          
          # 将提取的描述保存到文件
          echo "$DESCRIPTION" > description.txt
          echo "✅ 提取描述: ${DESCRIPTION:0:50}..."

      - name: Convert to zh.2026.json format
        run: |
          CURRENT_YEAR=$(date +'%Y')
          YEAR_FILE="zh.${CURRENT_YEAR}.json"
          
          if [ ! -f "docs/${YEAR_FILE}" ]; then
            echo '[]' > "docs/${YEAR_FILE}"
          fi
          
          cat "docs/${YEAR_FILE}" > year_old.json
          
          # 读取提取的描述
          DESCRIPTION=$(cat description.txt)
          
          # 从 copyright 中提取纯净标题（去掉 © 和后面的内容）
          RAW_TITLE=$(jq -r '.images[0].copyright' today.json)
          # 去掉 (© ...) 部分
          CLEAN_TITLE=$(echo "$RAW_TITLE" | sed 's/\s*(©[^)]*)//g' | sed 's/\s*,\s*$//')
          # 提取 subtitle（如果有），这里用标题的第一部分
          SUBTITLE=""
          
          jq -n --arg title "$CLEAN_TITLE" \
                --arg subtitle "$SUBTITLE" \
                --arg desc "$DESCRIPTION" \
                --arg date "$(jq -r '.images[0].enddate' today.json | sed 's/\(....\)\(..\)\(..\)/\1-\2-\3/')" \
                --arg bing_url "https://bing.com$(jq -r '.images[0].urlbase' today.json)_UHD.jpg" \
            '{
              title: $title,
              subtitle: $subtitle,
              description: $desc,
              date: $date,
              bing_url: $bing_url
            }' > today_clean.json
          
          # 合并去重
          jq -s '.[0] + [.[1]] | unique_by(.date) | sort_by(.date) | reverse' \
            year_old.json today_clean.json > "docs/${YEAR_FILE}"
          
          echo "✅ 已更新 ${YEAR_FILE}"

      - name: Generate combined history.json
        run: |
          echo '[]' > docs/history.json
          for year in $(seq 2020 $(date +'%Y')); do
            if [ -f "docs/zh.${year}.json" ]; then
              jq -s '.[0] + .[1]' docs/history.json "docs/zh.${year}.json" > docs/history_temp.json
              mv docs/history_temp.json docs/history.json
            fi
          done
          jq 'unique_by(.date) | sort_by(.date) | reverse' docs/history.json > docs/history_temp.json
          mv docs/history_temp.json docs/history.json
          echo "✅ 合并所有年份，共 $(jq 'length' docs/history.json) 张壁纸"

      - name: Touch index.html to refresh cache
        run: |
          touch docs/index.html
          echo "✅ Cache refreshed at $(date)" >> docs/cache.log

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.MY_GIT_TOKEN }}
        run: |
          git config --local user.email "liuxiaolei5214@gmail.com"
          git config --local user.name "liuxiaolei5214"
          git config --local --unset http.https://github.com/.extraheader || true
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/liuxiaolei5214/bing-wallpaper.git
          git add docs/zh.*.json docs/history.json docs/index.html docs/cache.log
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
