name: Daily Update

on:
  schedule:
    # UTC时间+8小时
    - cron: '5 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Fetch and process today's wallpaper
        run: |
          python3 << 'EOF'
          import json
          import re
          import requests
          from datetime import datetime
          import os

          # ============================================================
          # 0. 调试信息 - 确认工作目录和文件
          # ============================================================
          print("=" * 60)
          print("🔍 环境调试信息")
          print("=" * 60)
          print(f"📂 当前工作目录: {os.getcwd()}")

          # 列出当前目录所有文件
          files = os.listdir('.')
          print(f"📄 目录下共有 {len(files)} 个文件/文件夹")
          for f in files:
              print(f"  - {f}")

          # 检查 docs 目录
          if os.path.exists('docs'):
              docs_files = os.listdir('docs')
              print(f"📄 docs 目录下共有 {len(docs_files)} 个文件/文件夹")
              for f in docs_files:
                  print(f"  - docs/{f}")

          # ============================================================
          # 1. 优先检查 today.json 是否存在且是当天数据
          # ============================================================
          print("\n" + "=" * 60)
          print("📋 步骤1: 检查 today.json 缓存")
          print("=" * 60)

          today_file = 'docs/today.json'
          use_cache = False
          cached_data = None
          date_str = None
          title = ''
          subtitle = ''
          description = ''
          bing_url = ''

          beijing_tz = timezone(timedelta(hours=8))
          now_beijing = datetime.now(beijing_tz)
          today_str = f"{now_beijing.year}-{str(now_beijing.month).zfill(2)}-{str(now_beijing.day).zfill(2)}"
          print(f"📅 今日日期 (北京时间): {today_str}")

          # 检查文件是否存在
          if os.path.exists(today_file):
              print(f"✅ today.json 文件存在 (docs/today.json)")
              try:
                  with open(today_file, 'r', encoding='utf-8') as f:
                      cached_data = json.load(f)
                  print(f"📄 today.json 内容类型: {type(cached_data)}")

                  # 打印缓存内容（截断）
                  cache_preview = json.dumps(cached_data, ensure_ascii=False)
                  if len(cache_preview) > 500:
                      cache_preview = cache_preview[:500] + "..."
                  print(f"📄 today.json 内容预览: {cache_preview}")

                  cache_date = cached_data.get('date')
                  print(f"📅 缓存中的日期: {cache_date}")

                  if cache_date == today_str:
                      use_cache = True
                      print(f"✅ 缓存命中！today.json 已是当天数据 ({today_str})，直接使用缓存")
                  else:
                      print(f"⚠️ 缓存日期 ({cache_date}) 不等于今日 ({today_str})，需要更新")

              except json.JSONDecodeError as e:
                  print(f"❌ today.json 格式错误: {e}")
              except Exception as e:
                  print(f"❌ 读取 today.json 失败: {e}")
          else:
              print(f"❌ today.json 文件不存在 (docs/today.json)，需要从 API 获取")

          # ============================================================
          # 2. 如果缓存有效，直接使用；否则从 API + 第三方提取
          # ============================================================
          print("\n" + "=" * 60)
          print("📋 步骤2: 获取数据")
          print("=" * 60)

          if use_cache and cached_data:
              # 直接使用缓存数据
              title = cached_data.get('title', '')
              subtitle = cached_data.get('subtitle', '')
              description = cached_data.get('description', '')
              bing_url = cached_data.get('bing_url', '')
              date_str = cached_data.get('date', today_str)
              print(f"📦 使用缓存数据 (docs/today.json)")
              print(f"  - title: {title}")
              print(f"  - subtitle: {subtitle}")
              print(f"  - date: {date_str}")
              print(f"  - description 长度: {len(description)} 字符")

          else:
              # ============================================================
              # 2a. 从 Bing API 获取数据
              # ============================================================
              print("📡 从 Bing API 获取今日数据...")
              api_url = "https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&setmkt=zh-CN"
              resp = requests.get(api_url, timeout=10)

              print(f"  - 状态码: {resp.status_code}")
              if resp.status_code != 200:
                  print(f"❌ API 请求失败: {resp.status_code}")
                  exit(1)

              api_data = resp.json()
              if not api_data.get('images'):
                  print("❌ API 返回数据为空")
                  exit(1)

              img = api_data['images'][0]
              enddate = img.get('enddate', '')
              copyright_text = img.get('copyright', '')
              urlbase = img.get('urlbase', '')

              print(f"  - enddate: {enddate}")
              print(f"  - copyright: {copyright_text}")
              print(f"  - urlbase: {urlbase}")

              if len(enddate) == 8:
                  date_str = f"{enddate[:4]}-{enddate[4:6]}-{enddate[6:8]}"
              else:
                  date_str = enddate

              print(f"📅 API 返回日期: {date_str}")

              # ============================================================
              # 2b. 从 bing.ee123.net 提取
              # ============================================================
              print("\n🔗 尝试从 bing.ee123.net 提取...")
              try:
                  detail_url = f"https://bing.ee123.net/detail/{enddate}"
                  print(f"  - URL: {detail_url}")
                  response = requests.get(detail_url, timeout=15, headers={
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  })
                  print(f"  - 状态码: {response.status_code}")

                  if response.status_code == 200:
                      html = response.text
                      print(f"  - HTML 长度: {len(html)} 字符")

                      title_match = re.search(r'<p[^>]*class="title"[^>]*>(.*?)</p>', html, re.DOTALL)
                      if title_match:
                          raw_title = title_match.group(1)
                          raw_title = raw_title.replace('&nbsp;', ' ')
                          raw_title = re.sub(r'\s+', ' ', raw_title).strip()
                          display_title = re.sub(r'\s*\(©[^)]*\)\s*', '', raw_title)

                          parts = display_title.split(' | ')
                          if len(parts) >= 2:
                              subtitle = parts[0].strip()
                              second_part = parts[1].strip()
                              second_part = re.sub(r'\s*-\s*', ' - ', second_part)
                              title = second_part
                          else:
                              title = re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_text)
                              title = re.sub(r'\s*,\s*$', '', title)
                              subtitle = title
                          print(f"✅ 从 ee123 提取到标题: '{title}'")
                          print(f"  - subtitle: {subtitle}")

                      sub_match = re.search(r'<span[^>]*class="sub"[^>]*>([\s\S]*?)</span>', html)
                      if sub_match:
                          sub_content = sub_match.group(1)
                          p_tags = re.findall(r'<p>(.*?)</p>', sub_content, re.DOTALL)
                          desc_parts = [p.strip() for p in p_tags if p.strip()]
                          if desc_parts:
                              clean_parts = []
                              for p in desc_parts:
                                  p = p.replace('&nbsp;', ' ')
                                  p = p.replace('&lt;', '<').replace('&gt;', '>').replace('&amp;', '&')
                                  p = p.replace('&quot;', '"').replace('&#39;', "'")
                                  if p.strip():
                                      clean_parts.append(p.strip())
                              if clean_parts:
                                  description = '\n'.join(clean_parts)
                                  print(f"✅ 从 ee123 提取成功，共 {len(clean_parts)} 段描述")
                                  print(f"  - 第一段预览: {clean_parts[0][:100]}...")

              except Exception as e:
                  print(f"⚠️ bing.ee123.net 提取失败: {e}")

              # ============================================================
              # 2c. 兜底：dailybing.cn
              # ============================================================
              if not description or not title:
                  print("\n🔗 尝试从 dailybing.cn 提取...")
                  try:
                      detail_url = f"https://www.dailybing.cn/view/zh-cn/{enddate}.html"
                      print(f"  - URL: {detail_url}")
                      response = requests.get(detail_url, timeout=15, headers={
                          'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                      })
                      print(f"  - 状态码: {response.status_code}")

                      if response.status_code == 200:
                          html = response.text
                          print(f"  - HTML 长度: {len(html)} 字符")

                          main_title = ''
                          img_match = re.search(r'<img[^>]*class="[^"]*view landscape[^"]*"[^>]*alt="([^"]+)"', html)
                          if not img_match:
                              img_match = re.search(r'<img[^>]*class="[^"]*view portrait[^"]*"[^>]*alt="([^"]+)"', html)
                          if img_match:
                              main_title = img_match.group(1).strip()
                              print(f"✅ 从 dailybing 提取到主标题: '{main_title}'")

                          sub_title = ''
                          copyright_match = re.search(r'<div[^>]*class="story-copyright"[^>]*>([^<]+)</div>', html)
                          if copyright_match:
                              copyright_raw = copyright_match.group(1).strip()
                              sub_title = re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_raw).strip()
                              print(f"✅ 从 dailybing 提取到副标题: '{sub_title}'")

                          if sub_title:
                              if ' - ' in sub_title:
                                  title = sub_title
                              else:
                                  title = f"{sub_title.strip()} - {date_str}"
                              print(f"✅ 构建完整标题: '{title}'")

                          if main_title:
                              subtitle = main_title

                          story_match = re.search(r'<div[^>]*class="story-content"[^>]*>([\s\S]*?)</div>', html)
                          if story_match:
                              story_content = story_match.group(1)
                              p_tags = re.findall(r'<div[^>]*class="story-paragraph"[^>]*>(.*?)</div>', story_content, re.DOTALL)
                              desc_parts = [p.strip() for p in p_tags if p.strip()]
                              if desc_parts:
                                  clean_parts = []
                                  for p in desc_parts:
                                      p = p.replace('&nbsp;', ' ')
                                      p = p.replace('&lt;', '<').replace('&gt;', '>').replace('&amp;', '&')
                                      p = p.replace('&quot;', '"').replace('&#39;', "'")
                                      p = re.sub(r'\s+', ' ', p).strip()
                                      if p:
                                          clean_parts.append(p)
                                  if clean_parts:
                                      description = '\n'.join(clean_parts)
                                      print(f"✅ 从 dailybing 提取成功，共 {len(clean_parts)} 段描述")

                  except Exception as e:
                      print(f"⚠️ dailybing.cn 提取失败: {e}")

              # ============================================================
              # 2d. 备用：copyright
              # ============================================================
              if not description:
                  description = copyright_text
                  print(f"⚠️ 使用 copyright 作为备用描述")
                  print(f"  - 内容: {description[:200]}...")

              if not title:
                  base_title = re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_text)
                  base_title = re.sub(r'\s*,\s*$', '', base_title)
                  title = f"{base_title.strip()} - {date_str}"
                  print(f"⚠️ 从 copyright 构建标题: '{title}'")

              if not subtitle:
                  subtitle = title.split(' - ')[0].strip() if ' - ' in title else title
                  print(f"⚠️ 从 title 构建 subtitle: '{subtitle}'")

              bing_url = f"https://bing.com{urlbase}_UHD.jpg" if urlbase else ''
              print(f"  - bing_url: {bing_url}")

              # ============================================================
              # 2e. 保存到 docs/today.json
              # ============================================================
              print("\n💾 保存到 docs/today.json")
              result = {
                  "title": title,
                  "subtitle": subtitle,
                  "description": description,
                  "date": date_str,
                  "bing_url": bing_url
              }

              # 确保 docs 目录存在
              os.makedirs('docs', exist_ok=True)

              with open('docs/today.json', 'w', encoding='utf-8') as f:
                  json.dump(result, f, ensure_ascii=False, indent=2)
              print("✅ 已更新 docs/today.json")

          # ============================================================
          # 3. 对比 today.json 和 zh.{year}.json 最新一条数据
          # ============================================================
          print("\n" + "=" * 60)
          print("📋 步骤3: 对比数据是否变化")
          print("=" * 60)

          year = date_str[:4]
          year_file = f"docs/zh.{year}.json"
          print(f"📄 对比文件: {year_file}")

          need_write = True
          existing = []

          # 读取 zh.{year}.json
          if os.path.exists(year_file):
              try:
                  with open(year_file, 'r', encoding='utf-8') as f:
                      existing = json.load(f)
                  print(f"📊 读取到 {len(existing)} 条现有数据")

                  # 获取最新一条数据
                  if existing:
                      latest = existing[0]
                      print(f"📄 最新一条数据:")
                      print(f"  - title: {latest.get('title')}")
                      print(f"  - date: {latest.get('date')}")

                      # 对比 today.json 和最新一条数据
                      if (latest.get('title') == title and
                          latest.get('subtitle') == subtitle and
                          latest.get('description') == description and
                          latest.get('bing_url') == bing_url):
                          need_write = False
                          print(f"✅ 数据未变化，跳过写入 {year_file}")
                      else:
                          print(f"⚠️ 数据有变化，需要更新")
                          print(f"  - title 变化: {latest.get('title')} != {title}")
                  else:
                      print(f"📄 文件为空，需要写入")
              except Exception as e:
                  print(f"⚠️ 读取失败: {e}")
                  existing = []
          else:
              print(f"📄 文件不存在，需要创建")

          # ============================================================
          # 4. 如果需要，写入 zh.{year}.json
          # ============================================================
          if need_write:
              print("\n" + "=" * 60)
              print("📋 步骤4: 写入年份文件")
              print("=" * 60)

              # 去重
              before_count = len(existing)
              existing = [item for item in existing if item.get('date') != date_str]
              removed_count = before_count - len(existing)
              if removed_count > 0:
                  print(f"🗑️ 删除了 {removed_count} 条日期为 {date_str} 的旧数据")

              new_data = {
                  "title": title,
                  "subtitle": subtitle,
                  "description": description,
                  "date": date_str,
                  "bing_url": bing_url
              }
              existing.append(new_data)
              existing.sort(key=lambda x: x.get('date', ''), reverse=True)

              os.makedirs('docs', exist_ok=True)

              with open(year_file, 'w', encoding='utf-8') as f:
                  json.dump(existing, f, ensure_ascii=False, indent=2)
              print(f"✅ 已更新 {year_file}，共 {len(existing)} 张壁纸")
          else:
              print(f"⏭️ 跳过写入 {year_file}（数据未变化）")

          # ============================================================
          # 5. 输出汇总
          # ============================================================
          print("\n" + "=" * 60)
          print("📊 执行完成 - 汇总信息")
          print("=" * 60)
          print(f"📝 title: '{title}'")
          print(f"📝 subtitle: '{subtitle}'")
          print(f"📝 描述长度: {len(description)} 字符")
          print(f"📅 日期: {date_str}")
          print(f"📦 数据来源: {'缓存 (docs/today.json)' if use_cache else 'API + 第三方提取'}")
          print(f"📄 年份文件: {'已更新' if need_write else '未变化，跳过'}")

          # 验证文件
          print("\n🔍 验证文件:")
          for f in ['docs/today.json', year_file]:
              if os.path.exists(f):
                  size = os.path.getsize(f)
                  print(f"  ✅ {f} 存在 ({size} 字节)")
              else:
                  print(f"  ❌ {f} 不存在")

          EOF

      - name: Generate combined history.json
        run: |
          echo '[]' > docs/history.json
          for year in $(seq 2020 $(date +'%Y')); do
            if [ -f "docs/zh.${year}.json" ]; then
              jq -s '.[0] + .[1]' docs/history.json "docs/zh.${year}.json" > docs/history_temp.json
              mv docs/history_temp.json docs/history.json
            fi
          done
          jq 'unique_by(.date) | sort_by(.date) | reverse' docs/history.json > docs/history_temp.json
          mv docs/history_temp.json docs/history.json
          echo "✅ 合并所有年份，共 $(jq 'length' docs/history.json) 张壁纸"

      - name: Generate index file
        run: |
          python3 << 'EOF'
          import json
          import os
          from datetime import datetime

          current_year = datetime.now().year
          index = {"years": []}

          for year in range(2020, current_year + 1):
              filename = f"docs/zh.{year}.json"
              if os.path.exists(filename):
                  try:
                      with open(filename, 'r', encoding='utf-8') as f:
                          data = json.load(f)
                          count = len(data) if isinstance(data, list) else 0
                          if count > 0:
                              index["years"].append({"year": str(year), "count": count})
                              print(f"✅ 发现 {year} 年数据，共 {count} 条")
                  except Exception as e:
                      print(f"⚠️ 读取 {year} 年数据失败: {e}")

          index["years"].sort(key=lambda x: int(x["year"]), reverse=True)

          with open('docs/index.json', 'w', encoding='utf-8') as f:
              json.dump(index, f, ensure_ascii=False, indent=2)

          print(f"✅ 生成索引文件，共 {len(index['years'])} 个年份")
          EOF

      - name: Touch index.html to refresh cache
        run: |
          touch docs/index.html
          export TZ='Asia/Shanghai'
          echo "✅ 缓存已刷新 (北京时间)  $(date '+%Y-%m-%d %H:%M:%S')" >> docs/cache.log

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "liuxiaolei5214@gmail.com"
          git config --local user.name "liuxiaolei5214"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/liuxiaolei5214/bing-wallpaper.git
          git add docs/zh.*.json docs/history.json docs/index.json docs/index.html docs/cache.log docs/today.json
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
