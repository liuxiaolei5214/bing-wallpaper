name: Daily Update

on:
  schedule:
    # 每天北京时间 0:30 运行（UTC 16:30）
    - cron: '30 16 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Touch index.html to refresh cache
        run: |
          touch docs/index.html
          echo "✅ Cache refreshed at $(date)" >> docs/cache.log

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.MY_GIT_TOKEN }}
        run: |
          git config --local user.email "liuxiaolei5214@gmail.com"
          git config --local user.name "liuxiaolei5214"
          git add docs/index.html docs/cache.log
          git commit -m "Daily refresh: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push https://x-access-token:${TOKEN}@github.com/liuxiaolei5214/bing-wallpaper.git main
