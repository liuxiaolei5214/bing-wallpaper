name: Daily Update

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch today's wallpaper
        id: fetch
        run: |
          curl -s "https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&setmkt=zh-CN" > today.json
          echo "✅ 获取今日壁纸"

      - name: Merge into history.json
        run: |
          # 读取现有的 history.json
          if [ -f docs/history.json ]; then
            cat docs/history.json > history_old.json
          else
            echo '[]' > history_old.json
          fi

          # 精简数据 + 4K 转换
          jq '.images | map({
              startdate: .startdate,
              enddate: .enddate,
              url: .url,
              urlbase: .urlbase,
              copyright: (.copyright | gsub("\\s*\\(©[^)]*\\)\\s*"; "") | gsub("\\s*,\\s*$"; ""))
          })' today.json > today_clean.json

          # 合并去重
          jq -s '.[0] + .[1] | unique_by(.startdate) | sort_by(.startdate) | reverse' \
            today_clean.json history_old.json > docs/history.json

          echo "✅ 合并完成，共 $(jq 'length' docs/history.json) 张壁纸"

      - name: Touch index.html to refresh cache
        run: |
          mkdir -p docs
          touch docs/index.html
          echo "✅ Cache refreshed at $(date)" >> docs/cache.log

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.MY_GIT_TOKEN }}
        run: |
          git config --local user.email "liuxiaolei5214@gmail.com"
          git config --local user.name "liuxiaolei5214"
          git config --local --unset http.https://github.com/.extraheader || true
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/liuxiaolei5214/bing-wallpaper.git
          git add docs/history.json docs/index.html docs/cache.log
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
