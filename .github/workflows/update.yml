name: Daily Update

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch today's wallpaper from Bing API
        id: fetch
        run: |
          curl -s "https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&setmkt=zh-CN" > today.json
          echo "✅ 获取今日壁纸"

      - name: Extract data from multiple sources
        id: extract
        run: |
          python3 << 'EOF'
          import json
          import re
          import requests
          from datetime import datetime
          import os

          # 读取 today.json
          with open('today.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          if not data.get('images'):
              print("❌ 没有获取到图片数据")
              exit(1)

          img = data['images'][0]
          enddate = img.get('enddate', '')
          copyright_text = img.get('copyright', '')
          urlbase = img.get('urlbase', '')

          # 构建日期
          if len(enddate) == 8:
              date_str = f"{enddate[:4]}-{enddate[4:6]}-{enddate[6:8]}"
          else:
              date_str = enddate

          description = ''
          source_used = ''
          display_title = ''
          subtitle = ''
          clean_title = ''

          # ---- 来源1: bing.ee123.net ----
          try:
              print("🔗 尝试从 bing.ee123.net 提取...")
              detail_url = f"https://bing.ee123.net/detail/{enddate}"
              response = requests.get(detail_url, timeout=15, headers={
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              })

              if response.status_code == 200:
                  html = response.text

                  title_match = re.search(r'<p[^>]*class="title"[^>]*>(.*?)</p>', html, re.DOTALL)
                  if title_match:
                      raw_title = title_match.group(1)
                      raw_title = raw_title.replace('&nbsp;', ' ')
                      raw_title = re.sub(r'\s+', ' ', raw_title).strip()
                      display_title = re.sub(r'\s*\(©[^)]*\)\s*', '', raw_title)
                      
                      parts = display_title.split(' | ')
                      if len(parts) >= 2:
                          subtitle = parts[0].strip()
                          second_part = parts[1].strip()
                          if ' - ' in second_part:
                              location_parts = second_part.split(' - ')
                              clean_title = location_parts[0].strip()
                          else:
                              clean_title = second_part
                      else:
                          clean_title = re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_text)
                          clean_title = re.sub(r'\s*,\s*$', '', clean_title)
                          subtitle = clean_title
                      
                      print(f"✅ 提取到展示名称: {display_title}")

                  sub_match = re.search(r'<span[^>]*class="sub"[^>]*>([\s\S]*?)</span>', html)
                  if sub_match:
                      sub_content = sub_match.group(1)
                      p_tags = re.findall(r'<p>(.*?)</p>', sub_content, re.DOTALL)
                      desc_parts = [p.strip() for p in p_tags if p.strip()]
                      if desc_parts:
                          clean_parts = []
                          for p in desc_parts:
                              p = p.replace('&nbsp;', ' ')
                              p = p.replace('&lt;', '<').replace('&gt;', '>').replace('&amp;', '&')
                              p = p.replace('&quot;', '"').replace('&#39;', "'")
                              if p.strip():
                                  clean_parts.append(p.strip())
                          if clean_parts:
                              description = '\n'.join(clean_parts)
                              source_used = 'bing.ee123.net'
                              print(f"✅ 从 bing.ee123.net 提取成功，共 {len(clean_parts)} 段描述")
          except Exception as e:
              print(f"⚠️ bing.ee123.net 提取失败: {e}")

          # ---- 来源2: dailybing.cn ----
          if not description or not display_title:
              try:
                  print("🔗 尝试从 dailybing.cn 提取...")
                  detail_url = f"https://www.dailybing.cn/view/zh-cn/{enddate}.html"
                  response = requests.get(detail_url, timeout=15, headers={
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  })

                  if response.status_code == 200:
                      html = response.text

                      if not subtitle:
                          alt_match = re.search(r'<img[^>]*alt="([^"]+)"', html)
                          if alt_match:
                              subtitle = alt_match.group(1).strip()
                              print(f"✅ 提取到副标题: {subtitle}")

                      story_match = re.search(r'<div[^>]*class="story-content"[^>]*>([\s\S]*?)</div>', html)
                      if story_match:
                          story_content = story_match.group(1)
                          p_tags = re.findall(r'<div[^>]*class="story-paragraph"[^>]*>(.*?)</div>', story_content, re.DOTALL)
                          desc_parts = [p.strip() for p in p_tags if p.strip()]
                          if desc_parts:
                              clean_parts = []
                              for p in desc_parts:
                                  p = p.replace('&nbsp;', ' ')
                                  p = p.replace('&lt;', '<').replace('&gt;', '>').replace('&amp;', '&')
                                  p = p.replace('&quot;', '"').replace('&#39;', "'")
                                  p = re.sub(r'\s+', ' ', p).strip()
                                  if p:
                                      clean_parts.append(p)
                              if clean_parts:
                                  description = '\n'.join(clean_parts)
                                  source_used = 'dailybing.cn'
                                  print(f"✅ 从 dailybing.cn 提取成功，共 {len(clean_parts)} 段描述")

                      if not clean_title:
                          clean_title = re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_text)
                          clean_title = re.sub(r'\s*,\s*$', '', clean_title)

              except Exception as e:
                  print(f"⚠️ dailybing.cn 提取失败: {e}")

          # ---- 备用 ----
          if not description:
              description = copyright_text
              source_used = 'copyright (fallback)'
              print(f"⚠️ 使用 copyright 作为备用描述")

          if not clean_title:
              clean_title = re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_text)
              clean_title = re.sub(r'\s*,\s*$', '', clean_title)

          if not subtitle:
              subtitle = clean_title

          bing_url = f"https://bing.com{urlbase}_UHD.jpg" if urlbase else ''

          result = {
              "title": clean_title,
              "subtitle": subtitle,
              "description": description,
              "date": date_str,
              "bing_url": bing_url
          }

          with open('today_clean.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"✅ 处理完成")
          print(f"📝 标题: {clean_title}")
          print(f"📝 副标题: {subtitle}")
          print(f"📝 描述长度: {len(description)} 字符")
          print(f"📅 日期: {date_str}")
          EOF

      - name: Direct write to year file
        run: |
          CURRENT_YEAR=$(date +'%Y')
          YEAR_FILE="zh.${CURRENT_YEAR}.json"
          
          python3 << 'EOF'
          import json
          
          year = "${{ env.CURRENT_YEAR }}"
          year_file = f"docs/zh.{year}.json"
          
          try:
              with open(year_file, 'r', encoding='utf-8') as f:
                  existing = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              existing = []
          
          with open('today_clean.json', 'r', encoding='utf-8') as f:
              new_data = json.load(f)
          
          new_date = new_data['date']
          
          existing = [item for item in existing if item.get('date') != new_date]
          existing.append(new_data)
          
          existing.sort(key=lambda x: x.get('date', ''), reverse=True)
          
          with open(year_file, 'w', encoding='utf-8') as f:
              json.dump(existing, f, ensure_ascii=False, indent=2)
          
          print(f"✅ 已更新 {year_file}，共 {len(existing)} 张壁纸")
          
          if existing:
              print("📄 更新后的第一条数据:")
              print(json.dumps(existing[0], ensure_ascii=False, indent=2))
          EOF

      - name: Generate combined history.json
        run: |
          echo '[]' > docs/history.json
          for year in $(seq 2020 $(date +'%Y')); do
            if [ -f "docs/zh.${year}.json" ]; then
              jq -s '.[0] + .[1]' docs/history.json "docs/zh.${year}.json" > docs/history_temp.json
              mv docs/history_temp.json docs/history.json
            fi
          done
          jq 'unique_by(.date) | sort_by(.date) | reverse' docs/history.json > docs/history_temp.json
          mv docs/history_temp.json docs/history.json
          echo "✅ 合并所有年份，共 $(jq 'length' docs/history.json) 张壁纸"

      - name: Touch index.html to refresh cache
        run: |
          touch docs/index.html
          echo "✅ Cache refreshed at $(date)" >> docs/cache.log

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy: Daily update'
          enable_jekyll: false
