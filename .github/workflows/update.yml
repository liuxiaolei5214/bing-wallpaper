name: Daily Update

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch today's wallpaper from Bing API
        id: fetch
        run: |
          curl -s "https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&setmkt=zh-CN" > today.json
          echo "✅ 获取今日壁纸"

      - name: Extract data from multiple sources
        id: extract
        run: |
          python3 << 'EOF'
          import json
          import re
          import requests
          from datetime import datetime

          # 读取 today.json
          with open('today.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          if not data.get('images'):
              print("❌ 没有获取到图片数据")
              exit(1)

          img = data['images'][0]
          enddate = img.get('enddate', '')
          copyright_text = img.get('copyright', '')
          urlbase = img.get('urlbase', '')
          title_from_api = img.get('title', '')

          # 构建日期
          if len(enddate) == 8:
              date_str = f"{enddate[:4]}-{enddate[4:6]}-{enddate[6:8]}"
          else:
              date_str = enddate

          description = ''
          subtitle = ''
          clean_title = ''
          search_query = ''

          # ---- 优先来源: 从必应首页提取（Puppeteer方式） ----
          print("🔗 优先: 从必应首页提取百科内容...")
          try:
              from bs4 import BeautifulSoup
              
              # 获取搜索词
              copyright_link = img.get('copyrightlink', '')
              if copyright_link and 'search?q=' in copyright_link:
                  match = re.search(r'search\?q=([^&]+)', copyright_link)
                  if match:
                      search_query = match.group(1)
                      search_query = re.sub(r'%([0-9A-F]{2})', lambda x: chr(int(x.group(1), 16)), search_query)
                      print(f"✅ 搜索词: {search_query}")
              
              # 构建日期参数
              date_param = f"{enddate}_1600"
              
              # 使用requests + BeautifulSoup，更轻量
              search_url = f"https://cn.bing.com/search?q={search_query}&form=hpcapt&filters=HpDate:%22{date_param}%22+mgzv3configlist:%22BingQA_Encyclopedia_Layout%22"
              
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36 Edg/148.0.0.0',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9',
                  'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
                  'Referer': 'https://cn.bing.com/'
              }
              
              # 先获取首页Cookie
              session = requests.Session()
              session.get('https://cn.bing.com/', headers=headers, timeout=10)
              
              # 搜索
              response = session.get(search_url, headers=headers, timeout=15)
              
              if response.status_code == 200:
                  soup = BeautifulSoup(response.text, 'html.parser')
                  
                  # 提取主标题（从API的title或从页面提取）
                  if not clean_title:
                      clean_title = title_from_api
                  
                  # 提取副标题（从copyright中提取）
                  if not subtitle:
                      subtitle = re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_text)
                      subtitle = re.sub(r'\s*,\s*$', '', subtitle)
                  
                  # 提取详细描述
                  expanded = soup.find('div', class_='encyclopedia-expanded')
                  if expanded:
                      # 获取innerHTML，保留段落结构
                      html_content = str(expanded)
                      
                      # 提取文本，保留段落分隔
                      import html as html_lib
                      
                      # 获取所有文本节点
                      text_parts = []
                      for child in expanded.children:
                          if child.name == 'br':
                              text_parts.append('\n')
                          elif child.string:
                              text_parts.append(child.string.strip())
                          elif child.name == 'a':
                              text_parts.append(child.get_text(strip=True))
                          else:
                              text = child.get_text(strip=True)
                              if text:
                                  text_parts.append(text)
                      
                      # 合并文本
                      full_text = ''.join(text_parts)
                      # 按换行分割成段落
                      paragraphs = [p.strip() for p in full_text.split('\n') if p.strip()]
                      
                      if paragraphs:
                          # 合并段落，段落间用\n分隔
                          description = '\n'.join(paragraphs)
                          print(f"✅ 从必应首页提取成功，共 {len(paragraphs)} 段")
                          
                          # 如果没有主标题，从描述中提取
                          if not clean_title:
                              first_sentence = paragraphs[0][:50]
                              clean_title = first_sentence.split('，')[0] if '，' in first_sentence else first_sentence[:20]
                  else:
                      # 尝试 encyclopedia-description
                      desc = soup.find('div', class_='encyclopedia-description')
                      if desc:
                          description = desc.get_text(strip=True)
                          print(f"✅ 从 encyclopedia-description 提取成功")
                          
          except Exception as e:
              print(f"⚠️ 必应首页提取失败: {e}")

          # ---- 来源2: bing.ee123.net ----
          if not description:
              try:
                  print("🔗 尝试从 bing.ee123.net 提取...")
                  detail_url = f"https://bing.ee123.net/detail/{enddate}"
                  response = requests.get(detail_url, timeout=15, headers={
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  })

                  if response.status_code == 200:
                      html = response.text

                      # 提取标题
                      if not clean_title:
                          title_match = re.search(r'<p[^>]*class="title"[^>]*>(.*?)</p>', html, re.DOTALL)
                          if title_match:
                              raw_title = title_match.group(1)
                              raw_title = raw_title.replace('&nbsp;', ' ')
                              raw_title = re.sub(r'\s+', ' ', raw_title).strip()
                              display_title = re.sub(r'\s*\(©[^)]*\)\s*', '', raw_title)
                              
                              parts = display_title.split(' | ')
                              if len(parts) >= 2:
                                  subtitle = parts[0].strip()
                                  second_part = parts[1].strip()
                                  if ' - ' in second_part:
                                      clean_title = second_part.split(' - ')[0].strip()
                                  else:
                                      clean_title = second_part
                              else:
                                  clean_title = re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_text)
                                  clean_title = re.sub(r'\s*,\s*$', '', clean_title)
                                  subtitle = clean_title
                              
                              print(f"✅ 提取到展示名称: {display_title}")

                      # 提取描述
                      sub_match = re.search(r'<span[^>]*class="sub"[^>]*>([\s\S]*?)</span>', html)
                      if sub_match:
                          sub_content = sub_match.group(1)
                          p_tags = re.findall(r'<p>(.*?)</p>', sub_content, re.DOTALL)
                          desc_parts = [p.strip() for p in p_tags if p.strip()]
                          if desc_parts:
                              clean_parts = []
                              for p in desc_parts:
                                  p = p.replace('&nbsp;', ' ')
                                  p = p.replace('&lt;', '<').replace('&gt;', '>').replace('&amp;', '&')
                                  p = p.replace('&quot;', '"').replace('&#39;', "'")
                                  if p.strip():
                                      clean_parts.append(p.strip())
                              if clean_parts:
                                  description = '\n'.join(clean_parts)
                                  print(f"✅ 从 bing.ee123.net 提取成功，共 {len(clean_parts)} 段描述")
              except Exception as e:
                  print(f"⚠️ bing.ee123.net 提取失败: {e}")

          # ---- 来源3: dailybing.cn ----
          if not description:
              try:
                  print("🔗 尝试从 dailybing.cn 提取...")
                  detail_url = f"https://www.dailybing.cn/view/zh-cn/{enddate}.html"
                  response = requests.get(detail_url, timeout=15, headers={
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  })

                  if response.status_code == 200:
                      html = response.text

                      if not subtitle:
                          alt_match = re.search(r'<img[^>]*alt="([^"]+)"', html)
                          if alt_match:
                              subtitle = alt_match.group(1).strip()
                              print(f"✅ 提取到副标题: {subtitle}")

                      story_match = re.search(r'<div[^>]*class="story-content"[^>]*>([\s\S]*?)</div>', html)
                      if story_match:
                          story_content = story_match.group(1)
                          p_tags = re.findall(r'<div[^>]*class="story-paragraph"[^>]*>(.*?)</div>', story_content, re.DOTALL)
                          desc_parts = [p.strip() for p in p_tags if p.strip()]
                          if desc_parts:
                              clean_parts = []
                              for p in desc_parts:
                                  p = p.replace('&nbsp;', ' ')
                                  p = p.replace('&lt;', '<').replace('&gt;', '>').replace('&amp;', '&')
                                  p = p.replace('&quot;', '"').replace('&#39;', "'")
                                  p = re.sub(r'\s+', ' ', p).strip()
                                  if p:
                                      clean_parts.append(p)
                              if clean_parts:
                                  description = '\n'.join(clean_parts)
                                  print(f"✅ 从 dailybing.cn 提取成功，共 {len(clean_parts)} 段描述")

              except Exception as e:
                  print(f"⚠️ dailybing.cn 提取失败: {e}")

          # ---- 备用 ----
          if not description:
              description = copyright_text
              print(f"⚠️ 使用 copyright 作为备用描述")

          if not clean_title:
              clean_title = title_from_api or re.sub(r'\s*\(©[^)]*\)\s*', '', copyright_text)
              clean_title = re.sub(r'\s*,\s*$', '', clean_title)

          if not subtitle:
              subtitle = clean_title

          bing_url = f"https://bing.com{urlbase}_UHD.jpg" if urlbase else ''

          result = {
              "title": clean_title,
              "subtitle": subtitle,
              "description": description,
              "date": date_str,
              "bing_url": bing_url
          }

          with open('today_clean.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"✅ 处理完成")
          print(f"📝 标题: {clean_title}")
          print(f"📝 副标题: {subtitle}")
          print(f"📝 描述长度: {len(description)} 字符")
          print(f"📅 日期: {date_str}")
          EOF

      - name: Direct write to year file
        run: |
          python3 << 'EOF'
          import json
          from datetime import datetime
          
          year = datetime.now().strftime('%Y')
          year_file = f"docs/zh.{year}.json"
          
          print(f"📄 目标文件: {year_file}")
          
          try:
              with open(year_file, 'r', encoding='utf-8') as f:
                  existing = json.load(f)
              print(f"📊 读取到 {len(existing)} 条数据")
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f"⚠️ 读取失败: {e}")
              existing = []
          
          with open('today_clean.json', 'r', encoding='utf-8') as f:
              new_data = json.load(f)
          
          new_date = new_data['date']
          print(f"📅 新数据日期: {new_date}")
          
          before_count = len(existing)
          existing = [item for item in existing if item.get('date') != new_date]
          removed_count = before_count - len(existing)
          print(f"🗑️ 删除了 {removed_count} 条日期为 {new_date} 的旧数据")
          
          existing.append(new_data)
          existing.sort(key=lambda x: x.get('date', ''), reverse=True)
          
          with open(year_file, 'w', encoding='utf-8') as f:
              json.dump(existing, f, ensure_ascii=False, indent=2)
          
          print(f"✅ 已更新 {year_file}，共 {len(existing)} 张壁纸")
          
          # 验证
          with open(year_file, 'r', encoding='utf-8') as f:
              verify_data = json.load(f)
          
          print(f"🔍 验证: 文件中现在有 {len(verify_data)} 条数据")
          if verify_data:
              print(f"📄 验证: 第一条数据日期为 {verify_data[0].get('date')}")
          EOF

      - name: Generate combined history.json
        run: |
          echo '[]' > docs/history.json
          for year in $(seq 2020 $(date +'%Y')); do
            if [ -f "docs/zh.${year}.json" ]; then
              jq -s '.[0] + .[1]' docs/history.json "docs/zh.${year}.json" > docs/history_temp.json
              mv docs/history_temp.json docs/history.json
            fi
          done
          jq 'unique_by(.date) | sort_by(.date) | reverse' docs/history.json > docs/history_temp.json
          mv docs/history_temp.json docs/history.json
          echo "✅ 合并所有年份，共 $(jq 'length' docs/history.json) 张壁纸"

      - name: Touch index.html to refresh cache
        run: |
          touch docs/index.html
          echo "✅ Cache refreshed at $(date)" >> docs/cache.log

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.MY_GIT_TOKEN }}
        run: |
          git config --local user.email "liuxiaolei5214@gmail.com"
          git config --local user.name "liuxiaolei5214"
          git config --local --unset http.https://github.com/.extraheader || true
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/liuxiaolei5214/bing-wallpaper.git
          git add docs/zh.*.json docs/history.json docs/index.html docs/cache.log
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
