<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>壁纸归档 · 光影回顾</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <style>
        /* ========== 全局重置 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        /* ========== 头部 ========== */
        header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2a2a;
        }

        header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header .nav-link {
            color: #4d96ff;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid #4d96ff;
            border-radius: 8px;
            transition: all 0.2s;
        }

        header .nav-link:hover {
            background: #4d96ff;
            color: #fff;
        }

        /* ========== 筛选器 ========== */
        .filters {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            background: #161616;
            padding: 16px 20px;
            border-radius: 12px;
        }

        .filters label {
            color: #aaa;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .filters select {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            min-width: 120px;
        }

        .filters select:focus {
            border-color: #4d96ff;
        }

        .filters .stats {
            margin-left: auto;
            color: #888;
            font-size: 0.9rem;
        }

        .filters .stats span {
            color: #e0e0e0;
            font-weight: 600;
        }

        /* ========== 网格 ========== */
        .grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            background: #111;
        }

        .card .info {
            padding: 10px 14px 14px;
        }

        .card .info .date {
            font-size: 0.8rem;
            color: #888;
            font-weight: 500;
        }

        .card .info .title {
            font-size: 0.85rem;
            color: #e0e0e0;
            font-weight: 600;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card .info .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .card .info .btn-group .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 14px;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .card .info .btn-group .download-btn svg {
            flex-shrink: 0;
        }

        .card .info .btn-group .btn-4k {
            background: #4d96ff;
        }
        .card .info .btn-group .btn-4k:hover {
            background: #3a7bd5;
        }

        .card .info .btn-group .btn-1080p {
            background: #6c757d;
        }
        .card .info .btn-group .btn-1080p:hover {
            background: #5a6268;
        }

        /* ========== 加载/空状态 ========== */
        .loading,
        .empty {
            text-align: center;
            padding: 60px 0;
            color: #666;
            font-size: 1rem;
            grid-column: 1 / -1;
        }

        .loading::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid #2a2a2a;
            border-top-color: #4d96ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: #1a1a1a;
            border-radius: 28px;
            max-width: 1200px;
            width: 100%;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            padding: 0;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open .modal-box {
            transform: scale(1);
        }

        /* ===== 图片容器 - 全屏显示 ===== */
        .modal-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0b0b0b;
            overflow: hidden;
            position: relative;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== 半透明遮罩层 - 在图片底部 ===== */
        .modal-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.92) 0%, 
                rgba(0, 0, 0, 0.6) 40%,
                rgba(0, 0, 0, 0.2) 70%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 1;
        }

        /* ===== 文字内容 - 浮在遮罩上方 ===== */
        .modal-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 32px 28px;
            z-index: 2;
            max-height: 60%;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .modal-content::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .modal-subtitle {
            display: none !important;
        }

        .modal-desc {
            font-size: 0.95rem;
            line-height: 1.8;
            opacity: 0.92;
            white-space: normal;
            word-break: break-word;
            color: #f0f0f0;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        .modal-desc p {
            text-indent: 2em;
            margin: 0;
            padding: 0;
            line-height: 1.8;
        }

        .modal-desc p + p {
            margin-top: 0;
        }

        /* ===== 关闭按钮 ===== */
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            line-height: 1;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        /* ========== 页脚 ========== */
        footer {
            max-width: 1400px;
            margin: 40px auto 0;
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid #1a1a1a;
            color: #555;
            font-size: 0.85rem;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            header h1 {
                font-size: 1.5rem;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filters .stats {
                margin-left: 0;
                text-align: center;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }
            .modal-box {
                max-width: 100%;
                max-height: 95vh;
                margin: 10px;
                border-radius: 20px;
            }
            .modal-image {
                aspect-ratio: 16 / 9;
            }
            .modal-content {
                padding: 14px 20px 18px;
                max-height: 55%;
            }
            .modal-title {
                font-size: 1.2rem;
            }
            .modal-desc {
                font-size: 0.85rem;
                line-height: 1.7;
            }
            .modal-image::after {
                height: 65%;
            }
            .modal-close {
                top: 10px;
                right: 10px;
                width: 36px;
                height: 36px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }
            .card .info {
                padding: 6px 10px 10px;
            }
            .card .info .date {
                font-size: 0.7rem;
            }
            .card .info .title {
                font-size: 0.75rem;
            }
            .card .info .btn-group .download-btn {
                font-size: 0.65rem;
                padding: 3px 10px;
            }
            .modal-box {
                border-radius: 16px;
                margin: 8px;
                max-height: 98vh;
            }
            .modal-image {
                aspect-ratio: 16 / 10;
            }
            .modal-content {
                padding: 10px 14px 14px;
                max-height: 50%;
            }
            .modal-title {
                font-size: 1rem;
            }
            .modal-desc {
                font-size: 0.8rem;
                line-height: 1.6;
            }
            .modal-image::after {
                height: 70%;
            }
            .modal-close {
                top: 8px;
                right: 8px;
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 头部 ===== -->
    <header>
        <h1>📚 壁纸归档</h1>
        <a href="/" class="nav-link">🏠 返回首页</a>
    </header>

    <!-- ===== 筛选器 ===== -->
    <div class="filters">
        <label for="yearFilter">📅 年份</label>
        <select id="yearFilter"></select>
        <label for="monthFilter">📆 月份</label>
        <select id="monthFilter">
            <option value="all">全部月份</option>
            <option value="01">1 月</option>
            <option value="02">2 月</option>
            <option value="03">3 月</option>
            <option value="04">4 月</option>
            <option value="05">5 月</option>
            <option value="06">6 月</option>
            <option value="07">7 月</option>
            <option value="08">8 月</option>
            <option value="09">9 月</option>
            <option value="10">10 月</option>
            <option value="11">11 月</option>
            <option value="12">12 月</option>
        </select>
        <div class="stats">共 <span id="totalCount">0</span> 张壁纸</div>
    </div>

    <!-- ===== 网格 ===== -->
    <div class="grid" id="grid">
        <div class="loading">加载壁纸数据中...</div>
    </div>

    <!-- ===== 页脚 ===== -->
    <footer>
        <p>数据来源：Bing 每日壁纸 · 永久归档 · 仅供个人欣赏</p>
    </footer>

    <!-- ===== 模态框 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-image">
                <img id="modalImg" src="" alt="壁纸大图" />
            </div>
            <div class="modal-content">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-subtitle" id="modalSubtitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- JavaScript -->
    <!-- ============================================================ -->
    <script>
        // ============ 工具函数 ============

        function getBeijingTime() {
            const now = new Date();
            const beijingStr = now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            return new Date(beijingStr);
        }

        function getCurrentYear() {
            return String(getBeijingTime().getFullYear());
        }

        function getCurrentMonth() {
            return String(getBeijingTime().getMonth() + 1).padStart(2, '0');
        }

        function getYearFromDate(dateStr) {
            if (dateStr && dateStr.length >= 4) {
                return dateStr.substring(0, 4);
            }
            return '未知';
        }

        function getMonthFromDate(dateStr) {
            if (dateStr && dateStr.length >= 7) {
                return dateStr.substring(5, 7);
            }
            return '未知';
        }

        function get4kUrl(url) {
            if (!url) return '';
            if (url.includes('_UHD.jpg')) {
                return url;
            }
            return url.replace(/_1920x1080\.jpg/g, '_UHD.jpg');
        }

        function get1080pUrl(url) {
            if (!url) return '';
            let result = url;
            result = result.replace(/_UHD\.jpg/g, '_1920x1080.jpg');
            result = result.replace(/_UHD\.jpg\?/g, '_1920x1080.jpg?');
            result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
            if (result === url) {
                result = url.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
            }
            return result;
        }

        const DOWNLOAD_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

        // ============ 数据加载 ============

        async function loadYearData(year) {
            try {
                const resp = await fetch(`zh.${year}.json`);
                if (!resp.ok) {
                    console.warn(`⚠️ ${year} 年文件不存在 (HTTP ${resp.status})`);
                    return [];
                }
                const data = await resp.json();
                return Array.isArray(data) ? data : [];
            } catch (e) {
                console.warn(`加载 ${year} 数据失败:`, e.message);
                return [];
            }
        }

        async function loadAllData() {
            const currentYear = parseInt(getCurrentYear());
            
            console.log(`📅 尝试加载 ${currentYear} 年数据...`);
            
            const data = await loadYearData(currentYear);
            
            if (data.length === 0) {
                console.warn(`⚠️ ${currentYear} 年暂无数据，尝试加载所有年份...`);
                const allData = [];
                for (let y = 2020; y <= currentYear; y++) {
                    const yearData = await loadYearData(y);
                    if (yearData.length > 0) {
                        allData.push(...yearData);
                    }
                }
                if (allData.length > 0) {
                    console.log(`✅ 加载所有年份成功，共 ${allData.length} 条`);
                    allData.sort((a, b) => {
                        const da = a.date || '';
                        const db = b.date || '';
                        return db.localeCompare(da);
                    });
                    return allData;
                }
                return [];
            }
            
            console.log(`✅ 加载 ${currentYear} 年成功，共 ${data.length} 条`);
            
            data.sort((a, b) => {
                const da = a.date || '';
                const db = b.date || '';
                return db.localeCompare(da);
            });

            return data;
        }

        // ============ 筛选逻辑 ============

        function filterImages(images, year, month) {
            if (!images || images.length === 0) return [];
            return images.filter(img => {
                const y = getYearFromDate(img.date);
                const m = getMonthFromDate(img.date);
                if (year !== 'all' && y !== year) return false;
                if (month !== 'all' && m !== month) return false;
                return true;
            });
        }

        function populateFilters(images) {
            const yearSet = new Set();
            images.forEach(img => {
                const y = getYearFromDate(img.date);
                if (y !== '未知') yearSet.add(y);
            });

            const years = Array.from(yearSet).sort().reverse();
            const yearSelect = document.getElementById('yearFilter');

            yearSelect.innerHTML = '<option value="all">全部年份</option>';
            years.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y + ' 年';
                yearSelect.appendChild(opt);
            });

            const currentYear = getCurrentYear();
            if (years.includes(currentYear)) {
                yearSelect.value = currentYear;
            }
        }

        // ============ 模态框 ==========

        function openModal(item) {
            console.log('📖 打开弹窗:', item);

            const overlay = document.getElementById('modalOverlay');
            if (!overlay) {
                console.error('❌ 模态框元素不存在');
                return;
            }

            const rawTitle = item.title || '壁纸';
            const rawSubtitle = item.subtitle || '';
            const dateStr = item.date || '';
            const mainTitle = rawSubtitle || rawTitle;

            let modalTitle = mainTitle;
            if (dateStr) {
                modalTitle = `${modalTitle} - ${dateStr}`;
            }
            document.getElementById('modalTitle').textContent = modalTitle;

            const img = document.getElementById('modalImg');
            const imgUrl = get1080pUrl(item.bing_url || '');
            img.src = imgUrl;
            img.alt = mainTitle;

            document.getElementById('modalSubtitle').style.display = 'none';

            let desc = item.description || '暂无详细介绍';
            desc = desc.replace(/\r\n/g, '\n');
            desc = desc.replace(/\r/g, '\n');
            desc = desc.replace(/<br\s*\/?>/gi, '\n');

            const paragraphs = desc.split('\n')
                .map(p => p.trim())
                .filter(p => p !== '');

            const descHtml = paragraphs.map(p => `<p>${p}</p>`).join('');
            document.getElementById('modalDesc').innerHTML = descHtml;

            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            if (overlay) {
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            }
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // ============ 渲染网格 ============

        function renderGrid(images) {
            const grid = document.getElementById('grid');
            const totalCount = document.getElementById('totalCount');

            if (!images || images.length === 0) {
                grid.innerHTML = '<div class="empty">😅 没有找到匹配的壁纸</div>';
                totalCount.textContent = '0';
                return;
            }

            totalCount.textContent = images.length;

            grid.innerHTML = images.map(img => {
                const url = img.bing_url || '';
                const dateStr = img.date || '';

                const rawTitle = img.title || 'Bing 壁纸';
                const rawSubtitle = img.subtitle || '';
                const mainTitle = rawSubtitle || rawTitle;
                const subTitle = (rawSubtitle && rawTitle !== rawSubtitle) ? rawTitle : '';

                let displayTitle = mainTitle;
                if (subTitle) {
                    displayTitle = `${mainTitle} | ${subTitle}`;
                }
                if (dateStr) {
                    displayTitle = `${displayTitle} - ${dateStr}`;
                }

                const displayUrl = get1080pUrl(url);
                const hd4kUrl = get4kUrl(url);
                const hd1080Url = get1080pUrl(url);

                const escapedData = encodeURIComponent(JSON.stringify(img));

                return `
                    <div class="card" data-item="${escapedData}">
                        <img src="${displayUrl}" alt="${mainTitle}" loading="lazy" onerror="this.style.display='none'" />
                        <div class="info">
                            <div class="date">📅 ${dateStr}</div>
                            <div class="title">${displayTitle}</div>
                            <div class="btn-group">
                                <a href="${hd4kUrl}" class="download-btn btn-4k" target="_blank" onclick="event.stopPropagation();">
                                    ${DOWNLOAD_SVG} 4K
                                </a>
                                <a href="${hd1080Url}" class="download-btn btn-1080p" target="_blank" onclick="event.stopPropagation();">
                                    ${DOWNLOAD_SVG} 1080P
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.card').forEach(el => {
                el.addEventListener('click', function(e) {
                    if (e.target.closest('a')) return;
                    const encodedData = this.dataset.item;
                    if (encodedData) {
                        try {
                            const jsonStr = decodeURIComponent(encodedData);
                            const item = JSON.parse(jsonStr);
                            openModal(item);
                        } catch (e) {
                            console.warn('解析数据失败:', e);
                        }
                    }
                });
            });
        }

        // ============ 主函数 ============

        async function main() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="loading">加载壁纸数据中...</div>';

            try {
                let allImages = await loadAllData();

                if (!allImages || allImages.length === 0) {
                    grid.innerHTML = '<div class="empty">😅 暂无壁纸数据，等待自动归档...</div>';
                    return;
                }

                console.log(`📊 总共加载 ${allImages.length} 张壁纸`);

                populateFilters(allImages);

                const yearFilter = document.getElementById('yearFilter');
                const monthFilter = document.getElementById('monthFilter');

                const currentMonth = getCurrentMonth();
                monthFilter.value = currentMonth;

                const filtered = filterImages(allImages, yearFilter.value, monthFilter.value);
                renderGrid(filtered);

                yearFilter.addEventListener('change', () => {
                    const filtered = filterImages(allImages, yearFilter.value, monthFilter.value);
                    renderGrid(filtered);
                });

                monthFilter.addEventListener('change', () => {
                    const filtered = filterImages(allImages, yearFilter.value, monthFilter.value);
                    renderGrid(filtered);
                });

            } catch (error) {
                console.error('加载失败:', error);
                grid.innerHTML = `<div class="empty">❌ 加载失败：${error.message || '未知错误'}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', main);
    </script>

</body>
</html>
