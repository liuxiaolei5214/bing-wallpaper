<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>壁纸归档 · 光影回顾</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <style>
        /* ========== 全局重置 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        /* ========== 头部 ========== */
        header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2a2a;
        }

        header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header .nav-link {
            color: #4d96ff;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid #4d96ff;
            border-radius: 8px;
            transition: all 0.2s;
        }

        header .nav-link:hover {
            background: #4d96ff;
            color: #fff;
        }

        /* ========== 筛选器 ========== */
        .filters {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            background: #161616;
            padding: 16px 20px;
            border-radius: 12px;
        }

        .filters .stats {
            margin-left: auto;
            color: #888;
            font-size: 0.9rem;
        }

        .filters .stats span {
            color: #e0e0e0;
            font-weight: 600;
        }

        /* ===== 三联控件样式 ===== */
        .date-filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            flex: 1;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-label {
            font-size: 14px;
            color: #aaa;
            font-weight: 500;
            white-space: nowrap;
        }
        .filter-input {
            width: 130px;
            height: 34px;
            padding: 0 10px;
            border: 2px solid #4d96ff;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            background: #2a2a2a;
            color: #e0e0e0;
            transition: border-color 0.3s;
        }
        .filter-input:hover { border-color: #6aafff; }
        .filter-input:focus { border-color: #7abfff; box-shadow: 0 0 0 3px rgba(77,150,255,0.2); }
        .filter-input::placeholder { color: #666; }

        .btn-filter-reset {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            background: #6c757d;
            color: #fff;
        }
        .btn-filter-reset:hover {
            background: #5a6268;
            transform: translateY(-1px);
        }

        /* 遮罩弹窗 */
        .date-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 999;
        }
        .date-mask.show { display: block; }
        .date-popup {
            position: absolute;
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 380px;
            overflow: hidden;
            animation: popupFade 0.2s ease;
            border: 1px solid #2a2a2a;
        }
        @keyframes popupFade {
            from { opacity: 0; transform: translateY(-8px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .popup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #2a2a2a;
            background: #111;
        }
        .header-arrow-group {
            display: flex;
            gap: 6px;
        }
        .header-arrow {
            font-size: 18px;
            color: #888;
            cursor: pointer;
            user-select: none;
            padding: 0 4px;
            transition: color 0.2s;
            font-weight: 300;
        }
        .header-arrow:hover { color: #e0e0e0; }
        .header-title {
            font-size: 20px;
            color: #e0e0e0;
            font-weight: 600;
        }
        .grid-wrap {
            padding: 16px 18px 18px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .grid-cell {
            text-align: center;
            padding: 8px 0;
            font-size: 15px;
            color: #aaa;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .grid-cell:hover { background: #2a2a2a; color: #fff; }
        .grid-cell.active {
            background: #4d96ff;
            color: #fff;
        }
        .calendar-wrap {
            padding: 10px 16px 16px;
        }
        .calendar-week-title {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 6px;
        }
        .week-cell {
            text-align: center;
            font-size: 12px;
            color: #666;
            padding: 4px 0;
            font-weight: 500;
        }
        .calendar-day-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .day-cell {
            text-align: center;
            padding: 6px 0;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            color: #e0e0e0;
            transition: all 0.2s;
        }
        .day-cell:hover:not(.gray) { background: #2a2a2a; }
        .day-cell.gray { color: #444; cursor: default; }
        .day-cell.active { background: #4d96ff; color: #fff; }

        /* ========== 网格 ========== */
        .grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            background: #111;
        }

        .card .info {
            padding: 10px 14px 14px;
        }

        .card .info .date {
            font-size: 0.8rem;
            color: #888;
            font-weight: 500;
        }

        .card .info .title {
            font-size: 0.85rem;
            color: #e0e0e0;
            font-weight: 600;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card .info .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .card .info .btn-group .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 14px;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .card .info .btn-group .download-btn svg {
            flex-shrink: 0;
        }

        .card .info .btn-group .btn-4k {
            background: #4d96ff;
        }
        .card .info .btn-group .btn-4k:hover {
            background: #3a7bd5;
        }

        .card .info .btn-group .btn-1080p {
            background: #6c757d;
        }
        .card .info .btn-group .btn-1080p:hover {
            background: #5a6268;
        }

        /* ========== 加载/空状态 ========== */
        .loading,
        .empty {
            text-align: center;
            padding: 60px 0;
            color: #666;
            font-size: 1rem;
            grid-column: 1 / -1;
        }

        .loading::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid #2a2a2a;
            border-top-color: #4d96ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: #1a1a1a;
            border-radius: 28px;
            max-width: 1600px;
            width: 100%;
            max-height: 95vh;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            padding: 0;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open .modal-box {
            transform: scale(1);
        }

        .modal-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0b0b0b;
            overflow: hidden;
            position: relative;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .modal-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.92) 0%, 
                rgba(0, 0, 0, 0.6) 40%,
                rgba(0, 0, 0, 0.2) 70%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 1;
        }

        .modal-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 32px 28px;
            z-index: 2;
            max-height: 60%;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .modal-content::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .modal-subtitle {
            display: none !important;
        }

        .modal-desc {
            font-size: 0.95rem;
            line-height: 1.8;
            opacity: 0.92;
            white-space: normal;
            word-break: break-word;
            color: #f0f0f0;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        .modal-desc p {
            text-indent: 2em;
            margin: 0;
            padding: 0;
            line-height: 1.8;
        }

        .modal-desc p + p {
            margin-top: 0;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            line-height: 1;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        /* ========== 页脚 ========== */
        footer {
            max-width: 1400px;
            margin: 40px auto 0;
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid #1a1a1a;
            color: #555;
            font-size: 0.85rem;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            header h1 {
                font-size: 1.5rem;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filters .stats {
                margin-left: 0;
                text-align: center;
            }
            .date-filter-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .filter-item {
                justify-content: stretch;
            }
            .filter-input {
                width: 100%;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }
            .modal-box {
                max-width: 100%;
                max-height: 95vh;
                margin: 10px;
                border-radius: 20px;
            }
            .modal-image {
                aspect-ratio: 16 / 9;
            }
            .modal-content {
                padding: 14px 20px 18px;
                max-height: 55%;
            }
            .modal-title {
                font-size: 1.2rem;
            }
            .modal-desc {
                font-size: 0.85rem;
                line-height: 1.7;
            }
            .modal-image::after {
                height: 65%;
            }
            .modal-close {
                top: 10px;
                right: 10px;
                width: 36px;
                height: 36px;
                font-size: 1.2rem;
            }
            .date-popup {
                width: 92%;
                left: 4% !important;
            }
            .btn-filter-reset {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }
            .card .info {
                padding: 6px 10px 10px;
            }
            .card .info .date {
                font-size: 0.7rem;
            }
            .card .info .title {
                font-size: 0.75rem;
            }
            .card .info .btn-group .download-btn {
                font-size: 0.65rem;
                padding: 3px 10px;
            }
            .modal-box {
                border-radius: 16px;
                margin: 8px;
                max-height: 98vh;
            }
            .modal-image {
                aspect-ratio: 16 / 10;
            }
            .modal-content {
                padding: 10px 14px 14px;
                max-height: 50%;
            }
            .modal-title {
                font-size: 1rem;
            }
            .modal-desc {
                font-size: 0.8rem;
                line-height: 1.6;
            }
            .modal-image::after {
                height: 70%;
            }
            .modal-close {
                top: 8px;
                right: 8px;
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 头部 ===== -->
    <header>
        <h1>📚 壁纸归档</h1>
        <a href="/" class="nav-link">🏠 返回首页</a>
    </header>

    <!-- ===== 筛选器 ===== -->
    <div class="filters">
        <!-- ===== 三联控件 ===== -->
        <div class="date-filter-bar">
            <div class="filter-item">
                <span class="filter-label">年份：</span>
                <input class="filter-input" id="yearInput" placeholder="请选择年份" readonly>
            </div>
            <div class="filter-item">
                <span class="filter-label">月份：</span>
                <input class="filter-input" id="monthInput" placeholder="请选择月份" readonly>
            </div>
            <div class="filter-item">
                <span class="filter-label">日期：</span>
                <input class="filter-input" id="dayInput" placeholder="请选择日期" readonly>
            </div>
            <button class="btn-filter-reset" onclick="resetAllFilters()">↺ 重置</button>
        </div>
        <div class="stats">共 <span id="totalCount">0</span> 张壁纸</div>
    </div>

    <!-- ===== 网格 ===== -->
    <div class="grid" id="grid">
        <div class="loading">加载壁纸数据中...</div>
    </div>

    <!-- ===== 页脚 ===== -->
    <footer>
        <p>数据来源：Bing 每日壁纸 · 永久归档 · 仅供个人欣赏</p>
    </footer>

    <!-- ===== 模态框 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-image">
                <img id="modalImg" src="" alt="壁纸大图" />
            </div>
            <div class="modal-content">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-subtitle" id="modalSubtitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
            </div>
        </div>
    </div>

    <!-- ===== 日期选择弹窗遮罩 ===== -->
    <div class="date-mask" id="mask">
        <div class="date-popup" id="popup"></div>
    </div>

    <!-- ============================================================ -->
    <!-- JavaScript -->
    <!-- ============================================================ -->
    <script>
        // ============================================================
        // 1. 三联控件（独立模块）
        // ============================================================
        (function() {
            var today = new Date();
            var currentYear = today.getFullYear();
            var currentMonth = today.getMonth() + 1;
            var currentDay = today.getDate();

            var state = {
                view: 'year',
                year: currentYear,
                month: currentMonth,
                day: currentDay,
                panelStart: 2020,
                pageSize: 12
            };

            var mask = document.getElementById('mask');
            var popup = document.getElementById('popup');
            var yearInput = document.getElementById('yearInput');
            var monthInput = document.getElementById('monthInput');
            var dayInput = document.getElementById('dayInput');
            var monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

            // 存储当前选中的值（用于显示）
            var selectedYear = '';
            var selectedMonth = '';
            var selectedDay = '';

            function closePopup() {
                mask.classList.remove('show');
            }

            function openPopup(input) {
                var rect = input.getBoundingClientRect();
                mask.classList.add('show');
                popup.style.left = Math.max(0, rect.left) + 'px';
                popup.style.top = (rect.bottom + 6 + window.scrollY) + 'px';
                if (input === yearInput) {
                    state.view = 'year';
                    // 如果年份输入框有值，解析并设置
                    if (yearInput.value) {
                        var yearVal = parseInt(yearInput.value.replace('年', ''));
                        if (!isNaN(yearVal)) {
                            state.year = yearVal;
                            // 自动调整面板范围
                            var start = state.panelStart;
                            var end = start + state.pageSize - 1;
                            if (state.year < start || state.year > end) {
                                state.panelStart = state.year - (state.year % state.pageSize);
                            }
                        }
                    }
                } else if (input === monthInput) {
                    state.view = 'month';
                    // 如果月份输入框有值，解析并设置
                    if (monthInput.value) {
                        var parts = monthInput.value.split('-');
                        if (parts.length === 2) {
                            var y = parseInt(parts[0]);
                            var m = parseInt(parts[1]);
                            if (!isNaN(y)) state.year = y;
                            if (!isNaN(m)) state.month = m;
                        }
                    }
                } else if (input === dayInput) {
                    state.view = 'calendar';
                    // 如果日期输入框有值，解析并设置
                    if (dayInput.value) {
                        var parts = dayInput.value.split('-');
                        if (parts.length === 3) {
                            var y = parseInt(parts[0]);
                            var m = parseInt(parts[1]);
                            var d = parseInt(parts[2]);
                            if (!isNaN(y)) state.year = y;
                            if (!isNaN(m)) state.month = m;
                            if (!isNaN(d)) state.day = d;
                        }
                    }
                }
                renderPopup();
            }

            function renderPopup() {
                popup.innerHTML = '';
                if (state.view === 'year') renderYear();
                else if (state.view === 'month') renderMonth();
                else if (state.view === 'calendar') renderCalendar();
            }

            // ---------- 年份 ----------
            function renderYear() {
                var start = state.panelStart;
                var end = start + state.pageSize - 1;
                var html = '<div class="popup-header">';
                html += '<div class="header-arrow-group">';
                html += '<span class="header-arrow" data-act="page-prev">«</span>';
                html += '<span class="header-arrow" data-act="year-prev">‹</span>';
                html += '</div>';
                html += '<div class="header-title">' + state.year + '年</div>';
                html += '<div class="header-arrow-group">';
                html += '<span class="header-arrow" data-act="year-next">›</span>';
                html += '<span class="header-arrow" data-act="page-next">»</span>';
                html += '</div>';
                html += '</div>';
                html += '<div class="grid-wrap">';
                for (var y = start; y <= end; y++) {
                    var cls = (state.year === y) ? 'active' : '';
                    html += '<div class="grid-cell ' + cls + '" data-val="' + y + '">' + y + '年</div>';
                }
                html += '</div>';
                popup.innerHTML = html;
                popup.querySelectorAll('.header-arrow').forEach(function(el) {
                    el.onclick = function() {
                        var act = el.dataset.act;
                        if (act === 'year-prev') state.year--;
                        else if (act === 'year-next') state.year++;
                        else if (act === 'page-prev') state.panelStart -= state.pageSize;
                        else if (act === 'page-next') state.panelStart += state.pageSize;
                        // 实时更新年份输入框显示
                        yearInput.value = state.year + '年';
                        // 更新月份和日期输入框的年份前缀
                        updateMonthAndDayDisplay(state.year);
                        renderPopup();
                    };
                });
                popup.querySelectorAll('.grid-cell').forEach(function(el) {
                    el.onclick = function() {
                        state.year = parseInt(el.dataset.val);
                        yearInput.value = state.year + '年';
                        // 更新月份和日期输入框的年份前缀
                        updateMonthAndDayDisplay(state.year);
                        // 自动筛选
                        doAutoFilter();
                        closePopup();
                    };
                });
            }

            // ---------- 月份 ----------
            function renderMonth() {
                var html = '<div class="popup-header">';
                html += '<div class="header-arrow-group">';
                html += '<span class="header-arrow" data-act="year-prev">‹</span>';
                html += '</div>';
                html += '<div class="header-title">' + state.year + '年</div>';
                html += '<div class="header-arrow-group">';
                html += '<span class="header-arrow" data-act="year-next">›</span>';
                html += '</div>';
                html += '</div>';
                html += '<div class="grid-wrap">';
                for (var i = 0; i < monthNames.length; i++) {
                    var num = i + 1;
                    var cls = (state.month === num) ? 'active' : '';
                    html += '<div class="grid-cell ' + cls + '" data-val="' + num + '">' + monthNames[i] + '</div>';
                }
                html += '</div>';
                popup.innerHTML = html;
                popup.querySelectorAll('.header-arrow').forEach(function(el) {
                    el.onclick = function() {
                        var act = el.dataset.act;
                        if (act === 'year-prev') state.year--;
                        else if (act === 'year-next') state.year++;
                        yearInput.value = state.year + '年';
                        // 更新月份和日期输入框的年份前缀
                        updateMonthAndDayDisplay(state.year);
                        renderPopup();
                    };
                });
                popup.querySelectorAll('.grid-cell').forEach(function(el) {
                    el.onclick = function() {
                        state.month = parseInt(el.dataset.val);
                        var monthStr = String(state.month).padStart(2, '0');
                        monthInput.value = state.year + '-' + monthStr;
                        // 更新日期输入框的年份月份前缀
                        updateDayDisplay(state.year, state.month);
                        // 自动筛选
                        doAutoFilter();
                        closePopup();
                    };
                });
            }

            // ---------- 日历 ----------
            function renderCalendar() {
                var date = new Date(state.year, state.month - 1, 1);
                var y = date.getFullYear();
                var m = date.getMonth();
                var totalDays = new Date(y, m + 1, 0).getDate();
                var firstDay = date.getDay();
                var prevMonthDays = new Date(y, m, 0).getDate();

                var html = '<div class="popup-header">';
                html += '<div class="header-arrow-group">';
                html += '<span class="header-arrow" data-act="month-prev12">«</span>';
                html += '<span class="header-arrow" data-act="month-prev">‹</span>';
                html += '</div>';
                html += '<div class="header-title">' + y + '年 ' + (m + 1) + '月</div>';
                html += '<div class="header-arrow-group">';
                html += '<span class="header-arrow" data-act="month-next">›</span>';
                html += '<span class="header-arrow" data-act="month-next12">»</span>';
                html += '</div>';
                html += '</div>';
                html += '<div class="calendar-wrap">';
                html += '<div class="calendar-week-title">';
                html += '<div class="week-cell">日</div><div class="week-cell">一</div><div class="week-cell">二</div>';
                html += '<div class="week-cell">三</div><div class="week-cell">四</div><div class="week-cell">五</div><div class="week-cell">六</div>';
                html += '</div>';
                html += '<div class="calendar-day-grid">';
                for (var i = 0; i < firstDay; i++) {
                    html += '<div class="day-cell gray">' + (prevMonthDays - firstDay + 1 + i) + '</div>';
                }
                for (var d = 1; d <= totalDays; d++) {
                    var cls = (state.day === d) ? 'active' : '';
                    html += '<div class="day-cell ' + cls + '" data-val="' + d + '">' + d + '</div>';
                }
                html += '</div></div>';
                popup.innerHTML = html;

                popup.querySelectorAll('.header-arrow').forEach(function(el) {
                    el.onclick = function() {
                        var act = el.dataset.act;
                        var ny = y, nm = m;
                        if (act === 'month-prev') nm--;
                        else if (act === 'month-next') nm++;
                        else if (act === 'month-prev12') nm -= 12;
                        else if (act === 'month-next12') nm += 12;
                        if (nm < 0) { ny--; nm = 12 + nm; }
                        if (nm > 11) { ny++; nm = nm - 12; }
                        state.year = ny;
                        state.month = nm + 1;
                        yearInput.value = state.year + '年';
                        monthInput.value = state.year + '-' + String(state.month).padStart(2, '0');
                        // 更新日期输入框
                        updateDayDisplay(state.year, state.month);
                        renderPopup();
                    };
                });
                popup.querySelectorAll('.day-cell:not(.gray)').forEach(function(el) {
                    el.onclick = function() {
                        state.day = parseInt(el.dataset.val);
                        var dateStr = state.year + '-' + String(state.month).padStart(2, '0') + '-' + String(state.day).padStart(2, '0');
                        dayInput.value = dateStr;
                        // 自动筛选
                        doAutoFilter();
                        closePopup();
                    };
                });
            }

            // ---------- 辅助函数：更新月份和日期显示 ----------
            function updateMonthAndDayDisplay(year) {
                // 如果月份输入框有值，更新年份部分
                if (monthInput.value) {
                    var parts = monthInput.value.split('-');
                    if (parts.length === 2) {
                        var m = parts[1];
                        monthInput.value = year + '-' + m;
                    } else {
                        // 如果月份输入框为空或格式不对，只显示年份+
                        monthInput.value = year + '-';
                    }
                } else {
                    monthInput.value = year + '-';
                }
                // 如果日期输入框有值，更新年份部分
                if (dayInput.value) {
                    var parts = dayInput.value.split('-');
                    if (parts.length === 3) {
                        var m = parts[1];
                        var d = parts[2];
                        dayInput.value = year + '-' + m + '-' + d;
                    } else {
                        dayInput.value = year + '-';
                    }
                } else {
                    dayInput.value = year + '-';
                }
            }

            function updateDayDisplay(year, month) {
                var monthStr = String(month).padStart(2, '0');
                if (dayInput.value) {
                    var parts = dayInput.value.split('-');
                    if (parts.length === 3) {
                        var d = parts[2];
                        dayInput.value = year + '-' + monthStr + '-' + d;
                    } else {
                        dayInput.value = year + '-' + monthStr + '-';
                    }
                } else {
                    dayInput.value = year + '-' + monthStr + '-';
                }
            }

            // ---------- 事件绑定 ----------
            yearInput.onclick = function() { openPopup(yearInput); };
            monthInput.onclick = function() { openPopup(monthInput); };
            dayInput.onclick = function() { openPopup(dayInput); };
            mask.onclick = function(e) { if (e.target === mask) closePopup(); };

            // ---------- 自动筛选函数 ----------
            function doAutoFilter() {
                var year = state.year;
                var month = state.month;
                var day = state.day;
                var hasYear = yearInput.value && yearInput.value !== '';
                var hasMonth = monthInput.value && monthInput.value !== '' && monthInput.value.indexOf('-') > 0;
                var hasDay = dayInput.value && dayInput.value !== '' && dayInput.value.split('-').length === 3;

                if (hasDay) {
                    // 有日期：精确筛选日期
                    var dateStr = String(year) + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                    loadDateAndRender(dateStr);
                } else if (hasMonth) {
                    // 有月份：筛选年月
                    loadYearAndRender(String(year), String(month).padStart(2, '0'), 'all');
                } else if (hasYear) {
                    // 只有年份：筛选年份
                    loadYearAndRender(String(year), 'all', 'all');
                } else {
                    // 都没有：加载当前年月
                    var now = new Date();
                    var curYear = now.getFullYear();
                    var curMonth = String(now.getMonth() + 1).padStart(2, '0');
                    loadYearAndRender(String(curYear), curMonth, 'all');
                }
            }

            // ---------- 重置功能 ----------
            window.resetAllFilters = function() {
                var now = new Date();
                var y = now.getFullYear();
                var m = now.getMonth() + 1;
                var d = now.getDate();
                state.year = y;
                state.month = m;
                state.day = d;
                yearInput.value = '';
                monthInput.value = '';
                dayInput.value = '';
                // 重新加载当前年月
                loadYearAndRender(String(y), String(m).padStart(2, '0'), 'all');
            };

            // ---------- 初始化 ----------
            // 不填充默认值，显示占位符
            yearInput.placeholder = '请选择年份';
            monthInput.placeholder = '请选择月份';
            dayInput.placeholder = '请选择日期';

            // 加载默认数据（当前年月）
            window.addEventListener('DOMContentLoaded', function() {
                var now = new Date();
                var curYear = now.getFullYear();
                var curMonth = String(now.getMonth() + 1).padStart(2, '0');
                setTimeout(function() {
                    loadYearAndRender(String(curYear), curMonth, 'all');
                }, 100);
            });

            // 暴露内部状态给外部
            window.datePicker = {
                getState: function() {
                    return {
                        year: state.year,
                        month: state.month,
                        day: state.day,
                        dateStr: state.year + '-' + String(state.month).padStart(2, '0') + '-' + String(state.day).padStart(2, '0')
                    };
                },
                getYear: function() { return state.year; },
                getMonth: function() { return state.month; },
                getDay: function() { return state.day; }
            };
        })();

        // ============================================================
        // 2. 工具函数
        // ============================================================

        function getBeijingTime() {
            var now = new Date();
            var beijingStr = now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            return new Date(beijingStr);
        }

        function getCurrentYear() {
            return String(getBeijingTime().getFullYear());
        }

        function getCurrentMonth() {
            return String(getBeijingTime().getMonth() + 1).padStart(2, '0');
        }

        function getYearFromDate(dateStr) {
            if (dateStr && dateStr.length >= 4) {
                return dateStr.substring(0, 4);
            }
            return '未知';
        }

        function getMonthFromDate(dateStr) {
            if (dateStr && dateStr.length >= 7) {
                return dateStr.substring(5, 7);
            }
            return '未知';
        }

        function get4kUrl(url) {
            if (!url) return '';
            if (url.includes('_UHD.jpg')) {
                return url;
            }
            return url.replace(/_1920x1080\.jpg/g, '_UHD.jpg');
        }

        function get1080pUrl(url) {
            if (!url) return '';
            var result = url;
            result = result.replace(/_UHD\.jpg/g, '_1920x1080.jpg');
            result = result.replace(/_UHD\.jpg\?/g, '_1920x1080.jpg?');
            result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
            if (result === url) {
                result = url.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
            }
            return result;
        }

        function formatTitle(item) {
            var mainTitle = item.subtitle || '';
            var subTitle = item.title || '';

            if (mainTitle && subTitle && mainTitle !== subTitle) {
                return mainTitle + ' | ' + subTitle;
            }
            
            if (mainTitle) {
                return mainTitle;
            }
            
            if (subTitle) {
                return subTitle;
            }
            
            return '壁纸';
        }

        var DOWNLOAD_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

        // ============================================================
        // 3. 数据加载（使用索引文件）
        // ============================================================

        var loadedData = {};
        var allAvailableYears = [];
        var yearCounts = {};

        async function loadIndex() {
            try {
                var resp = await fetch('index.json');
                if (!resp.ok) {
                    console.warn('⚠️ 索引文件不存在');
                    return false;
                }
                var index = await resp.json();
                if (index && index.years && index.years.length > 0) {
                    index.years.sort(function(a, b) { return parseInt(b.year) - parseInt(a.year); });
                    allAvailableYears = index.years.map(function(item) { return item.year; });
                    yearCounts = {};
                    index.years.forEach(function(item) {
                        yearCounts[item.year] = item.count;
                    });
                    console.log('📅 从索引加载年份:', allAvailableYears);
                    return true;
                }
                return false;
            } catch (e) {
                console.warn('⚠️ 加载索引失败:', e.message);
                return false;
            }
        }

        async function loadYearData(year) {
            if (loadedData[year]) {
                return loadedData[year];
            }

            try {
                var resp = await fetch('zh.' + year + '.json');
                if (!resp.ok) {
                    console.warn('⚠️ ' + year + ' 年文件不存在');
                    return [];
                }
                var data = await resp.json();
                if (Array.isArray(data) && data.length > 0) {
                    loadedData[year] = data;
                    return data;
                }
                return [];
            } catch (e) {
                console.warn('加载 ' + year + ' 年数据失败:', e.message);
                return [];
            }
        }

        // ============================================================
        // 4. 筛选与渲染
        // ============================================================

        function filterImages(images, year, month, day) {
            if (!images || images.length === 0) return [];
            return images.filter(function(img) {
                var y = getYearFromDate(img.date);
                var m = getMonthFromDate(img.date);
                var d = img.date ? img.date.substring(8, 10) : '';
                if (year !== 'all' && y !== year) return false;
                if (month !== 'all' && m !== month) return false;
                if (day !== 'all' && d !== day) return false;
                return true;
            });
        }

        function renderGrid(images) {
            var grid = document.getElementById('grid');
            var totalCount = document.getElementById('totalCount');

            if (!images || images.length === 0) {
                grid.innerHTML = '<div class="empty">😅 没有找到匹配的壁纸</div>';
                totalCount.textContent = '0';
                return;
            }

            totalCount.textContent = images.length;

            var html = '';
            for (var i = 0; i < images.length; i++) {
                var img = images[i];
                var url = img.bing_url || '';
                var dateStr = img.date || '';
                var displayTitle = formatTitle(img);
                var displayUrl = get1080pUrl(url);
                var hd4kUrl = get4kUrl(url);
                var hd1080Url = get1080pUrl(url);
                var escapedData = encodeURIComponent(JSON.stringify(img));

                html += '<div class="card" data-item="' + escapedData + '">';
                html += '<img src="' + displayUrl + '" alt="' + displayTitle + '" loading="lazy" onerror="this.style.display=\'none\'" />';
                html += '<div class="info">';
                html += '<div class="date">📅 ' + dateStr + '</div>';
                html += '<div class="title">' + displayTitle + '</div>';
                html += '<div class="btn-group">';
                html += '<a href="' + hd4kUrl + '" class="download-btn btn-4k" target="_blank" onclick="event.stopPropagation();">';
                html += DOWNLOAD_SVG + ' UHD/4K</a>';
                html += '<a href="' + hd1080Url + '" class="download-btn btn-1080p" target="_blank" onclick="event.stopPropagation();">';
                html += DOWNLOAD_SVG + ' 1080P</a>';
                html += '</div></div></div>';
            }
            grid.innerHTML = html;

            document.querySelectorAll('.card').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    if (e.target.closest('a')) return;
                    var encodedData = this.dataset.item;
                    if (encodedData) {
                        try {
                            var jsonStr = decodeURIComponent(encodedData);
                            var item = JSON.parse(jsonStr);
                            openModal(item);
                        } catch (e) {
                            console.warn('解析数据失败:', e);
                        }
                    }
                });
            });
        }

        // ============================================================
        // 5. 模态框
        // ============================================================

        function openModal(item) {
            var overlay = document.getElementById('modalOverlay');
            var displayTitle = formatTitle(item);
            document.getElementById('modalTitle').textContent = displayTitle;

            var img = document.getElementById('modalImg');
            var imgUrl = get1080pUrl(item.bing_url || '');
            img.src = imgUrl;
            img.alt = displayTitle;

            document.getElementById('modalSubtitle').style.display = 'none';

            var desc = item.description || '暂无详细介绍';
            desc = desc.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/<br\s*\/?>/gi, '\n');
            var paragraphs = desc.split('\n').map(function(p) { return p.trim(); }).filter(function(p) { return p !== ''; });
            var descHtml = paragraphs.map(function(p) { return '<p>' + p + '</p>'; }).join('');
            document.getElementById('modalDesc').innerHTML = descHtml;

            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            var overlay = document.getElementById('modalOverlay');
            if (overlay) {
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            }
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ============================================================
        // 6. 加载并渲染
        // ============================================================

        async function loadYearAndRender(year, month, day) {
            var grid = document.getElementById('grid');
            grid.innerHTML = '<div class="loading">加载壁纸数据中...</div>';

            if (year === 'all' || !year) {
                await loadAllYearsAndRender(month, day);
                return;
            }

            var data = loadedData[year];
            if (!data) {
                data = await loadYearData(year);
            }
            
            if (!data || data.length === 0) {
                grid.innerHTML = '<div class="empty">😅 ' + year + ' 年暂无壁纸数据</div>';
                document.getElementById('totalCount').textContent = '0';
                return;
            }

            var sortedData = data.slice().sort(function(a, b) {
                var da = a.date || '';
                var db = b.date || '';
                return db.localeCompare(da);
            });

            var dayStr = day || 'all';
            var monthStr = month || 'all';
            
            if (dayStr !== 'all' && dayStr.length === 2) {
                var exactDate = year + '-' + monthStr + '-' + dayStr;
                var exactData = sortedData.filter(function(item) {
                    return item.date === exactDate;
                });
                renderGrid(exactData);
            } else if (monthStr !== 'all' && monthStr.length === 2) {
                var filtered = filterImages(sortedData, year, monthStr, 'all');
                renderGrid(filtered);
            } else {
                var filtered = filterImages(sortedData, year, 'all', 'all');
                renderGrid(filtered);
            }
        }

        async function loadAllYearsAndRender(month, day) {
            var grid = document.getElementById('grid');
            grid.innerHTML = '<div class="loading">加载所有年份数据...</div>';
            
            var allData = [];
            for (var i = 0; i < allAvailableYears.length; i++) {
                var y = allAvailableYears[i];
                var data = loadedData[y] || await loadYearData(y);
                if (data && data.length > 0) {
                    allData = allData.concat(data);
                }
            }
            allData.sort(function(a, b) {
                var da = a.date || '';
                var db = b.date || '';
                return db.localeCompare(da);
            });
            
            var dayStr = day || 'all';
            var monthStr = month || 'all';
            
            if (dayStr !== 'all' && dayStr.length === 2) {
                var exactData = allData.filter(function(item) {
                    var d = item.date ? item.date.substring(8, 10) : '';
                    return d === dayStr;
                });
                renderGrid(exactData);
            } else if (monthStr !== 'all' && monthStr.length === 2) {
                var filtered = filterImages(allData, 'all', monthStr, 'all');
                renderGrid(filtered);
            } else {
                renderGrid(allData);
            }
        }

        // ============================================================
        // 7. 外部接口 - 加载日期
        // ============================================================

        async function loadDateAndRender(dateStr) {
            var grid = document.getElementById('grid');
            grid.innerHTML = '<div class="loading">加载壁纸数据中...</div>';
            
            var year = dateStr.substring(0, 4);
            var data = loadedData[year] || await loadYearData(year);
            
            if (!data || data.length === 0) {
                grid.innerHTML = '<div class="empty">😅 ' + year + ' 年暂无壁纸数据</div>';
                document.getElementById('totalCount').textContent = '0';
                return;
            }
            
            var exactData = data.filter(function(item) {
                return item.date === dateStr;
            });
            
            if (exactData.length === 0) {
                grid.innerHTML = '<div class="empty">😅 ' + dateStr + ' 暂无壁纸数据</div>';
                document.getElementById('totalCount').textContent = '0';
                return;
            }
            
            renderGrid(exactData);
        }

        // ============================================================
        // 8. 主函数
        // ============================================================

        console.log('📚 壁纸归档已加载');
    </script>
</body>
</html>
