<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>壁纸归档 · 光影回顾</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <style>
        /* ========== 全局重置 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        /* ========== 头部 ========== */
        header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2a2a;
        }

        header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header .nav-link {
            color: #4d96ff;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid #4d96ff;
            border-radius: 8px;
            transition: all 0.2s;
        }

        header .nav-link:hover {
            background: #4d96ff;
            color: #fff;
        }

        /* ========== 筛选器 ========== */
        .filters {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            background: #161616;
            padding: 16px 20px;
            border-radius: 12px;
        }

        .filters .stats {
            margin-left: auto;
            color: #888;
            font-size: 0.9rem;
        }

        .filters .stats span {
            color: #e0e0e0;
            font-weight: 600;
        }

        /* ===== 筛选控件样式 ===== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            flex: 1;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-label {
            font-size: 14px;
            color: #aaa;
            font-weight: 500;
            white-space: nowrap;
        }
        .filter-input {
            width: 120px;
            height: 34px;
            padding: 0 10px;
            border: 2px solid #4d96ff;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            background: #2a2a2a;
            color: #e0e0e0;
            transition: border-color 0.3s;
        }
        .filter-input:hover { border-color: #6aafff; }
        .filter-input:focus { border-color: #7abfff; box-shadow: 0 0 0 3px rgba(77,150,255,0.2); }
        .filter-input::placeholder { color: #666; }

        /* 年份切换按钮 */
        .year-nav {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .year-nav-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .year-nav-btn:hover {
            background: #4d96ff;
            border-color: #4d96ff;
            color: #fff;
        }
        .year-nav-btn:active {
            transform: scale(0.95);
        }
        .year-display {
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
            min-width: 60px;
            text-align: center;
        }

        .btn-filter-reset {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            background: #6c757d;
            color: #fff;
        }
        .btn-filter-reset:hover {
            background: #5a6268;
            transform: translateY(-1px);
        }

        /* ===== 月份选择弹窗（新样式） ===== */
        .date-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 999;
        }
        .date-mask.show { display: block; }

        .date-popup {
            position: absolute;
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 360px;
            overflow: hidden;
            animation: popupFade 0.2s ease;
            border: 1px solid #2a2a2a;
        }
        @keyframes popupFade {
            from { opacity: 0; transform: translateY(-8px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 弹窗头部 - 年份切换 */
        .popup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #2a2a2a;
            background: #111;
        }
        .popup-header .popup-year-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .popup-header .popup-year-btn {
            background: transparent;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
            transition: color 0.2s;
        }
        .popup-header .popup-year-btn:hover {
            color: #e0e0e0;
        }
        .popup-header .popup-year-text {
            font-size: 18px;
            color: #e0e0e0;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }

        /* 月份网格 - 3列4行 */
        .month-grid {
            padding: 16px 20px 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .month-cell {
            text-align: center;
            padding: 10px 0;
            font-size: 15px;
            color: #aaa;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .month-cell:hover {
            background: #2a2a2a;
            color: #fff;
        }
        .month-cell.active {
            background: #4d96ff;
            color: #fff;
        }

        /* ========== 网格 ========== */
        .grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            background: #111;
        }

        .card .info {
            padding: 10px 14px 14px;
        }

        .card .info .date {
            font-size: 0.8rem;
            color: #888;
            font-weight: 500;
        }

        .card .info .title {
            font-size: 0.85rem;
            color: #e0e0e0;
            font-weight: 600;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card .info .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .card .info .btn-group .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 14px;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .card .info .btn-group .download-btn svg {
            flex-shrink: 0;
        }

        .card .info .btn-group .btn-4k {
            background: #4d96ff;
        }
        .card .info .btn-group .btn-4k:hover {
            background: #3a7bd5;
        }

        .card .info .btn-group .btn-1080p {
            background: #6c757d;
        }
        .card .info .btn-group .btn-1080p:hover {
            background: #5a6268;
        }

        /* ========== 加载/空状态 ========== */
        .loading,
        .empty {
            text-align: center;
            padding: 60px 0;
            color: #666;
            font-size: 1rem;
            grid-column: 1 / -1;
        }

        .loading::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid #2a2a2a;
            border-top-color: #4d96ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: #1a1a1a;
            border-radius: 28px;
            max-width: 1600px;
            width: 100%;
            max-height: 95vh;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            padding: 0;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open .modal-box {
            transform: scale(1);
        }

        .modal-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0b0b0b;
            overflow: hidden;
            position: relative;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .modal-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.92) 0%, 
                rgba(0, 0, 0, 0.6) 40%,
                rgba(0, 0, 0, 0.2) 70%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 1;
        }

        .modal-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 32px 28px;
            z-index: 2;
            max-height: 60%;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .modal-content::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .modal-subtitle {
            display: none !important;
        }

        .modal-desc {
            font-size: 0.95rem;
            line-height: 1.8;
            opacity: 0.92;
            white-space: normal;
            word-break: break-word;
            color: #f0f0f0;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        .modal-desc p {
            text-indent: 2em;
            margin: 0;
            padding: 0;
            line-height: 1.8;
        }

        .modal-desc p + p {
            margin-top: 0;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            line-height: 1;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        /* ========== 页脚 ========== */
        footer {
            max-width: 1400px;
            margin: 40px auto 0;
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid #1a1a1a;
            color: #555;
            font-size: 0.85rem;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            header h1 {
                font-size: 1.5rem;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filters .stats {
                margin-left: 0;
                text-align: center;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .filter-item {
                justify-content: stretch;
            }
            .filter-input {
                width: 100%;
            }
            .year-nav {
                justify-content: center;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }
            .modal-box {
                max-width: 100%;
                max-height: 95vh;
                margin: 10px;
                border-radius: 20px;
            }
            .modal-image {
                aspect-ratio: 16 / 9;
            }
            .modal-content {
                padding: 14px 20px 18px;
                max-height: 55%;
            }
            .modal-title {
                font-size: 1.2rem;
            }
            .modal-desc {
                font-size: 0.85rem;
                line-height: 1.7;
            }
            .modal-image::after {
                height: 65%;
            }
            .modal-close {
                top: 10px;
                right: 10px;
                width: 36px;
                height: 36px;
                font-size: 1.2rem;
            }
            .date-popup {
                width: 92%;
                left: 4% !important;
            }
            .btn-filter-reset {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }
            .card .info {
                padding: 6px 10px 10px;
            }
            .card .info .date {
                font-size: 0.7rem;
            }
            .card .info .title {
                font-size: 0.75rem;
            }
            .card .info .btn-group .download-btn {
                font-size: 0.65rem;
                padding: 3px 10px;
            }
            .modal-box {
                border-radius: 16px;
                margin: 8px;
                max-height: 98vh;
            }
            .modal-image {
                aspect-ratio: 16 / 10;
            }
            .modal-content {
                padding: 10px 14px 14px;
                max-height: 50%;
            }
            .modal-title {
                font-size: 1rem;
            }
            .modal-desc {
                font-size: 0.8rem;
                line-height: 1.6;
            }
            .modal-image::after {
                height: 70%;
            }
            .modal-close {
                top: 8px;
                right: 8px;
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
            .date-popup {
                width: 95%;
                left: 2.5% !important;
            }
            .month-grid {
                padding: 12px 14px 16px;
                gap: 4px;
            }
            .month-cell {
                padding: 8px 0;
                font-size: 13px;
            }
            .popup-header {
                padding: 10px 14px;
            }
            .popup-header .popup-year-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 头部 ===== -->
    <header>
        <h1>📚 壁纸归档</h1>
        <a href="/" class="nav-link">🏠 返回首页</a>
    </header>

    <!-- ===== 筛选器 ===== -->
    <div class="filters">
        <!-- ===== 筛选控件 ===== -->
        <div class="filter-bar">
            <!-- 年份切换 -->
            <div class="year-nav">
                <button class="year-nav-btn" id="yearPrevBtn">‹</button>
                <span class="year-display" id="yearDisplay">2026</span>
                <button class="year-nav-btn" id="yearNextBtn">›</button>
            </div>

            <!-- 月份选择 -->
            <div class="filter-item">
                <span class="filter-label">月份：</span>
                <input class="filter-input" id="monthInput" placeholder="请选择月份" readonly>
            </div>

            <button class="btn-filter-reset" onclick="resetFilter()">↺ 重置</button>
        </div>
        <div class="stats">共 <span id="totalCount">0</span> 张壁纸</div>
    </div>

    <!-- ===== 网格 ===== -->
    <div class="grid" id="grid">
        <div class="loading">加载壁纸数据中...</div>
    </div>

    <!-- ===== 页脚 ===== -->
    <footer>
        <p>数据来源：Bing 每日壁纸 · 永久归档 · 仅供个人欣赏</p>
    </footer>

    <!-- ===== 模态框 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-image">
                <img id="modalImg" src="" alt="壁纸大图" />
            </div>
            <div class="modal-content">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-subtitle" id="modalSubtitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
            </div>
        </div>
    </div>

    <!-- ===== 月份选择弹窗 ===== -->
    <div class="date-mask" id="mask">
        <div class="date-popup" id="popup"></div>
    </div>

    <!-- ============================================================ -->
    <!-- JavaScript -->
    <!-- ============================================================ -->
    <script>
        // ============================================================
        // 1. 筛选控件（年份切换 + 月份选择）
        // ============================================================
        (function() {
            var today = new Date();
            var currentYear = today.getFullYear();
            var currentMonth = today.getMonth() + 1;

            var state = {
                year: currentYear,
                month: currentMonth
            };

            var mask = document.getElementById('mask');
            var popup = document.getElementById('popup');
            var monthInput = document.getElementById('monthInput');
            var yearDisplay = document.getElementById('yearDisplay');
            var yearPrevBtn = document.getElementById('yearPrevBtn');
            var yearNextBtn = document.getElementById('yearNextBtn');
            var monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];

            // ---------- 更新年份显示 ----------
            function updateYearDisplay() {
                yearDisplay.textContent = state.year;
            }

            // ---------- 月份弹窗 ----------
            function closePopup() {
                mask.classList.remove('show');
            }

            function openPopup() {
                var rect = monthInput.getBoundingClientRect();
                mask.classList.add('show');
                popup.style.left = Math.max(0, rect.left) + 'px';
                popup.style.top = (rect.bottom + 6 + window.scrollY) + 'px';
                renderPopup();
            }

            function renderPopup() {
                var html = '';
                // 弹窗头部 - 年份切换
                html += '<div class="popup-header">';
                html += '<div class="popup-year-nav">';
                html += '<button class="popup-year-btn" id="popupYearPrev">‹</button>';
                html += '<span class="popup-year-text" id="popupYearText">' + state.year + '年</span>';
                html += '<button class="popup-year-btn" id="popupYearNext">›</button>';
                html += '</div>';
                html += '</div>';
                // 月份网格
                html += '<div class="month-grid">';
                for (var i = 0; i < monthNames.length; i++) {
                    var num = i + 1;
                    var cls = (state.month === num) ? 'active' : '';
                    html += '<div class="month-cell ' + cls + '" data-val="' + num + '">' + monthNames[i] + '</div>';
                }
                html += '</div>';
                popup.innerHTML = html;

                // 弹窗内年份切换
                document.getElementById('popupYearPrev').onclick = function(e) {
                    e.stopPropagation();
                    state.year--;
                    document.getElementById('popupYearText').textContent = state.year + '年';
                    // 更新主界面年份显示
                    updateYearDisplay();
                    // 更新月份输入框
                    updateMonthInput();
                    // 重新加载数据
                    loadData();
                };
                document.getElementById('popupYearNext').onclick = function(e) {
                    e.stopPropagation();
                    state.year++;
                    document.getElementById('popupYearText').textContent = state.year + '年';
                    updateYearDisplay();
                    updateMonthInput();
                    loadData();
                };

                // 月份选择
                popup.querySelectorAll('.month-cell').forEach(function(el) {
                    el.onclick = function() {
                        state.month = parseInt(el.dataset.val);
                        // 移除其他高亮
                        popup.querySelectorAll('.month-cell').forEach(function(c) {
                            c.classList.remove('active');
                        });
                        el.classList.add('active');
                        updateMonthInput();
                        loadData();
                        closePopup();
                    };
                });
            }

            // ---------- 更新月份输入框 ----------
            function updateMonthInput() {
                var monthStr = String(state.month).padStart(2, '0');
                monthInput.value = state.year + '年 ' + monthStr + '月';
            }

            // ---------- 年份切换 ----------
            function changeYear(delta) {
                state.year += delta;
                updateYearDisplay();
                // 如果有月份输入值，更新年份
                if (monthInput.value) {
                    var parts = monthInput.value.split('年');
                    if (parts.length === 2) {
                        monthInput.value = state.year + '年 ' + parts[1];
                    }
                }
                loadData();
            }

            yearPrevBtn.onclick = function() { changeYear(-1); };
            yearNextBtn.onclick = function() { changeYear(1); };

            // ---------- 事件绑定 ----------
            monthInput.onclick = function() { openPopup(); };
            mask.onclick = function(e) { if (e.target === mask) closePopup(); };

            // ---------- 重置 ----------
            window.resetFilter = function() {
                var now = new Date();
                state.year = now.getFullYear();
                state.month = now.getMonth() + 1;
                monthInput.value = '';
                updateYearDisplay();
                loadData();
            };

            // ---------- 加载数据 ----------
            function loadData() {
                var year = state.year;
                var month = String(state.month).padStart(2, '0');
                loadMonthData(year, month);
            }

            // ---------- 初始化 ----------
            monthInput.placeholder = '请选择月份';
            updateYearDisplay();

            // 加载默认数据（当前年月）
            window.addEventListener('DOMContentLoaded', function() {
                setTimeout(function() {
                    loadData();
                }, 100);
            });

            // 暴露内部状态
            window.filterState = {
                getYear: function() { return state.year; },
                getMonth: function() { return state.month; }
            };
        })();

        // ============================================================
        // 2. 工具函数
        // ============================================================

        function getBeijingTime() {
            var now = new Date();
            var beijingStr = now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            return new Date(beijingStr);
        }

        function getCurrentYear() {
            return String(getBeijingTime().getFullYear());
        }

        function getCurrentMonth() {
            return String(getBeijingTime().getMonth() + 1).padStart(2, '0');
        }

        function getYearFromDate(dateStr) {
            if (dateStr && dateStr.length >= 4) {
                return dateStr.substring(0, 4);
            }
            return '未知';
        }

        function getMonthFromDate(dateStr) {
            if (dateStr && dateStr.length >= 7) {
                return dateStr.substring(5, 7);
            }
            return '未知';
        }

        function get4kUrl(url) {
            if (!url) return '';
            if (url.includes('_UHD.jpg')) {
                return url;
            }
            return url.replace(/_1920x1080\.jpg/g, '_UHD.jpg');
        }

        function get1080pUrl(url) {
            if (!url) return '';
            var result = url;
            result = result.replace(/_UHD\.jpg/g, '_1920x1080.jpg');
            result = result.replace(/_UHD\.jpg\?/g, '_1920x1080.jpg?');
            result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
            if (result === url) {
                result = url.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
            }
            return result;
        }

        function formatTitle(item) {
            var mainTitle = item.subtitle || '';
            var subTitle = item.title || '';

            if (mainTitle && subTitle && mainTitle !== subTitle) {
                return mainTitle + ' | ' + subTitle;
            }
            
            if (mainTitle) {
                return mainTitle;
            }
            
            if (subTitle) {
                return subTitle;
            }
            
            return '壁纸';
        }

        var DOWNLOAD_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

        // ============================================================
        // 3. 数据加载
        // ============================================================

        var loadedData = {};
        var allAvailableYears = [];

        async function loadIndex() {
            try {
                var resp = await fetch('index.json');
                if (!resp.ok) {
                    console.warn('⚠️ 索引文件不存在');
                    return false;
                }
                var index = await resp.json();
                if (index && index.years && index.years.length > 0) {
                    index.years.sort(function(a, b) { return parseInt(b.year) - parseInt(a.year); });
                    allAvailableYears = index.years.map(function(item) { return item.year; });
                    console.log('📅 从索引加载年份:', allAvailableYears);
                    return true;
                }
                return false;
            } catch (e) {
                console.warn('⚠️ 加载索引失败:', e.message);
                return false;
            }
        }

        async function loadYearData(year) {
            if (loadedData[year]) {
                return loadedData[year];
            }

            try {
                var resp = await fetch('zh.' + year + '.json');
                if (!resp.ok) {
                    console.warn('⚠️ ' + year + ' 年文件不存在');
                    return [];
                }
                var data = await resp.json();
                if (Array.isArray(data) && data.length > 0) {
                    loadedData[year] = data;
                    return data;
                }
                return [];
            } catch (e) {
                console.warn('加载 ' + year + ' 年数据失败:', e.message);
                return [];
            }
        }

        // ============================================================
        // 4. 筛选与渲染
        // ============================================================

        function filterImagesByMonth(images, month) {
            if (!images || images.length === 0) return [];
            return images.filter(function(img) {
                var m = getMonthFromDate(img.date);
                return m === month;
            });
        }

        function renderGrid(images) {
            var grid = document.getElementById('grid');
            var totalCount = document.getElementById('totalCount');

            if (!images || images.length === 0) {
                grid.innerHTML = '<div class="empty">😅 没有找到匹配的壁纸</div>';
                totalCount.textContent = '0';
                return;
            }

            totalCount.textContent = images.length;

            var html = '';
            for (var i = 0; i < images.length; i++) {
                var img = images[i];
                var url = img.bing_url || '';
                var dateStr = img.date || '';
                var displayTitle = formatTitle(img);
                var displayUrl = get1080pUrl(url);
                var hd4kUrl = get4kUrl(url);
                var hd1080Url = get1080pUrl(url);
                var escapedData = encodeURIComponent(JSON.stringify(img));

                html += '<div class="card" data-item="' + escapedData + '">';
                html += '<img src="' + displayUrl + '" alt="' + displayTitle + '" loading="lazy" onerror="this.style.display=\'none\'" />';
                html += '<div class="info">';
                html += '<div class="date">📅 ' + dateStr + '</div>';
                html += '<div class="title">' + displayTitle + '</div>';
                html += '<div class="btn-group">';
                html += '<a href="' + hd4kUrl + '" class="download-btn btn-4k" target="_blank" onclick="event.stopPropagation();">';
                html += DOWNLOAD_SVG + ' UHD/4K</a>';
                html += '<a href="' + hd1080Url + '" class="download-btn btn-1080p" target="_blank" onclick="event.stopPropagation();">';
                html += DOWNLOAD_SVG + ' 1080P</a>';
                html += '</div></div></div>';
            }
            grid.innerHTML = html;

            document.querySelectorAll('.card').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    if (e.target.closest('a')) return;
                    var encodedData = this.dataset.item;
                    if (encodedData) {
                        try {
                            var jsonStr = decodeURIComponent(encodedData);
                            var item = JSON.parse(jsonStr);
                            openModal(item);
                        } catch (e) {
                            console.warn('解析数据失败:', e);
                        }
                    }
                });
            });
        }

        // ============================================================
        // 5. 模态框
        // ============================================================

        function openModal(item) {
            var overlay = document.getElementById('modalOverlay');
            var displayTitle = formatTitle(item);
            document.getElementById('modalTitle').textContent = displayTitle;

            var img = document.getElementById('modalImg');
            var imgUrl = get1080pUrl(item.bing_url || '');
            img.src = imgUrl;
            img.alt = displayTitle;

            document.getElementById('modalSubtitle').style.display = 'none';

            var desc = item.description || '暂无详细介绍';
            desc = desc.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/<br\s*\/?>/gi, '\n');
            var paragraphs = desc.split('\n').map(function(p) { return p.trim(); }).filter(function(p) { return p !== ''; });
            var descHtml = paragraphs.map(function(p) { return '<p>' + p + '</p>'; }).join('');
            document.getElementById('modalDesc').innerHTML = descHtml;

            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            var overlay = document.getElementById('modalOverlay');
            if (overlay) {
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            }
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ============================================================
        // 6. 加载数据
        // ============================================================

        async function loadMonthData(year, month) {
            var grid = document.getElementById('grid');
            grid.innerHTML = '<div class="loading">加载壁纸数据中...</div>';

            if (allAvailableYears.length === 0) {
                await loadIndex();
            }

            var data = loadedData[year];
            if (!data) {
                data = await loadYearData(year);
            }

            if (!data || data.length === 0) {
                grid.innerHTML = '<div class="empty">😅 ' + year + ' 年暂无壁纸数据</div>';
                document.getElementById('totalCount').textContent = '0';
                return;
            }

            var sortedData = data.slice().sort(function(a, b) {
                var da = a.date || '';
                var db = b.date || '';
                return db.localeCompare(da);
            });

            var filtered = filterImagesByMonth(sortedData, month);

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty">😅 ' + year + '年 ' + month + '月 暂无壁纸数据</div>';
                document.getElementById('totalCount').textContent = '0';
                return;
            }

            renderGrid(filtered);
        }

        // ============================================================
        // 7. 主函数
        // ============================================================

        console.log('📚 壁纸归档已加载');
    </script>
</body>
</html>
