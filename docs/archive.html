<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>壁纸归档 · Bing 每日壁纸</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2a2a;
        }
        header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header .nav-link {
            color: #4d96ff;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid #4d96ff;
            border-radius: 8px;
            transition: all 0.2s;
        }
        header .nav-link:hover { background: #4d96ff; color: #fff; }
        .filters {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            background: #161616;
            padding: 16px 20px;
            border-radius: 12px;
        }
        .filters label { color: #aaa; font-size: 0.9rem; font-weight: 600; }
        .filters select {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            min-width: 120px;
        }
        .filters select:focus { border-color: #4d96ff; }
        .filters .stats { margin-left: auto; color: #888; font-size: 0.9rem; }
        .filters .stats span { color: #e0e0e0; font-weight: 600; }
        .grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .card {
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            background: #111;
        }
        .card .info { padding: 10px 14px 14px; }
        .card .info .date { font-size: 0.85rem; color: #888; font-weight: 600; }
        .card .info .copyright {
            font-size: 0.75rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .card .info .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .card .info .btn-group .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 14px;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .card .info .btn-group .download-btn svg {
            flex-shrink: 0;
        }
        .card .info .btn-group .btn-4k { background: #4d96ff; }
        .card .info .btn-group .btn-4k:hover { background: #3a7bd5; }
        .card .info .btn-group .btn-1080p { background: #6c757d; }
        .card .info .btn-group .btn-1080p:hover { background: #5a6268; }
        .loading, .empty {
            text-align: center;
            padding: 60px 0;
            color: #666;
            font-size: 1rem;
            grid-column: 1 / -1;
        }
        .loading::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid #2a2a2a;
            border-top-color: #4d96ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer {
            max-width: 1400px;
            margin: 40px auto 0;
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid #1a1a1a;
            color: #555;
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; gap: 12px; }
            header h1 { font-size: 1.5rem; }
            .filters { flex-direction: column; align-items: stretch; }
            .filters .stats { margin-left: 0; text-align: center; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .card .info { padding: 6px 10px 10px; }
            .card .info .date { font-size: 0.75rem; }
            .card .info .btn-group .download-btn { font-size: 0.7rem; padding: 3px 10px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>📚 壁纸归档</h1>
        <a href="/" class="nav-link">🏠 返回首页</a>
    </header>
    <div class="filters">
        <label for="yearFilter">📅 年份</label>
        <select id="yearFilter"></select>
        <label for="monthFilter">📆 月份</label>
        <select id="monthFilter">
            <option value="all">全部月份</option>
            <option value="01">1 月</option><option value="02">2 月</option>
            <option value="03">3 月</option><option value="04">4 月</option>
            <option value="05">5 月</option><option value="06">6 月</option>
            <option value="07">7 月</option><option value="08">8 月</option>
            <option value="09">9 月</option><option value="10">10 月</option>
            <option value="11">11 月</option><option value="12">12 月</option>
        </select>
        <div class="stats">共 <span id="totalCount">0</span> 张壁纸</div>
    </div>
    <div class="grid" id="grid"><div class="loading">加载壁纸数据中...</div></div>
    <footer><p>数据来源：Bing 每日壁纸 · 永久归档 · 仅供个人欣赏</p></footer>

    <script>
        const BING_BASE = 'https://cn.bing.com';
        const HISTORY_URL = 'history.json';

        // SVG 下载图标
        const DOWNLOAD_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

        function formatDisplayDate(dateStr) {
            if (dateStr && dateStr.length === 8) {
                return `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;
            }
            return dateStr || '未知日期';
        }

        function getYearMonth(dateStr) {
            if (dateStr && dateStr.length === 8) {
                return { year: dateStr.slice(0, 4), month: dateStr.slice(4, 6) };
            }
            return { year: '未知', month: '未知' };
        }

        function get1080pUrl(url) {
            let result = url;
            result = result.replace(/_UHD\.jpg/g, '_1920x1080.jpg');
            result = result.replace(/_UHD\.jpg\?/g, '_1920x1080.jpg?');
            result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
            return result;
        }

        function get4kUrl(url) {
            let result = url;
            result = result.replace(/_1920x1080\.jpg/g, '_UHD.jpg');
            result = result.replace(/1920x1080/g, 'UHD');
            result = result.replace(/&rf=LaDigue_1920x1080\.jpg/g, '');
            result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
            if (result.includes('?')) {
                result = result + '&w=3840&h=2160&rs=1&c=4&uhd=1&uhdwidth=3840&uhdheight=2160';
            } else {
                result = result + '?w=3840&h=2160&rs=1&c=4&uhd=1&uhdwidth=3840&uhdheight=2160';
            }
            return result;
        }
        
        function getFullUrl(url) {
          if (url.startsWith('http')) {
            return url;
          }
          return 'https://cn.bing.com' + url;
        }
        
        async function fetchHistory() {
            try {
                const response = await fetch(HISTORY_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!Array.isArray(data) || data.length === 0) throw new Error('历史数据为空');
                data.sort((a, b) => parseInt(b.enddate) - parseInt(a.enddate));
                return data;
            } catch (error) {
                console.error('获取历史数据失败:', error);
                throw error;
            }
        }

        function populateFilters(images) {
            const yearSet = new Set();
            images.forEach(img => {
                const { year } = getYearMonth(img.enddate);
                if (year !== '未知') yearSet.add(year);
            });
            const years = Array.from(yearSet).sort().reverse();
            const yearSelect = document.getElementById('yearFilter');
            yearSelect.innerHTML = '<option value="all">全部年份</option>';
            years.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y + ' 年';
                yearSelect.appendChild(opt);
            });
        }

        function renderGrid(images) {
            const grid = document.getElementById('grid');
            const totalCount = document.getElementById('totalCount');
            if (!images || images.length === 0) {
                grid.innerHTML = '<div class="empty">😅 没有找到匹配的壁纸</div>';
                totalCount.textContent = '0';
                return;
            }
            totalCount.textContent = images.length;

            grid.innerHTML = images.map(img => {
                const url = getFullUrl(img.url); 
                const dateStr = img.enddate || '';
                const displayDate = formatDisplayDate(dateStr);
                const copyright = img.copyright || 'Bing 壁纸';

                const hd1080Url = get1080pUrl(url);
                const hd4kUrl = get4kUrl(url);

                return `
                    <div class="card" title="${copyright}">
                        <img src="${url}" alt="${copyright}" loading="lazy" onerror="this.style.display='none'" />
                        <div class="info">
                            <div class="date">📅 ${displayDate}</div>
                            <div class="copyright">${copyright}</div>
                            <div class="btn-group">
                                <a href="${hd4kUrl}" class="download-btn btn-4k" target="_blank">
                                    ${DOWNLOAD_SVG}
                                    4K
                                </a>
                                <a href="${hd1080Url}" class="download-btn btn-1080p" target="_blank">
                                    ${DOWNLOAD_SVG}
                                    1080P
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterImages(images, year, month) {
            return images.filter(img => {
                const { year: y, month: m } = getYearMonth(img.enddate);
                if (year !== 'all' && y !== year) return false;
                if (month !== 'all' && m !== month) return false;
                return true;
            });
        }

        async function main() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="loading">加载壁纸数据中...</div>';
            try {
                const allImages = await fetchHistory();
                if (!allImages || allImages.length === 0) {
                    grid.innerHTML = '<div class="empty">😅 暂无壁纸数据，等待自动归档...</div>';
                    return;
                }
                populateFilters(allImages);
                const yearFilter = document.getElementById('yearFilter');
                const monthFilter = document.getElementById('monthFilter');
                const filtered = filterImages(allImages, yearFilter.value, monthFilter.value);
                renderGrid(filtered);
                yearFilter.addEventListener('change', () => {
                    renderGrid(filterImages(allImages, yearFilter.value, monthFilter.value));
                });
                monthFilter.addEventListener('change', () => {
                    renderGrid(filterImages(allImages, yearFilter.value, monthFilter.value));
                });
            } catch (error) {
                grid.innerHTML = `<div class="empty">❌ 加载失败：${error.message || '未知错误'}</div>`;
            }
        }
        document.addEventListener('DOMContentLoaded', main);
    </script>
</body>
</html>
