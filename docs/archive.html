<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>壁纸归档 · Bing 每日壁纸</title>
    <meta name="description" content="必应壁纸历史归档，4K 高清下载" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b0b0b;
            color: #e8e8e8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== 顶部导航 ===== */
        .archive-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 20px;
            background: rgba(11, 11, 11, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .archive-header .header-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e8e8e8;
            letter-spacing: 1px;
        }

        .archive-header .header-title span {
            color: #4d96ff;
        }

        /* ===== 返回首页按钮 - 右上角 ===== */
        .btn-back-home {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }

        .btn-back-home:hover {
            background: rgba(200, 200, 200, 0.2);
            transform: scale(1.03);
        }

        /* ===== 壁纸网格 ===== */
        .archive-grid {
            padding: 80px 20px 40px;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .archive-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .archive-item:hover {
            border-color: #4d96ff;
            transform: scale(1.03);
            z-index: 2;
        }

        .archive-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .archive-item .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 14px 10px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            pointer-events: none;
        }

        .archive-item .item-overlay .item-title {
            font-size: 0.7rem;
            font-weight: 500;
            color: #fff;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .archive-item .item-overlay .item-date {
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        /* ===== 加载状态 ===== */
        .loading {
            text-align: center;
            padding: 60px 0;
            color: #666;
            font-size: 1rem;
            grid-column: 1 / -1;
        }

        .loading::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid #2a2a2a;
            border-top-color: #4d96ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ================================================================
                   模态框 - 图片整屏显示
                   ================================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* ===== 模态框 - 关闭按钮（右上角） ===== */
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            z-index: 1002;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* ===== 模态框 - 图片容器（整屏） ===== */
        .modal-image-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .modal-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* ===== 模态框 - 底部信息区（支持滑动） ===== */
        .modal-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 45vh;
            padding: 20px 24px 24px;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.95) 0%, 
                rgba(0, 0, 0, 0.7) 50%,
                transparent 100%
            );
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4d96ff transparent;
            pointer-events: auto;
            z-index: 1001;
        }

        .modal-info::-webkit-scrollbar {
            width: 4px;
        }

        .modal-info::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-info::-webkit-scrollbar-thumb {
            background: #4d96ff;
            border-radius: 4px;
        }

        /* ===== 模态框 - 标题（调小） ===== */
        .modal-info .modal-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .modal-info .modal-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        /* ===== 模态框 - 描述文字 ===== */
        .modal-info .modal-desc {
            font-size: 0.85rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .modal-info .modal-desc p {
            text-indent: 2em;
            margin: 0;
            padding: 0;
            line-height: 1.8;
        }

        .modal-info .modal-desc p + p {
            margin-top: 0;
        }

        /* ===== 模态框 - 操作按钮 ===== */
        .modal-info .modal-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .modal-info .modal-actions .btn {
            display: inline-block;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }

        .modal-info .modal-actions .btn-primary {
            background: rgba(77, 150, 255, 0.2);
            border-color: rgba(77, 150, 255, 0.3);
        }

        .modal-info .modal-actions .btn-primary:hover {
            background: rgba(77, 150, 255, 0.35);
            transform: scale(1.03);
        }

        .modal-info .modal-actions .btn-secondary:hover {
            background: rgba(200, 200, 200, 0.2);
            transform: scale(1.03);
        }

        /* ================================================================
                   响应式
                   ================================================================ */
        @media (max-width: 768px) {
            .archive-header {
                padding: 10px 14px;
            }
            .archive-header .header-title {
                font-size: 0.95rem;
            }
            .btn-back-home {
                font-size: 0.65rem;
                padding: 5px 14px;
            }
            .archive-grid {
                padding: 70px 12px 30px;
                gap: 10px;
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .archive-item .item-overlay .item-title {
                font-size: 0.6rem;
            }
            .archive-item .item-overlay .item-date {
                font-size: 0.5rem;
            }

            /* 模态框移动端 */
            .modal-info {
                max-height: 40vh;
                padding: 16px 18px 18px;
            }
            .modal-info .modal-title {
                font-size: 1rem;
            }
            .modal-info .modal-subtitle {
                font-size: 0.75rem;
            }
            .modal-info .modal-desc {
                font-size: 0.75rem;
                line-height: 1.7;
            }
            .modal-info .modal-actions .btn {
                font-size: 0.6rem;
                padding: 4px 12px;
            }
            .modal-close {
                top: 12px;
                right: 14px;
                width: 34px;
                height: 34px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .archive-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 8px;
                padding: 60px 8px 20px;
            }
            .archive-item .item-overlay {
                padding: 8px 10px 6px;
            }
            .archive-item .item-overlay .item-title {
                font-size: 0.5rem;
                -webkit-line-clamp: 1;
            }
            .archive-item .item-overlay .item-date {
                font-size: 0.45rem;
            }
            .modal-info {
                max-height: 35vh;
                padding: 12px 14px 14px;
            }
            .modal-info .modal-title {
                font-size: 0.85rem;
            }
            .modal-info .modal-desc {
                font-size: 0.7rem;
                line-height: 1.6;
            }
            .modal-info .modal-actions .btn {
                font-size: 0.55rem;
                padding: 3px 10px;
            }
            .modal-close {
                top: 8px;
                right: 10px;
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 顶部导航 ===== -->
    <header class="archive-header">
        <div class="header-title">📚 壁纸<span>归档</span></div>
        <a href="/" class="btn-back-home">🏠 返回首页</a>
    </header>

    <!-- ===== 壁纸网格 ===== -->
    <div class="archive-grid" id="archiveGrid">
        <div class="loading">加载壁纸中...</div>
    </div>

    <!-- ===== 模态框（图片整屏显示） ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <button class="modal-close" id="modalClose">✕</button>
        <div class="modal-image-wrapper" id="modalImageWrapper">
            <img src="" alt="壁纸" id="modalImage" />
        </div>
        <div class="modal-info" id="modalInfo">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-subtitle" id="modalSubtitle"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <div class="modal-actions" id="modalActions">
                <a href="#" class="btn btn-primary" id="modalDownload4k" target="_blank">⬇️ 下载 4K</a>
                <a href="#" class="btn btn-secondary" id="modalDownload1080" target="_blank">⬇️ 下载 1080P</a>
                <a href="#" class="btn btn-secondary" id="modalDetailBtn" target="_blank">📖 光影回顾</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ===== 工具函数 =====
            function get1080pUrl(url) {
                if (!url) return '';
                let result = url;
                result = result.replace(/_UHD\.jpg/g, '_1920x1080.jpg');
                result = result.replace(/_UHD\.jpg\?/g, '_1920x1080.jpg?');
                result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
                if (result === url) {
                    result = url.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
                }
                return result;
            }

            function get4kUrl(url) {
                if (!url) return '';
                if (url.includes('_UHD.jpg')) {
                    return url;
                }
                return url.replace(/_1920x1080\.jpg/g, '_UHD.jpg');
            }

            function formatTitle(item) {
                const mainTitle = item.subtitle || '';
                const subTitle = item.title || '';
                if (mainTitle && subTitle && mainTitle !== subTitle) {
                    return `${mainTitle} | ${subTitle}`;
                }
                return mainTitle || subTitle || '壁纸';
            }

            function getDetailUrl(title, dateStr) {
                if (!dateStr) return '#';
                let cleanTitle = title.replace(/\s*[-–]\s*\d{4}\/\d{2}\/\d{2}$/, '').trim();
                const parts = dateStr.split('-');
                const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                d.setDate(d.getDate() - 1);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const dateParam = `${y}${m}${day}_1600`;
                return `https://cn.bing.com/search?q=${encodeURIComponent(cleanTitle)}&form=hpcapt&filters=HpDate:%22${dateParam}%22+mgzv3configlist:%22BingQA_Encyclopedia_Layout%22`;
            }

            // ===== 加载壁纸列表 =====
            const grid = document.getElementById('archiveGrid');
            let allData = [];

            async function loadArchive() {
                try {
                    const resp = await fetch('zh.2026.json');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error('数据为空');
                    }
                    allData = data;
                    renderGrid(allData);
                } catch (e) {
                    console.warn('归档加载失败:', e);
                    grid.innerHTML = `<div class="loading" style="color:#ff6b6b;">⚠️ 加载失败，请刷新</div>`;
                }
            }

            function renderGrid(data) {
                if (!data || data.length === 0) {
                    grid.innerHTML = `<div class="loading">暂无壁纸</div>`;
                    return;
                }

                grid.innerHTML = data.map((item, index) => {
                    const imgUrl = get1080pUrl(item.bing_url || '');
                    const title = formatTitle(item);
                    const date = item.date || '';
                    return `
                        <div class="archive-item" data-index="${index}">
                            <img src="${imgUrl}" alt="${title}" loading="lazy" />
                            <div class="item-overlay">
                                <div class="item-title">${title}</div>
                                <div class="item-date">${date}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                // ===== 点击打开模态框 =====
                document.querySelectorAll('.archive-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        openModal(index);
                    });
                });
            }

            // ===== 模态框 =====
            const modalOverlay = document.getElementById('modalOverlay');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalSubtitle = document.getElementById('modalSubtitle');
            const modalDesc = document.getElementById('modalDesc');
            const modalDownload4k = document.getElementById('modalDownload4k');
            const modalDownload1080 = document.getElementById('modalDownload1080');
            const modalDetailBtn = document.getElementById('modalDetailBtn');
            const modalClose = document.getElementById('modalClose');

            let currentModalIndex = 0;

            function openModal(index) {
                const item = allData[index];
                if (!item) return;
                currentModalIndex = index;

                const imgUrl = get1080pUrl(item.bing_url || '');
                const title = formatTitle(item);
                const desc = item.description || '暂无详细介绍';
                const date = item.date || '';

                // 图片整屏显示
                modalImage.src = imgUrl;
                modalImage.alt = title;

                // 标题（调小）
                modalTitle.textContent = title;
                modalSubtitle.textContent = date;

                // 描述（支持滑动）
                let descHtml = '';
                if (desc) {
                    const paragraphs = desc.split('\n')
                        .map(p => p.trim())
                        .filter(p => p !== '');
                    descHtml = paragraphs.map(p => `<p>${p}</p>`).join('');
                }
                modalDesc.innerHTML = descHtml || '暂无详细介绍';

                // 按钮
                modalDownload4k.href = get4kUrl(item.bing_url || '');
                modalDownload1080.href = get1080pUrl(item.bing_url || '');
                modalDetailBtn.href = getDetailUrl(item.title || item.subtitle || '', item.date);

                // 显示模态框
                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';

                // 重置滚动位置
                const infoEl = document.getElementById('modalInfo');
                if (infoEl) infoEl.scrollTop = 0;
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            // ===== 模态框事件 =====
            modalClose.addEventListener('click', closeModal);

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
                // 左右键切换
                if (modalOverlay.classList.contains('active')) {
                    if (e.key === 'ArrowLeft') {
                        const prev = currentModalIndex > 0 ? currentModalIndex - 1 : allData.length - 1;
                        openModal(prev);
                        e.preventDefault();
                    } else if (e.key === 'ArrowRight') {
                        const next = currentModalIndex < allData.length - 1 ? currentModalIndex + 1 : 0;
                        openModal(next);
                        e.preventDefault();
                    }
                }
            });

            // ===== 触摸滑动切换 =====
            let touchStartX_modal = 0;
            let touchEndX_modal = 0;

            modalOverlay.addEventListener('touchstart', function(e) {
                touchStartX_modal = e.changedTouches[0].screenX;
            }, { passive: true });

            modalOverlay.addEventListener('touchend', function(e) {
                touchEndX_modal = e.changedTouches[0].screenX;
                const diff = touchStartX_modal - touchEndX_modal;
                if (Math.abs(diff) > 60) {
                    if (diff > 0) {
                        const next = currentModalIndex < allData.length - 1 ? currentModalIndex + 1 : 0;
                        openModal(next);
                    } else {
                        const prev = currentModalIndex > 0 ? currentModalIndex - 1 : allData.length - 1;
                        openModal(prev);
                    }
                }
            }, { passive: true });

            // ===== 初始化 =====
            loadArchive();

            console.log('📚 壁纸归档已加载');
        })();
    </script>
</body>
</html>
