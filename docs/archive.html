<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>壁纸归档 · Bing 每日壁纸</title>
    <meta name="description" content="必应壁纸历史归档，4K 高清下载" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b0b0b;
            color: #e8e8e8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== 顶部导航 ===== */
        .archive-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 20px;
            background: rgba(11, 11, 11, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .archive-header .header-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e8e8e8;
            letter-spacing: 1px;
        }

        .archive-header .header-title span {
            color: #4d96ff;
        }

        .archive-header .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ===== 年月筛选器 ===== */
        .filter-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .filter-group select {
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            background: rgba(200, 200, 200, 0.08);
            color: #e8e8e8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            cursor: pointer;
            outline: none;
            transition: all 0.25s;
        }

        .filter-group select:hover {
            background: rgba(200, 200, 200, 0.15);
        }

        .filter-group select option {
            background: #1a1a1a;
            color: #e8e8e8;
        }

        .filter-group .filter-label {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        /* ===== 返回首页按钮 ===== */
        .btn-back-home {
            display: inline-block;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }

        .btn-back-home:hover {
            background: rgba(200, 200, 200, 0.2);
            transform: scale(1.03);
        }

        /* ===== 壁纸网格 ===== */
        .archive-grid {
            padding: 80px 20px 40px;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .archive-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .archive-item:hover {
            border-color: #4d96ff;
            transform: scale(1.03);
            z-index: 2;
        }

        .archive-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .archive-item .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 14px 10px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            pointer-events: none;
        }

        .archive-item .item-overlay .item-title {
            font-size: 0.7rem;
            font-weight: 500;
            color: #fff;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .archive-item .item-overlay .item-date {
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        /* ===== 加载状态 ===== */
        .loading {
            text-align: center;
            padding: 60px 0;
            color: #666;
            font-size: 1rem;
            grid-column: 1 / -1;
        }

        .loading::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid #2a2a2a;
            border-top-color: #4d96ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ================================================================
                   模态框 - 图片整屏显示
                   ================================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            z-index: 1002;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .modal-image-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .modal-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .modal-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 45vh;
            padding: 20px 24px 24px;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.95) 0%, 
                rgba(0, 0, 0, 0.7) 50%,
                transparent 100%
            );
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4d96ff transparent;
            pointer-events: auto;
            z-index: 1001;
        }

        .modal-info::-webkit-scrollbar {
            width: 4px;
        }

        .modal-info::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-info::-webkit-scrollbar-thumb {
            background: #4d96ff;
            border-radius: 4px;
        }

        .modal-info .modal-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .modal-info .modal-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .modal-info .modal-desc {
            font-size: 0.85rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .modal-info .modal-desc p {
            text-indent: 2em;
            margin: 0;
            padding: 0;
            line-height: 1.8;
        }

        .modal-info .modal-desc p + p {
            margin-top: 0;
        }

        /* ================================================================
                   响应式
                   ================================================================ */
        @media (max-width: 768px) {
            .archive-header {
                padding: 10px 14px;
            }
            .archive-header .header-title {
                font-size: 0.95rem;
            }
            .btn-back-home {
                font-size: 0.6rem;
                padding: 4px 12px;
            }
            .filter-group select {
                font-size: 0.6rem;
                padding: 4px 8px;
            }
            .filter-group .filter-label {
                font-size: 0.55rem;
            }
            .archive-grid {
                padding: 72px 12px 30px;
                gap: 10px;
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .archive-item .item-overlay .item-title {
                font-size: 0.6rem;
            }
            .archive-item .item-overlay .item-date {
                font-size: 0.5rem;
            }

            .modal-info {
                max-height: 40vh;
                padding: 16px 18px 18px;
            }
            .modal-info .modal-title {
                font-size: 1rem;
            }
            .modal-info .modal-subtitle {
                font-size: 0.75rem;
            }
            .modal-info .modal-desc {
                font-size: 0.75rem;
                line-height: 1.7;
            }
            .modal-close {
                top: 12px;
                right: 14px;
                width: 34px;
                height: 34px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .archive-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 8px;
                padding: 62px 8px 20px;
            }
            .archive-item .item-overlay {
                padding: 8px 10px 6px;
            }
            .archive-item .item-overlay .item-title {
                font-size: 0.5rem;
                -webkit-line-clamp: 1;
            }
            .archive-item .item-overlay .item-date {
                font-size: 0.45rem;
            }
            .modal-info {
                max-height: 35vh;
                padding: 12px 14px 14px;
            }
            .modal-info .modal-title {
                font-size: 0.85rem;
            }
            .modal-info .modal-desc {
                font-size: 0.7rem;
                line-height: 1.6;
            }
            .modal-close {
                top: 8px;
                right: 10px;
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 顶部导航 ===== -->
    <header class="archive-header">
        <div class="header-title">📚 壁纸<span>归档</span></div>
        <div class="header-right">
            <div class="filter-group">
                <span class="filter-label">📅</span>
                <select id="yearFilter">
                    <option value="all">全部年份</option>
                </select>
                <select id="monthFilter">
                    <option value="all">全部月份</option>
                </select>
            </div>
            <a href="/" class="btn-back-home">🏠 返回首页</a>
        </div>
    </header>

    <!-- ===== 壁纸网格 ===== -->
    <div class="archive-grid" id="archiveGrid">
        <div class="loading">加载壁纸中...</div>
    </div>

    <!-- ===== 模态框（无按钮，无滑动切换） ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <button class="modal-close" id="modalClose">✕</button>
        <div class="modal-image-wrapper" id="modalImageWrapper">
            <img src="" alt="壁纸" id="modalImage" />
        </div>
        <div class="modal-info" id="modalInfo">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-subtitle" id="modalSubtitle"></div>
            <div class="modal-desc" id="modalDesc"></div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ===== 检测移动端 =====
            const isMobile = window.innerWidth <= 768;

            // ===== 工具函数 =====
            function get1080pUrl(url) {
                if (!url) return '';
                let result = url;
                result = result.replace(/_UHD\.jpg/g, '_1920x1080.jpg');
                result = result.replace(/_UHD\.jpg\?/g, '_1920x1080.jpg?');
                result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
                if (result === url) {
                    result = url.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
                }
                return result;
            }

            function getMobileUrl(url) {
                if (!url) return '';
                let result = url;
                result = result.replace(/_UHD\.jpg/g, '_1080x1920.jpg');
                result = result.replace(/_1920x1080\.jpg/g, '_1080x1920.jpg');
                if (result === url) {
                    result = url.replace(/\.jpg/g, '_1080x1920.jpg');
                }
                return result;
            }

            function formatTitle(item) {
                const mainTitle = item.subtitle || '';
                const subTitle = item.title || '';
                if (mainTitle && subTitle && mainTitle !== subTitle) {
                    return `${mainTitle} | ${subTitle}`;
                }
                return mainTitle || subTitle || '壁纸';
            }

            function parseDate(dateStr) {
                if (!dateStr) return null;
                const parts = dateStr.split('-');
                if (parts.length !== 3) return null;
                return {
                    year: parseInt(parts[0]),
                    month: parseInt(parts[1]),
                    day: parseInt(parts[2])
                };
            }

            // ===== 获取当前年月 =====
            function getCurrentYearMonth() {
                const now = new Date();
                return {
                    year: now.getFullYear(),
                    month: String(now.getMonth() + 1).padStart(2, '0')
                };
            }

            // ===== 全局变量 =====
            const grid = document.getElementById('archiveGrid');
            let allData = [];
            let filteredData = [];

            const yearFilter = document.getElementById('yearFilter');
            const monthFilter = document.getElementById('monthFilter');

            // ===== 加载壁纸列表 =====
            async function loadArchive() {
                try {
                    const resp = await fetch('zh.2026.json');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error('数据为空');
                    }
                    allData = data;
                    populateFilters(allData);
                    applyFilters();
                } catch (e) {
                    console.warn('归档加载失败:', e);
                    grid.innerHTML = `<div class="loading" style="color:#ff6b6b;">⚠️ 加载失败，请刷新</div>`;
                }
            }

            // ===== 填充筛选器 =====
            function populateFilters(data) {
                const years = new Set();
                const months = new Set();

                data.forEach(item => {
                    const parsed = parseDate(item.date);
                    if (parsed) {
                        years.add(parsed.year);
                        months.add(parsed.month);
                    }
                });

                yearFilter.innerHTML = '<option value="all">全部年份</option>';
                const sortedYears = Array.from(years).sort((a, b) => b - a);
                sortedYears.forEach(year => {
                    const option = document.createElement('option');
                    option.value = year;
                    option.textContent = `${year}年`;
                    yearFilter.appendChild(option);
                });

                monthFilter.innerHTML = '<option value="all">全部月份</option>';
                for (let m = 1; m <= 12; m++) {
                    const option = document.createElement('option');
                    option.value = String(m).padStart(2, '0');
                    option.textContent = `${m}月`;
                    monthFilter.appendChild(option);
                }

                const current = getCurrentYearMonth();
                if (yearFilter.querySelector(`option[value="${current.year}"]`)) {
                    yearFilter.value = current.year;
                }
                if (monthFilter.querySelector(`option[value="${current.month}"]`)) {
                    monthFilter.value = current.month;
                }
            }

            // ===== 应用筛选 =====
            function applyFilters() {
                const yearVal = yearFilter.value;
                const monthVal = monthFilter.value;

                filteredData = allData.filter(item => {
                    const parsed = parseDate(item.date);
                    if (!parsed) return false;

                    let match = true;
                    if (yearVal !== 'all') {
                        match = match && parsed.year === parseInt(yearVal);
                    }
                    if (monthVal !== 'all') {
                        match = match && parsed.month === parseInt(monthVal);
                    }
                    return match;
                });

                renderGrid(filteredData);
            }

            // ===== 渲染网格 =====
            function renderGrid(data) {
                if (!data || data.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🖼️</div>
                            <p>该月份暂无壁纸</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = data.map((item, index) => {
                    const imgUrl = isMobile ? getMobileUrl(item.bing_url || '') : get1080pUrl(item.bing_url || '');
                    const title = formatTitle(item);
                    const date = item.date || '';
                    return `
                        <div class="archive-item" data-index="${index}">
                            <img src="${imgUrl}" alt="${title}" loading="lazy" />
                            <div class="item-overlay">
                                <div class="item-title">${title}</div>
                                <div class="item-date">${date}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.archive-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        openModal(index);
                    });
                });
            }

            // ===== 筛选器事件 =====
            yearFilter.addEventListener('change', applyFilters);
            monthFilter.addEventListener('change', applyFilters);

            // ===== 模态框（无按钮，无滑动切换） =====
            const modalOverlay = document.getElementById('modalOverlay');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalSubtitle = document.getElementById('modalSubtitle');
            const modalDesc = document.getElementById('modalDesc');
            const modalClose = document.getElementById('modalClose');

            function openModal(index) {
                const item = filteredData[index];
                if (!item) return;

                const imgUrl = isMobile ? getMobileUrl(item.bing_url || '') : get1080pUrl(item.bing_url || '');
                const title = formatTitle(item);
                const desc = item.description || '暂无详细介绍';
                const date = item.date || '';

                modalImage.src = imgUrl;
                modalImage.alt = title;

                modalTitle.textContent = title;
                modalSubtitle.textContent = date;

                let descHtml = '';
                if (desc) {
                    const paragraphs = desc.split('\n')
                        .map(p => p.trim())
                        .filter(p => p !== '');
                    descHtml = paragraphs.map(p => `<p>${p}</p>`).join('');
                }
                modalDesc.innerHTML = descHtml || '暂无详细介绍';

                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';

                const infoEl = document.getElementById('modalInfo');
                if (infoEl) infoEl.scrollTop = 0;
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            modalClose.addEventListener('click', closeModal);

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });

            // ===== 初始化 =====
            loadArchive();

            console.log('📚 壁纸归档已加载' + (isMobile ? ' · 移动端模式 (1080x1920)' : ' · 电脑端模式'));
        })();
    </script>
</body>
</html>
