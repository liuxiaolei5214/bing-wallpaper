<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>光影回顾 · Bing 每日壁纸</title>
    <meta name="description" content="每日更新的必应超清壁纸，4K 高清下载 · 光影回顾" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌅</text></svg>" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== 隐藏所有滚动条 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        .viewport {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .viewport::-webkit-scrollbar {
            display: none;
        }

        .fullscreen-section {
            height: 100vh;
            width: 100vw;
            max-width: 100vw;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 今日壁纸 ===== */
        #today {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 30% 20%, #1f2a30, #0e1218);
        }

        #todayCard {
            width: 100%;
            height: 100%;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #1e232b;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #todayCard img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== 今日壁纸 - 文字浮层（与模态框完全一致） ===== */
        #todayCard .today-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 32px 28px;
            z-index: 2;
            max-height: 60%;
            overflow-y: auto;
            scrollbar-width: none;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.92) 0%, 
                rgba(0, 0, 0, 0.6) 40%,
                rgba(0, 0, 0, 0.2) 70%,
                transparent 100%
            );
            pointer-events: none;
        }

        #todayCard .today-overlay::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        #todayCard .today-overlay .today-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        #todayCard .today-overlay .today-desc {
            font-size: 0.95rem;
            line-height: 1.8;
            opacity: 0.92;
            white-space: normal;
            word-break: break-word;
            color: #f0f0f0;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
        }

        #todayCard .today-overlay .today-desc p {
            text-indent: 2em;
            margin: 0;
            padding: 0;
            line-height: 1.8;
        }

        #todayCard .today-overlay .today-desc p + p {
            margin-top: 0;
        }

        /* ===== 加载状态 ===== */
        .loading {
            color: #888;
            font-size: 1rem;
            text-align: center;
        }

        /* ===== 电影感轮播 ===== */
        #movieCarouselSection {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 70% 60%, #1a262e, #0b1015);
        }

        .carousel-movie {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #14191f;
        }

        .movie-slide {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        /* ===== 标题 - 独立在左上角 ===== */
        .movie-title-bar {
            position: absolute;
            top: 1.2rem;
            left: 2.5rem;
            z-index: 15;
            pointer-events: none;
        }

        .movie-title-bar .movie-info {
            color: #f0f0ea;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
            pointer-events: auto;
        }

        .movie-title-bar .movie-title {
            font-size: 1.5rem !important;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.1rem;
            line-height: 1.4;
        }

        .movie-title-bar .movie-date {
            font-size: clamp(0.7rem, 1vw, 0.9rem);
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* ===== 按钮 - 独立在右上角 ===== */
        .movie-actions {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 240, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 20;
            pointer-events: auto;
        }

        .btn {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.8px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }
        .btn-primary {
            background: rgba(220, 210, 180, 0.15);
            border-color: rgba(240, 230, 200, 0.2);
        }
        .btn-primary:hover {
            background: rgba(220, 210, 180, 0.3);
            transform: scale(1.03);
        }
        .btn-secondary:hover {
            background: rgba(200, 200, 200, 0.15);
            transform: scale(1.02);
        }

        /* ===== 轮播控制按钮 ===== */
        .movie-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 14, 18, 0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(200, 200, 200, 0.1);
            color: #e0ddd0;
            font-size: 2.2rem;
            font-weight: 200;
            width: 3.4rem;
            height: 3.4rem;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            z-index: 10;
            opacity: 0.7;
            line-height: 1;
        }
        .movie-btn:hover {
            background: rgba(30, 40, 48, 0.7);
            opacity: 1;
            transform: translateY(-50%) scale(1.05);
        }
        .movie-btn.prev {
            left: 1.2rem;
        }
        .movie-btn.next {
            right: 1.2rem;
        }

        /* ===== 缩略图导航 - 在底部 ===== */
        .movie-thumbnails {
            position: absolute;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.6rem;
            padding: 0.4rem 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 240, 0.06);
            z-index: 20;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80%;
        }
        .movie-thumbnails .thumb-item {
            width: 3.4rem;
            height: 2.2rem;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s;
            opacity: 0.5;
            flex-shrink: 0;
        }
        .movie-thumbnails .thumb-item.active {
            border-color: #e8e0d0;
            opacity: 1;
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(200, 180, 140, 0.25);
        }
        .movie-thumbnails .thumb-item:hover {
            opacity: 0.9;
            transform: scale(1.04);
        }

        /* ===== 底部滚动指示 ===== */
        .scroll-hint {
            position: fixed;
            bottom: 1.8rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 18, 24, 0.5);
            backdrop-filter: blur(6px);
            padding: 0.3rem 1.6rem;
            border-radius: 60px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #b0c0c8;
            border: 1px solid rgba(180, 190, 180, 0.08);
            z-index: 30;
            pointer-events: none;
            white-space: nowrap;
            opacity: 0.6;
            transition: opacity 0.5s;
        }
        .scroll-hint span {
            display: inline-block;
            animation: bobble 2.4s infinite;
        }
        @keyframes bobble {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            #todayCard .today-overlay {
                padding: 12px 16px 16px;
                max-height: 50%;
            }
            #todayCard .today-overlay .today-title {
                font-size: 1.2rem;
            }
            #todayCard .today-overlay .today-desc {
                font-size: 0.85rem;
                line-height: 1.7;
            }
            .movie-title-bar {
                top: 0.6rem;
                left: 1.2rem;
            }
            .movie-actions {
                top: 0.6rem;
                right: 1.2rem;
                padding: 0.4rem 0.8rem;
                gap: 0.3rem;
                border-radius: 40px;
            }
            .btn {
                font-size: 0.55rem;
                padding: 0.2rem 0.6rem;
            }
            .movie-btn {
                width: 2.6rem;
                height: 2.6rem;
                font-size: 1.8rem;
            }
            .movie-btn.prev {
                left: 0.4rem;
            }
            .movie-btn.next {
                right: 0.4rem;
            }
            .movie-thumbnails .thumb-item {
                width: 2.4rem;
                height: 1.6rem;
            }
            .movie-thumbnails {
                gap: 0.3rem;
                padding: 0.3rem 0.6rem;
                bottom: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            #todayCard .today-overlay {
                padding: 10px 14px 14px;
                max-height: 45%;
            }
            #todayCard .today-overlay .today-title {
                font-size: 1rem;
            }
            #todayCard .today-overlay .today-desc {
                font-size: 0.8rem;
                line-height: 1.6;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 整屏滚动容器 ===== -->
    <div class="viewport" id="viewport">

        <!-- ===== 今日壁纸 - 全屏 ===== -->
        <section id="today" class="fullscreen-section">
            <div id="todayCard">
                <div class="loading">加载中...</div>
            </div>
        </section>

        <!-- ===== 电影感壁纸轮播（光影回顾）- 全屏 ===== -->
        <section id="movieCarouselSection" class="fullscreen-section">
            <div class="carousel-movie">
                <div class="movie-slide active" id="movieSlide" style="background-image: url('');">
                    <!-- 标题 - 独立在左上角 -->
                    <div class="movie-title-bar">
                        <div class="movie-info">
                            <div class="movie-title" id="movieTitle"></div>
                            <div class="movie-date" id="movieDate"></div>
                        </div>
                    </div>
                    <!-- 按钮 - 独立在右上角 -->
                    <div class="movie-actions" id="movieActions">
                        <a href="#" class="btn btn-primary" id="movieDownloadBtn" target="_blank">⬇️ 下载 4K</a>
                        <a href="#" class="btn btn-secondary" id="movieViewBtn" target="_blank">⬇️ 下载1080P</a>
                        <a href="#" class="btn btn-secondary" id="movieDetailBtn" target="_blank">📖 光影回顾</a>
                        <a href="/archive.html" class="btn btn-secondary">📚 壁纸归档</a>
                    </div>
                    <!-- 缩略图 -->
                    <div class="movie-thumbnails" id="movieThumbnails"></div>
                    <button class="movie-btn prev" id="moviePrev">‹</button>
                    <button class="movie-btn next" id="movieNext">›</button>
                </div>
            </div>
        </section>
    </div>

    <!-- 底部提示 -->
    <div class="scroll-hint"><span>⬇ 滚动 · 整屏切换</span></div>

    <script src="js/main.js"></script>
    <script>
        (function() {
            "use strict";

            // ===== 工具函数 =====
            function get1080pUrl(url) {
                if (!url) return '';
                let result = url;
                result = result.replace(/_UHD\.jpg/g, '_1920x1080.jpg');
                result = result.replace(/_UHD\.jpg\?/g, '_1920x1080.jpg?');
                result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
                if (result === url) {
                    result = url.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
                }
                return result;
            }

            function get4kUrl(url) {
                if (!url) return '';
                if (url.includes('_UHD.jpg')) {
                    return url;
                }
                return url.replace(/_1920x1080\.jpg/g, '_UHD.jpg');
            }

            function formatTitle(item) {
                const mainTitle = item.subtitle || '';
                const subTitle = item.title || '';
                if (mainTitle && subTitle && mainTitle !== subTitle) {
                    return `${mainTitle} | ${subTitle}`;
                }
                return mainTitle || subTitle || '壁纸';
            }

            // ===== 加载今日壁纸 =====
            async function loadToday() {
                const container = document.getElementById('todayCard');
                try {
                    const resp = await fetch('today_clean.json');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();

                    const imgUrl = get1080pUrl(data.bing_url || '');
                    const title = formatTitle(data);
                    const desc = data.description || '暂无详细介绍';

                    // 处理描述段落
                    let descHtml = '';
                    if (desc) {
                        const paragraphs = desc.split('\n')
                            .map(p => p.trim())
                            .filter(p => p !== '');
                        descHtml = paragraphs.map(p => `<p>${p}</p>`).join('');
                    }

                    container.innerHTML = `
                        <img src="${imgUrl}" alt="${title}" loading="lazy" onerror="this.style.display='none'" />
                        <div class="today-overlay">
                            <div class="today-title">${title}</div>
                            <div class="today-desc">${descHtml || '暂无详细介绍'}</div>
                        </div>
                    `;
                } catch (e) {
                    console.warn('今日壁纸加载失败:', e);
                    container.innerHTML = `<div class="loading">⚠️ 今日壁纸加载失败</div>`;
                }
            }

            // ===== 轮播功能 =====
            let allData = [];
            let currentIndex = 0;
            let autoPlayTimer = null;
            const AUTOPLAY_INTERVAL = 6000;

            const slide = document.getElementById('movieSlide');
            const titleEl = document.getElementById('movieTitle');
            const dateEl = document.getElementById('movieDate');
            const downloadBtn = document.getElementById('movieDownloadBtn');
            const viewBtn = document.getElementById('movieViewBtn');
            const detailBtn = document.getElementById('movieDetailBtn');
            const thumbnails = document.getElementById('movieThumbnails');
            const prevBtn = document.getElementById('moviePrev');
            const nextBtn = document.getElementById('movieNext');

            function updateSlide(index) {
                if (!allData || allData.length === 0) return;
                const item = allData[index];
                if (!item) return;

                const imgUrl = get1080pUrl(item.bing_url || '');
                const title = formatTitle(item);
                const dateStr = item.date || '';

                slide.style.backgroundImage = `url('${imgUrl}')`;
                titleEl.textContent = title;
                dateEl.textContent = dateStr;

                const hd4k = get4kUrl(item.bing_url || '');
                const hd1080 = get1080pUrl(item.bing_url || '');
                downloadBtn.href = hd4k;
                viewBtn.href = hd1080;

                const detailUrl = `https://cn.bing.com/search?q=${encodeURIComponent(title)}&form=BGALM&filters=HpDate%3a%22${dateStr.replace(/-/g, '')}_1600%22+mgzv3configlist%3a%22BingQA_Encyclopedia_Layout%22&pc=W011&bwa=1`;
                detailBtn.href = detailUrl;

                document.querySelectorAll('.thumb-item').forEach((el, i) => {
                    el.classList.toggle('active', i === index);
                });

                prevBtn.style.visibility = index === 0 ? 'hidden' : 'visible';
                nextBtn.style.visibility = index === allData.length - 1 ? 'hidden' : 'visible';
            }

            function nextSlide() {
                if (!allData || allData.length === 0) return;
                currentIndex = (currentIndex + 1) % allData.length;
                updateSlide(currentIndex);
            }

            function prevSlide() {
                if (!allData || allData.length === 0) return;
                currentIndex = (currentIndex - 1 + allData.length) % allData.length;
                updateSlide(currentIndex);
            }

            function goToSlide(index) {
                if (!allData || allData.length === 0) return;
                if (index < 0 || index >= allData.length) return;
                currentIndex = index;
                updateSlide(currentIndex);
                resetAutoPlay();
            }

            function resetAutoPlay() {
                if (autoPlayTimer) {
                    clearInterval(autoPlayTimer);
                    autoPlayTimer = null;
                }
                if (allData.length > 1) {
                    autoPlayTimer = setInterval(nextSlide, AUTOPLAY_INTERVAL);
                }
            }

            async function loadCarousel() {
                try {
                    const resp = await fetch('zh.2026.json');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error('数据为空');
                    }
                    allData = data;
                    currentIndex = 0;

                    thumbnails.innerHTML = '';
                    allData.forEach((item, idx) => {
                        const thumb = document.createElement('div');
                        thumb.className = 'thumb-item' + (idx === 0 ? ' active' : '');
                        thumb.style.backgroundImage = `url('${get1080pUrl(item.bing_url || '')}')`;
                        thumb.title = formatTitle(item);
                        thumb.addEventListener('click', () => goToSlide(idx));
                        thumbnails.appendChild(thumb);
                    });

                    updateSlide(0);
                    resetAutoPlay();
                } catch (e) {
                    console.warn('轮播加载失败:', e);
                    slide.style.backgroundImage = '';
                    titleEl.textContent = '加载失败';
                    dateEl.textContent = '请刷新重试';
                }
            }

            // ===== 事件绑定 =====
            prevBtn.addEventListener('click', () => { prevSlide();
                resetAutoPlay(); });
            nextBtn.addEventListener('click', () => { nextSlide();
                resetAutoPlay(); });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') { prevSlide();
                    resetAutoPlay();
                    e.preventDefault(); }
                if (e.key === 'ArrowRight') { nextSlide();
                    resetAutoPlay();
                    e.preventDefault(); }
            });

            let touchStartX = 0;
            let touchEndX = 0;
            slide.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            slide.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) { nextSlide();
                        resetAutoPlay(); } else { prevSlide();
                        resetAutoPlay(); }
                }
            }, { passive: true });

            // ===== 滚动指示器 =====
            const hint = document.querySelector('.scroll-hint');
            const viewport = document.getElementById('viewport');
            let hintTimeout;

            if (hint && viewport) {
                viewport.addEventListener('scroll', function() {
                    hint.style.opacity = '0.15';
                    clearTimeout(hintTimeout);
                    hintTimeout = setTimeout(() => {
                        const sections = document.querySelectorAll('.fullscreen-section');
                        const lastSection = sections[sections.length - 1];
                        if (lastSection) {
                            const rect = lastSection.getBoundingClientRect();
                            if (rect.top < window.innerHeight && rect.bottom > 0) {
                                hint.style.opacity = '0.1';
                            } else {
                                hint.style.opacity = '0.6';
                            }
                        } else {
                            hint.style.opacity = '0.6';
                        }
                    }, 1000);
                });
                setTimeout(() => { hint.style.opacity = '0.6'; }, 300);
            }

            // ===== 初始化 =====
            loadToday();
            loadCarousel();

            console.log('✨ 整屏切换已启用 · 标题在左上角，按钮在右上角');
        })();
    </script>
</body>
</html>
