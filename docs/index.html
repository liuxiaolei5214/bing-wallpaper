<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bing 每日壁纸 · 光影回顾</title>
    <meta name="description" content="每日更新的必应超清壁纸，4K 高清下载 · 光影回顾" />
    <link rel="icon" href="https://bingimg.lei5214.cc.cd/logo.avif">
    <style>
        /* ===== 隐藏所有滚动条 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        .viewport {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .viewport::-webkit-scrollbar {
            display: none;
        }

        .fullscreen-section {
            height: 100vh;
            width: 100vw;
            max-width: 100vw;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 今日壁纸 ===== */
        #today {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 30% 20%, #1f2a30, #0e1218);
        }

        #todayCard {
            width: 100%;
            height: 100%;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #1e232b;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #todayCard img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 移动端顶部遮罩，保证右上角按钮可视 */
        #todayCard::before {
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:160px;
            background:linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            z-index:1;
            pointer-events:none;
        }

        /* 今日页面底部渐变遮罩：永远贴底，不随内容上移 */
        #todayCard .today-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            z-index: 2;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.95) 0%, 
                rgba(0, 0, 0, 0.7) 40%,
                rgba(0, 0, 0, 0.3) 70%,
                transparent 100%
            );
            pointer-events: none;
        }
        
        /* 今日页面内容容器：可以整体上移，不再负责渐变 */
        #todayCard .today-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 3;
            padding: 28px 32px 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 45%;
        }


        /* ===== 标题 ===== */
        #todayCard .today-overlay .today-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        /* ===== 描述文字 ===== */
        #todayCard .today-overlay .today-desc {
            font-size: 0.95rem;
            line-height: 1.8;
            opacity: 0.92;
            white-space: normal;
            word-break: break-word;
            color: #f0f0f0;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
            max-height: 40vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        #todayCard .today-overlay .today-desc::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        #todayCard .today-overlay .today-desc p {
            text-indent: 2em;
            margin: 0;
            padding: 0;
            line-height: 1.8;
        }

        #todayCard .today-overlay .today-desc p + p {
            margin-top: 0;
        }

        /* ===== 按钮组【PC端：放在底部overlay内】 ===== */
        #todayCard .today-overlay .today-actions-pc {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            pointer-events: auto;
            position: relative;
        }
        /* 移动端悬浮按钮，直接相对于#todayCard定位，画面右上角 */
        #todayCard .today-actions-mobile {
            display: none;
            position: absolute;
            top: 16px;
            right: 12px;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 3;
            max-width: calc(100vw - 24px);
        }

        #todayCard .today-actions-pc .btn,
        #todayCard .today-actions-mobile .btn {
            display: inline-flex;
            align-items: center;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.8px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }

        #todayCard .today-actions-pc .btn svg,
        #todayCard .today-actions-mobile .btn svg {
            flex-shrink: 0;
            margin-right: 4px;
        }

        .btn-primary {
            background: rgba(220, 210, 180, 0.15);
            border-color: rgba(240, 230, 200, 0.2);
        }
        .btn-primary:hover {
            background: rgba(220, 210, 180, 0.3);
            transform: scale(1.03);
        }
        .btn-secondary:hover {
            background: rgba(200, 200, 200, 0.15);
            transform: scale(1.02);
        }

        /* ===== 滚动提示（居中） ===== */
        .today-scroll-hint {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            white-space: nowrap;
        }

        .today-scroll-hint span {
            display: inline-block;
            animation: bobble 2.4s infinite;
        }

        /* 全局滚动提示，PC/手机都可见，固定画面底部居中 */
        .global-scroll-hint {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            z-index: 5;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            white-space: nowrap;
        }
        .global-scroll-hint span {
            display: inline-block;
            animation: bobble 2.4s infinite;
        }
        
        /* 隐藏PC按钮组内部旧的滚动提示（避免重复出现） */
        .today-actions-pc .today-scroll-hint {
            display: none !important;
        }

        @keyframes bobble {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        /* ===== 加载状态 ===== */
        .loading {
            color: #888;
            font-size: 1rem;
            text-align: center;
        }

        /* ===== 电影感轮播 ===== */
        #movieCarouselSection {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 70% 60%, #1a262e, #0b1015);
        }

        .carousel-movie {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #14191f;
        }

        .movie-slide {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        /* ===== 轮播顶部渐变遮层 ===== */
        .movie-title-overlay-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            z-index: 12;
            background: linear-gradient(to bottom, 
                rgba(0, 0, 0, 0.8) 0%, 
                rgba(0, 0, 0, 0.4) 40%,
                transparent 100%
            );
            pointer-events: none;
        }
        /* =====【新增】移动端标题+缩略图底部区域遮罩 ===== */
        .movie-bottom-safe-overlay {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 220px;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            z-index: 11;
            pointer-events: none;
        }

        /* ===== 标题 - 独立在左上角 ===== */
        .movie-title-bar {
            position: absolute;
            top: 1.2rem;
            left: 2.5rem;
            z-index: 15;
            pointer-events: none;
        }

        .movie-title-bar .movie-info {
            color: #f0f0ea;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
            pointer-events: auto;
        }

        .movie-title-bar .movie-title {
            font-size: 1.5rem !important;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.1rem;
            line-height: 1.4;
        }

        .movie-title-bar .movie-date {
            display: none !important;
        }

        /* ===== 按钮 - 独立在右上角 ===== */
        .movie-actions {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
            z-index: 20;
        }

        .movie-actions .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.8px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }

        .movie-actions .btn svg {
            flex-shrink: 0;
            margin-right: 4px;
        }

        /* ===== 轮播控制按钮【默认隐藏，点击图片切换显示】 ===== */
        .movie-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 14, 18, 0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(200, 200, 200, 0.1);
            color: #e0ddd0;
            width: 3.4rem;
            height: 3.4rem;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            padding: 0;
        }
        .movie-slide.show-nav .movie-btn {
            opacity: 0.7;
            visibility: visible;
        }
        .movie-btn:hover {
            background: rgba(30, 40, 48, 0.7);
            opacity: 1;
            transform: translateY(-50%) scale(1.05);
        }
        .movie-btn svg {
            width: 1.8rem;
            height: 1.8rem;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .movie-btn.prev {
            left: 1.2rem;
        }
        .movie-btn.next {
            right: 1.2rem;
        }

        /* ===== 缩略图导航 - 在底部 ===== */
        .movie-thumbnails {
            position: absolute;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.6rem;
            padding: 0.4rem 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 240, 0.06);
            z-index: 20;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80%;
        }
        .movie-thumbnails .thumb-item {
            width: 3.4rem;
            height: 2.2rem;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s;
            opacity: 0.5;
            flex-shrink: 0;
        }
        .movie-thumbnails .thumb-item.active {
            border-color: #e8e0d0;
            opacity: 1;
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(200, 180, 140, 0.25);
        }
        .movie-thumbnails .thumb-item:hover {
            opacity: 0.9;
            transform: scale(1.04);
        }

        /* ===== 移动端样式 ===== */
        @media (max-width: 640px) {
            /* ========== 今日页面移动端 ========== */
            /* 切换显示移动端悬浮按钮 */
            #todayCard .today-overlay .today-actions-pc {
                display: none;
            }
            #todayCard .today-actions-mobile {
                display: flex;
            }
            #todayCard .today-gradient {
                height: 38%;
            }
            /* overlay贴底，内容整体向上偏移 */
            #todayCard .today-overlay {
                padding: 16px 18px 14px;
                min-height: 35%;
                bottom: 20px;
                transform: translateY(-30px);
            }
            #todayCard .today-overlay .today-title {
                font-size: 1.2rem;
            }
            #todayCard .today-overlay .today-desc {
                font-size: 0.82rem;
                line-height: 1.7;
                max-height: 30vh;
            }
            /* 移动端悬浮按钮缩小 */
            #todayCard .today-actions-mobile .btn {
                font-size: 0.5rem;
                padding: 3px 8px;
            }

            /* ========== 轮播页面移动端 ========== */
            /* 启用底部安全遮罩，保护标题和缩略图 */
            .movie-bottom-safe-overlay {
                display: block;
            }
            /* 标题移动到缩略图上方靠左 */
            .movie-title-bar {
                top: auto;
                left: 1.2rem;
                transform: none;
                bottom: calc(1.2rem + 54px);
                text-align:left;
            }
            /* 标题字体进一步缩小 */
            .movie-title-bar .movie-title {
                font-size:0.88rem !important;
            }
            /* 右上角按钮缩小 */
            .movie-actions {
                top: 0.6rem;
                right: 0.8rem;
                gap: 0.3rem;
            }
            .movie-actions .btn {
                font-size: 0.48rem;
                padding: 0.18rem 0.45rem;
            }
            /* 切换箭头缩小 */
            .movie-btn {
                width: 2.6rem;
                height: 2.6rem;
            }
            .movie-btn svg {
                width: 1.4rem;
                height: 1.4rem;
            }
            .movie-btn.prev {
                left: 0.4rem;
            }
            .movie-btn.next {
                right: 0.4rem;
            }
            /* 缩略图单行横向滚动 */
            .movie-thumbnails {
                max-width: calc(100% - 24px);
                flex-wrap: nowrap;
                overflow-x: auto;
                justify-content: flex-start;
                transform: translateX(-50%);
                bottom: 1.2rem;
                scrollbar-width:none;
            }
            .movie-thumbnails::-webkit-scrollbar {
                display:none;
            }
            .movie-thumbnails .thumb-item {
                width: 2.4rem;
                height: 1.6rem;
            }
        }

        @media (max-width: 480px) {
            #todayCard .today-gradient {
                height: 34%;
            }
            #todayCard .today-overlay {
                padding: 12px 14px 12px;
                min-height: 30%;
                bottom:10px;
                transform: translateY(-24px);
            }
            #todayCard .today-overlay .today-title {
                font-size: 1rem;
            }
            #todayCard .today-overlay .today-desc {
                font-size: 0.75rem;
                line-height: 1.6;
                max-height: 25vh;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 整屏滚动容器 ===== -->
    <div class="viewport" id="viewport">

        <!-- ===== 今日壁纸 - 全屏 ===== -->
        <section id="today" class="fullscreen-section">
            <div id="todayCard">
                <div class="loading">加载中...</div>
                <!-- 移动端悬浮右上角按钮容器（独立层级） -->
                <div class="today-actions-mobile"></div>
            </div>
        </section>

        <!-- ===== 电影感壁纸轮播（光影回顾）- 全屏 ===== -->
        <section id="movieCarouselSection" class="fullscreen-section">
            <div class="carousel-movie">
                <div class="movie-slide active" id="movieSlide" style="background-image: url('');">
                    <div class="movie-title-overlay-top"></div>
                    <!-- 新增底部保护遮罩 -->
                    <div class="movie-bottom-safe-overlay"></div>
                    
                    <div class="movie-title-bar">
                        <div class="movie-info">
                            <div class="movie-title" id="movieTitle"></div>
                            <div class="movie-date" id="movieDate"></div>
                        </div>
                    </div>
                    <div class="movie-actions" id="movieActions">
                        <a href="#" class="btn btn-primary" id="movieDownloadBtn" target="_blank"></a>
                        <a href="#" class="btn btn-secondary" id="movieViewBtn" target="_blank"></a>
                        <a href="#" class="btn btn-secondary" id="movieDetailBtn" target="_blank"></a>
                        <a href="/archive.html" class="btn btn-secondary" id="archiveBtn"></a>
                    </div>
                    <div class="movie-thumbnails" id="movieThumbnails"></div>
                    <button class="movie-btn prev" id="moviePrev">
                        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button class="movie-btn next" id="movieNext">
                        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script>
        (function() {
            "use strict";

            // ===== SVG 图标 =====
            const ICONS = {
                download: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
                book: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
                archive: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>`,
            };

            // ===== 判断移动端 =====
            function isMobileDevice() {
                return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent) || window.innerWidth <= 640;
            }

            // ===== 工具函数【区分横竖版壁纸地址】 =====
            function get1080pUrl(url) {
                if (!url) return '';
                let result = url;
                if(isMobileDevice()){
                    result = result.replace(/_UHD\.jpg/g, '_1080x1920.jpg');
                    result = result.replace(/_1920x1080\.jpg/g, '_1080x1920.jpg');
                }else{
                    result = result.replace(/_UHD\.jpg/g, '_1920x1080.jpg');
                    result = result.replace(/_UHD\.jpg\?/g, '_1920x1080.jpg?');
                }
                result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
                return result;
            }

            function get4kUrl(url) {
                if (!url) return '';
                if (url.includes('_UHD.jpg')) {
                    return url;
                }
                if(isMobileDevice()){
                    return url.replace(/_1920x1080\.jpg/g, '_1080x1920.jpg');
                }else{
                    return url.replace(/_1920x1080\.jpg/g, '_UHD.jpg');
                }
            }
            
            function get720pUrl(url) {
                if (!url) return '';
                let res = url;
                // 仅将 _UHD.jpg 替换为 _1280x720.jpg
                res = res.replace(/_UHD\.jpg/g, '_1280x720.jpg');
                return res;
            }
            
            function formatTitle(item) {
                const mainTitle = item.subtitle || '';
                const subTitle = item.title || '';
                if (mainTitle && subTitle && mainTitle !== subTitle) {
                    return `${mainTitle} | ${subTitle}`;
                }
                return mainTitle || subTitle || '壁纸';
            }

            function getDetailUrl(title, dateStr) {
                if (!dateStr) return '#';
                let cleanTitle = title.replace(/\s*[-–]\s*\d{4}\/\d{2}\/\d{2}$/, '').trim();
                const parts = dateStr.split('-');
                const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                d.setDate(d.getDate() - 1);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const dateParam = `${y}${m}${day}_1600`;
                return `https://cn.bing.com/search?q=${encodeURIComponent(cleanTitle)}&form=hpcapt&filters=HpDate:%22${dateParam}%22+mgzv3configlist:%22BingQA_Encyclopedia_Layout%22`;
            }

            function getTodayStr() {
                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            // ===== 加载今日壁纸 =====
            async function loadToday() {
                const container = document.getElementById('todayCard');
                const mobileBtnWrap = container.querySelector('.today-actions-mobile');
                try {
                    const resp = await fetch('today.json');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    
                    let item = null;
                    if (Array.isArray(data) && data.length > 0) {
                        item = data[0];
                    } else if (typeof data === 'object' && data !== null) {
                        item = data;
                    } else {
                        throw new Error('数据格式无效');
                    }

                    if (!item.date) {
                        item.date = getTodayStr();
                    }

                    const imgUrl = get1080pUrl(item.bing_url || item.url || '');
                    const title = formatTitle(item);
                    const desc = item.description || item.desc || '暂无详细介绍';

                    let descHtml = '';
                    if (desc) {
                        const paragraphs = desc.split('\n')
                            .map(p => p.trim())
                            .filter(p => p !== '');
                        descHtml = paragraphs.map(p => `<p>${p}</p>`).join('');
                    }

                    const detailUrl = getDetailUrl(item.title || item.subtitle || '', item.date);
                    const htmlPcActions = `
                        <div class="today-actions-pc">
                            <a href="${get4kUrl(item.bing_url || item.url || '')}" class="btn btn-primary" target="_blank">${ICONS.download} UHD/4K</a>
                            <a href="${get1080pUrl(item.bing_url || item.url || '')}" class="btn btn-secondary" target="_blank">${ICONS.download} 1080P</a>
                            <a href="${detailUrl}" class="btn btn-secondary" target="_blank">${ICONS.book} 光影回顾</a>
                            <a href="/archive.html" class="btn btn-secondary">${ICONS.archive} 壁纸归档</a>
                            <span class="today-scroll-hint"><span>⬇ 滚动 · 查看历史</span></span>
                        </div>
                    `;
                    // 移动端右上角悬浮按钮
                    mobileBtnWrap.innerHTML = `
                        <a href="${get4kUrl(item.bing_url || item.url || '')}" class="btn btn-primary" target="_blank">${ICONS.download} UHD/4K</a>
                        <a href="${get1080pUrl(item.bing_url || item.url || '')}" class="btn btn-secondary" target="_blank">${ICONS.download} 1080P</a>
                        <a href="${detailUrl}" class="btn btn-secondary" target="_blank">${ICONS.book} 光影回顾</a>
                        <a href="/archive.html" class="btn btn-secondary">${ICONS.archive} 壁纸归档</a>
                    `;

                    container.innerHTML = `
                        <img src="${imgUrl}" alt="${title}" loading="lazy" onerror="this.style.display='none'" />
                        <div class="today-gradient"></div>
                        <div class="today-overlay">
                            <div class="today-title">${title}</div>
                            <div class="today-desc">${descHtml || '暂无详细介绍'}</div>
                            ${htmlPcActions}
                        </div>
                        <!-- 全局共用滚动提示，PC+移动端同时显示 -->
                        <div class="global-scroll-hint today-scroll-hint">
                            <span>滚动 · 查看历史</span>
                        </div>
                        <div class="today-actions-mobile">${mobileBtnWrap.innerHTML}</div>
                    `;
                    console.log('✅ 今日壁纸加载成功:', item.date);
                } catch (e) {
                    console.warn('今日壁纸加载失败:', e);
                    container.innerHTML = `<div class="loading">⚠️ 加载失败: ${e.message}</div>`;
                }
            }

            // ===== 轮播功能 =====
            let allData = [];
            let currentIndex = 0;
            let autoPlayTimer = null;
            const AUTOPLAY_INTERVAL = 6000;
            const MAX_SLIDES = 14;

            const slide = document.getElementById('movieSlide');
            const titleEl = document.getElementById('movieTitle');
            const dateEl = document.getElementById('movieDate');
            const downloadBtn = document.getElementById('movieDownloadBtn');
            const viewBtn = document.getElementById('movieViewBtn');
            const detailBtn = document.getElementById('movieDetailBtn');
            const thumbnails = document.getElementById('movieThumbnails');
            const prevBtn = document.getElementById('moviePrev');
            const nextBtn = document.getElementById('movieNext');

            slide.addEventListener("click", function(e){
                if(!e.target.closest(".movie-btn") && !e.target.closest(".thumb-item") && !e.target.closest(".movie-actions")){
                    slide.classList.toggle("show-nav");
                }
            })

            function updateSlide(index) {
                if (!allData || allData.length === 0) return;
                const item = allData[index];
                if (!item) return;

                const imgUrl = get1080pUrl(item.bing_url || item.url || '');
                const title = item.title || '壁纸';

                slide.style.backgroundImage = `url('${imgUrl}')`;
                titleEl.textContent = title;
                dateEl.textContent = '';

                const hd4k = get4kUrl(item.bing_url || item.url || '');
                const hd1080 = get1080pUrl(item.bing_url || item.url || '');
                downloadBtn.innerHTML = `${ICONS.download} UHD/4K`;
                downloadBtn.href = hd4k;
                document.getElementById('archiveBtn').innerHTML = `${ICONS.archive} 壁纸归档`;
                viewBtn.innerHTML = `${ICONS.download} 1080P`;
                viewBtn.href = hd1080;

                const detailUrl = getDetailUrl(item.title || item.subtitle || '', item.date);
                detailBtn.innerHTML = `${ICONS.book} 光影回顾`;
                detailBtn.href = detailUrl;

                document.querySelectorAll('.thumb-item').forEach((el, i) => {
                    el.classList.toggle('active', i === index);
                });

                prevBtn.style.visibility = index === 0 ? 'hidden' : 'visible';
                nextBtn.style.visibility = index >= allData.length - 1 ? 'hidden' : 'visible';
            }

            function nextSlide() {
                if (!allData || allData.length === 0) return;
                const maxIndex = Math.min(allData.length, MAX_SLIDES) - 1;
                currentIndex = currentIndex >= maxIndex ? 0 : currentIndex + 1;
                updateSlide(currentIndex);
            }

            function prevSlide() {
                if (!allData || allData.length === 0) return;
                currentIndex = currentIndex <= 0 ? Math.min(allData.length, MAX_SLIDES) - 1 : currentIndex - 1;
                updateSlide(currentIndex);
            }

            function goToSlide(index) {
                if (!allData || allData.length === 0) return;
                const maxIndex = Math.min(allData.length, MAX_SLIDES) - 1;
                if (index < 0 || index > maxIndex) return;
                currentIndex = index;
                updateSlide(currentIndex);
                resetAutoPlay();
            }

            function resetAutoPlay() {
                if (autoPlayTimer) {
                    clearInterval(autoPlayTimer);
                    autoPlayTimer = null;
                }
                const maxIndex = Math.min(allData.length, MAX_SLIDES) - 1;
                if (maxIndex > 0) {
                    autoPlayTimer = setInterval(nextSlide, AUTOPLAY_INTERVAL);
                }
            }

            async function loadCarousel() {
                try {
                    const resp = await fetch('zh.2026.json');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error('数据为空');
                    }

                    data.sort((a, b) => {
                        const da = a.date || '';
                        const db = b.date || '';
                        return db.localeCompare(da);
                    });

                    const todayStr = getTodayStr();
                    const filteredData = data.filter(item => {
                        const date = item.date ? item.date.trim() : '';
                        return date !== todayStr;
                    });

                    allData = filteredData.slice(0, MAX_SLIDES);
                    currentIndex = 0;

                    console.log(`📅 轮播数据: ${allData.length} 条，从 ${allData[0]?.date} 开始`);

                    thumbnails.innerHTML = '';
                    allData.forEach((item, idx) => {
                        const thumb = document.createElement('div');
                        thumb.className = 'thumb-item' + (idx === 0 ? ' active' : '');
                        thumb.style.backgroundImage = `url('${get1080pUrl(item.bing_url || item.url || '')}')`;
                        thumb.title = item.title || '壁纸';
                        thumb.addEventListener('click', () => goToSlide(idx));
                        thumbnails.appendChild(thumb);
                    });

                    updateSlide(0);
                    resetAutoPlay();

                } catch (e) {
                    console.warn('轮播加载失败:', e);
                    slide.style.backgroundImage = '';
                    titleEl.textContent = '加载失败';
                }
            }

            prevBtn.addEventListener('click', () => { prevSlide(); resetAutoPlay(); });
            nextBtn.addEventListener('click', () => { nextSlide(); resetAutoPlay(); });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') { prevSlide(); resetAutoPlay(); e.preventDefault(); }
                if (e.key === 'ArrowRight') { nextSlide(); resetAutoPlay(); e.preventDefault(); }
            });

            let touchStartX = 0;
            let touchEndX = 0;
            slide.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            slide.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) { nextSlide(); resetAutoPlay(); } else { prevSlide(); resetAutoPlay(); }
                }
            }, { passive: true });

            loadToday();
            loadCarousel();
            console.log('✨ 整屏切换已启用');
        })();
    </script>
</body>
</html>
