<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>光影回顾 · Bing 每日壁纸</title>
    <meta name="description" content="每日更新的必应超清壁纸，4K 高清下载 · 光影回顾" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌅</text></svg>" />
    <style>
        /* ===== 隐藏所有滚动条 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        .viewport {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .viewport::-webkit-scrollbar {
            display: none;
        }

        .fullscreen-section {
            height: 100vh;
            width: 100vw;
            max-width: 100vw;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 今日壁纸 ===== */
        #today {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 30% 20%, #1f2a30, #0e1218);
        }

        #todayCard {
            width: 100%;
            height: 100%;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #1e232b;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #todayCard img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== 今日壁纸 - 遮层容器 ===== */
        #todayCard .today-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 28px 32px 20px;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.95) 0%, 
                rgba(0, 0, 0, 0.7) 40%,
                rgba(0, 0, 0, 0.3) 70%,
                transparent 100%
            );
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 45%;
        }

        /* ===== 标题 ===== */
        #todayCard .today-overlay .today-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        /* ===== 描述文字 ===== */
        #todayCard .today-overlay .today-desc {
            font-size: 0.95rem;
            line-height: 1.8;
            opacity: 0.92;
            white-space: normal;
            word-break: break-word;
            color: #f0f0f0;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
            max-height: 40vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        #todayCard .today-overlay .today-desc::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        #todayCard .today-overlay .today-desc p {
            text-indent: 2em;
            margin: 0;
            padding: 0;
            line-height: 1.8;
        }

        #todayCard .today-overlay .today-desc p + p {
            margin-top: 0;
        }

        /* ===== 按钮组 ===== */
        #todayCard .today-overlay .today-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            pointer-events: auto;
            position: relative;
        }

        #todayCard .today-overlay .today-actions .btn {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.8px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }

        #todayCard .today-overlay .today-actions .btn-primary {
            background: rgba(220, 210, 180, 0.15);
            border-color: rgba(240, 230, 200, 0.2);
        }
        #todayCard .today-overlay .today-actions .btn-primary:hover {
            background: rgba(220, 210, 180, 0.3);
            transform: scale(1.03);
        }
        #todayCard .today-overlay .today-actions .btn-secondary:hover {
            background: rgba(200, 200, 200, 0.15);
            transform: scale(1.02);
        }

        /* ===== 滚动提示（居中） ===== */
        #todayCard .today-overlay .today-actions .today-scroll-hint {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            white-space: nowrap;
        }

        #todayCard .today-overlay .today-actions .today-scroll-hint span {
            display: inline-block;
            animation: bobble 2.4s infinite;
        }

        @keyframes bobble {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        /* ===== 加载状态 ===== */
        .loading {
            color: #888;
            font-size: 1rem;
            text-align: center;
        }

        /* ===== 电影感轮播 ===== */
        #movieCarouselSection {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 70% 60%, #1a262e, #0b1015);
        }

        .carousel-movie {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #14191f;
        }

        .movie-slide {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        /* ===== 轮播标题 - 带渐变遮层 ===== */
        .movie-title-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            z-index: 12;
            background: linear-gradient(to bottom, 
                rgba(0, 0, 0, 0.8) 0%, 
                rgba(0, 0, 0, 0.4) 40%,
                transparent 100%
            );
            pointer-events: none;
        }

        /* ===== 标题 - 独立在左上角 ===== */
        .movie-title-bar {
            position: absolute;
            top: 1.2rem;
            left: 2.5rem;
            z-index: 15;
            pointer-events: none;
        }

        .movie-title-bar .movie-info {
            color: #f0f0ea;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
            pointer-events: auto;
        }

        .movie-title-bar .movie-title {
            font-size: 1.5rem !important;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.1rem;
            line-height: 1.4;
        }

        .movie-title-bar .movie-date {
            display: none !important;
        }

        /* ===== 按钮 - 独立在右上角 ===== */
        .movie-actions {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
            z-index: 20;
        }

        .btn {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.8px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }
        .btn-primary {
            background: rgba(220, 210, 180, 0.15);
            border-color: rgba(240, 230, 200, 0.2);
        }
        .btn-primary:hover {
            background: rgba(220, 210, 180, 0.3);
            transform: scale(1.03);
        }
        .btn-secondary:hover {
            background: rgba(200, 200, 200, 0.15);
            transform: scale(1.02);
        }

        /* ===== 轮播控制按钮 ===== */
        .movie-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 14, 18, 0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(200, 200, 200, 0.1);
            color: #e0ddd0;
            font-size: 2.2rem;
            font-weight: 200;
            width: 3.4rem;
            height: 3.4rem;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            z-index: 10;
            opacity: 0.7;
            line-height: 1;
        }
        .movie-btn:hover {
            background: rgba(30, 40, 48, 0.7);
            opacity: 1;
            transform: translateY(-50%) scale(1.05);
        }
        .movie-btn.prev {
            left: 1.2rem;
        }
        .movie-btn.next {
            right: 1.2rem;
        }

        /* ===== 缩略图导航 - 在底部 ===== */
        .movie-thumbnails {
            position: absolute;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.6rem;
            padding: 0.4rem 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 240, 0.06);
            z-index: 20;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80%;
        }
        .movie-thumbnails .thumb-item {
            width: 3.4rem;
            height: 2.2rem;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s;
            opacity: 0.5;
            flex-shrink: 0;
        }
        .movie-thumbnails .thumb-item.active {
            border-color: #e8e0d0;
            opacity: 1;
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(200, 180, 140, 0.25);
        }
        .movie-thumbnails .thumb-item:hover {
            opacity: 0.9;
            transform: scale(1.04);
        }

        /* ================================================================
                   移动端样式 (max-width: 768px)
                   ================================================================ */
        @media (max-width: 768px) {
            /* ===== 1. 图片竖版 1080x1920 ===== */
            #todayCard img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: center;
            }
            .movie-slide {
                background-size: cover !important;
                background-position: center !important;
            }

            /* ===== 2. 今日壁纸按钮移到顶部，填充整行 ===== */
            #todayCard .today-overlay {
                top: 0;
                bottom: auto;
                min-height: auto;
                padding: 14px 16px 12px;
                background: linear-gradient(to bottom, 
                    rgba(0, 0, 0, 0.85) 0%, 
                    rgba(0, 0, 0, 0.4) 60%,
                    transparent 100%
                );
                justify-content: flex-start;
            }
            #todayCard .today-overlay .today-title {
                font-size: 1rem;
                margin-bottom: 2px;
                display: none;
            }
            #todayCard .today-overlay .today-desc {
                display: none;
            }
            #todayCard .today-overlay .today-actions {
                flex-wrap: nowrap;
                gap: 4px;
                margin-top: 0;
                width: 100%;
            }
            #todayCard .today-overlay .today-actions .btn {
                font-size: 0.5rem;
                padding: 4px 6px;
                flex: 1 1 0;
                min-width: 0;
                text-align: center;
                white-space: nowrap;
                letter-spacing: 0.3px;
                border-radius: 30px;
            }
            #todayCard .today-overlay .today-actions .today-scroll-hint {
                position: relative;
                left: auto;
                transform: none;
                font-size: 0.45rem;
                color: rgba(255, 255, 255, 0.35);
                flex: 1 1 0;
                text-align: center;
                min-width: 0;
            }

            /* ===== 3. 滚动提示只在今日壁纸页底部显示 ===== */
            .scroll-hint-mobile {
                display: block !important;
            }

            /* ===== 4. 轮播页按钮移到顶部，填充整行 ===== */
            .movie-actions {
                top: 0;
                right: 0;
                left: 0;
                bottom: auto;
                padding: 8px 10px;
                gap: 4px;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border-radius: 0;
                border: none;
                box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
                flex-wrap: nowrap;
                z-index: 25;
                justify-content: center;
            }
            .movie-actions .btn {
                font-size: 0.45rem;
                padding: 4px 6px;
                flex: 1 1 0;
                min-width: 0;
                text-align: center;
                white-space: nowrap;
                letter-spacing: 0.2px;
                border-radius: 30px;
                background: rgba(200, 200, 200, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .movie-actions .btn-primary {
                background: rgba(220, 210, 180, 0.15);
                border-color: rgba(240, 230, 200, 0.15);
            }

            /* ===== 5. 缩略图底部一行显示 ===== */
            .movie-thumbnails {
                bottom: 0;
                left: 0;
                right: 0;
                transform: none;
                border-radius: 0;
                padding: 6px 8px;
                gap: 4px;
                max-width: 100%;
                width: 100%;
                justify-content: flex-start;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: none;
                overflow-x: auto;
                flex-wrap: nowrap;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            .movie-thumbnails::-webkit-scrollbar {
                display: none;
            }
            .movie-thumbnails .thumb-item {
                width: 2.8rem;
                height: 1.6rem;
                flex-shrink: 0;
                border-radius: 4px;
                min-width: 2.4rem;
            }

            /* ===== 6. 轮播标题移到缩略图上方 ===== */
            .movie-title-bar {
                top: auto;
                bottom: 4.2rem;
                left: 0;
                right: 0;
                padding: 0 12px;
                z-index: 15;
                pointer-events: none;
            }
            .movie-title-bar .movie-info {
                max-width: 100%;
                text-shadow: 0 2px 20px rgba(0, 0, 0, 0.95);
            }
            .movie-title-bar .movie-title {
                font-size: 0.85rem !important;
                font-weight: 500;
                letter-spacing: 1px;
                line-height: 1.3;
                color: #fff;
                text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9);
            }

            /* ===== 轮播顶部遮层 ===== */
            .movie-title-overlay {
                height: 50%;
                background: linear-gradient(to bottom, 
                    rgba(0, 0, 0, 0.7) 0%, 
                    rgba(0, 0, 0, 0.3) 30%,
                    transparent 60%,
                    rgba(0, 0, 0, 0.2) 80%,
                    rgba(0, 0, 0, 0.6) 100%
                );
                z-index: 11;
                pointer-events: none;
            }

            /* 底部额外遮层 */
            .movie-slide::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 35%;
                z-index: 8;
                background: linear-gradient(to top, 
                    rgba(0, 0, 0, 0.7) 0%, 
                    rgba(0, 0, 0, 0.2) 60%,
                    transparent 100%
                );
                pointer-events: none;
            }

            /* ===== 轮播控制按钮 ===== */
            .movie-btn {
                width: 2rem;
                height: 2rem;
                font-size: 1.2rem;
                background: rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(4px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .movie-btn.prev {
                left: 0.3rem;
            }
            .movie-btn.next {
                right: 0.3rem;
            }
        }

        /* ===== 小屏手机 (max-width: 480px) 微调 ===== */
        @media (max-width: 480px) {
            #todayCard .today-overlay .today-actions .btn {
                font-size: 0.4rem;
                padding: 3px 4px;
            }
            #todayCard .today-overlay .today-actions .today-scroll-hint {
                font-size: 0.4rem;
            }
            .movie-actions .btn {
                font-size: 0.4rem;
                padding: 3px 4px;
            }
            .movie-title-bar .movie-title {
                font-size: 0.75rem !important;
            }
            .movie-thumbnails .thumb-item {
                width: 2.2rem;
                height: 1.3rem;
                min-width: 1.8rem;
            }
        }

        /* ================================================================
                   电脑端样式 (min-width: 769px)
                   ================================================================ */
        @media (min-width: 769px) {
            /* ===== 轮播按钮样式和今日壁纸一致 ===== */
            .movie-actions .btn {
                font-size: 0.75rem;
                padding: 0.4rem 1.2rem;
                border-radius: 40px;
                background: rgba(200, 200, 200, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(4px);
                color: #f0ede8;
            }
            .movie-actions .btn-primary {
                background: rgba(220, 210, 180, 0.15);
                border-color: rgba(240, 230, 200, 0.2);
            }
            .movie-actions .btn-primary:hover {
                background: rgba(220, 210, 180, 0.3);
                transform: scale(1.03);
            }
            .movie-actions .btn-secondary:hover {
                background: rgba(200, 200, 200, 0.15);
                transform: scale(1.02);
            }
            .movie-actions {
                gap: 0.6rem;
            }

            /* ===== 轮播不显示当天 ===== */
            /* 由 JS 控制 */
        }
    </style>
</head>
<body>

    <!-- ===== 整屏滚动容器 ===== -->
    <div class="viewport" id="viewport">

        <!-- ===== 今日壁纸 - 全屏 ===== -->
        <section id="today" class="fullscreen-section">
            <div id="todayCard">
                <div class="loading">加载中...</div>
            </div>
        </section>

        <!-- ===== 电影感壁纸轮播（光影回顾）- 全屏 ===== -->
        <section id="movieCarouselSection" class="fullscreen-section">
            <div class="carousel-movie">
                <div class="movie-slide active" id="movieSlide" style="background-image: url('');">
                    <!-- ===== 渐变遮层（顶部） ===== -->
                    <div class="movie-title-overlay"></div>
                    
                    <div class="movie-title-bar">
                        <div class="movie-info">
                            <div class="movie-title" id="movieTitle"></div>
                            <div class="movie-date" id="movieDate"></div>
                        </div>
                    </div>
                    <div class="movie-actions" id="movieActions">
                        <a href="#" class="btn btn-primary" id="movieDownloadBtn" target="_blank">⬇️ 下载 4K</a>
                        <a href="#" class="btn btn-secondary" id="movieViewBtn" target="_blank">⬇️ 下载1080P</a>
                        <a href="#" class="btn btn-secondary" id="movieDetailBtn" target="_blank">📖 光影回顾</a>
                        <a href="/archive.html" class="btn btn-secondary">📚 壁纸归档</a>
                    </div>
                    <div class="movie-thumbnails" id="movieThumbnails"></div>
                    <button class="movie-btn prev" id="moviePrev">‹</button>
                    <button class="movie-btn next" id="movieNext">›</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        (function() {
            "use strict";

            // ===== 检测移动端 =====
            const isMobile = window.innerWidth <= 768;

            // ===== 工具函数 =====
            function get1080pUrl(url) {
                if (!url) return '';
                let result = url;
                result = result.replace(/_UHD\.jpg/g, '_1920x1080.jpg');
                result = result.replace(/_UHD\.jpg\?/g, '_1920x1080.jpg?');
                result = result.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
                if (result === url) {
                    result = url.replace(/&w=3840&h=2160&rs=1&c=4/g, '');
                }
                return result;
            }

            function getMobileUrl(url) {
                if (!url) return '';
                let result = url;
                result = result.replace(/_UHD\.jpg/g, '_1080x1920.jpg');
                result = result.replace(/_1920x1080\.jpg/g, '_1080x1920.jpg');
                if (result === url) {
                    result = url.replace(/\.jpg/g, '_1080x1920.jpg');
                }
                return result;
            }

            function get4kUrl(url) {
                if (!url) return '';
                if (url.includes('_UHD.jpg')) {
                    return url;
                }
                return url.replace(/_1920x1080\.jpg/g, '_UHD.jpg');
            }

            function formatTitle(item) {
                const mainTitle = item.subtitle || '';
                const subTitle = item.title || '';
                if (mainTitle && subTitle && mainTitle !== subTitle) {
                    return `${mainTitle} | ${subTitle}`;
                }
                return mainTitle || subTitle || '壁纸';
            }

            // ===== 生成光影回顾链接（日期减1天） =====
            function getDetailUrl(title, dateStr) {
                if (!dateStr) return '#';
                let cleanTitle = title.replace(/\s*[-–]\s*\d{4}\/\d{2}\/\d{2}$/, '').trim();
                const parts = dateStr.split('-');
                const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                d.setDate(d.getDate() - 1);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const dateParam = `${y}${m}${day}_1600`;
                return `https://cn.bing.com/search?q=${encodeURIComponent(cleanTitle)}&form=hpcapt&filters=HpDate:%22${dateParam}%22+mgzv3configlist:%22BingQA_Encyclopedia_Layout%22`;
            }

            // ===== 获取今日日期字符串 =====
            function getTodayStr() {
                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            // ===== 加载今日壁纸 =====
            async function loadToday() {
                const container = document.getElementById('todayCard');
                try {
                    const resp = await fetch('zh.2026.json');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error('数据为空');
                    }

                    const item = data[0];
                    const imgUrl = isMobile ? getMobileUrl(item.bing_url || '') : get1080pUrl(item.bing_url || '');
                    const title = formatTitle(item);
                    const desc = item.description || '暂无详细介绍';

                    let descHtml = '';
                    if (desc) {
                        const paragraphs = desc.split('\n')
                            .map(p => p.trim())
                            .filter(p => p !== '');
                        descHtml = paragraphs.map(p => `<p>${p}</p>`).join('');
                    }

                    const detailUrl = getDetailUrl(item.title || item.subtitle || '', item.date);

                    container.innerHTML = `
                        <img src="${imgUrl}" alt="${title}" loading="lazy" onerror="this.style.display='none'" />
                        <div class="today-overlay">
                            <div class="today-title">${title}</div>
                            <div class="today-desc">${descHtml || '暂无详细介绍'}</div>
                            <div class="today-actions">
                                <a href="${get4kUrl(item.bing_url || '')}" class="btn btn-primary" target="_blank">⬇️ 4K</a>
                                <a href="${isMobile ? getMobileUrl(item.bing_url || '') : get1080pUrl(item.bing_url || '')}" class="btn btn-secondary" target="_blank">⬇️ 1080P</a>
                                <a href="${detailUrl}" class="btn btn-secondary" target="_blank">📖 光影回顾</a>
                                <a href="/archive.html" class="btn btn-secondary">📚 壁纸归档</a>
                                <span class="today-scroll-hint"><span>⬇ 滚动 · 整屏切换</span></span>
                            </div>
                        </div>
                    `;
                } catch (e) {
                    console.warn('今日壁纸加载失败:', e);
                    container.innerHTML = `<div class="loading">⚠️ 加载失败，请刷新</div>`;
                }
            }

            // ===== 轮播功能 =====
            let allData = [];
            let currentIndex = 0;
            let autoPlayTimer = null;
            const AUTOPLAY_INTERVAL = 6000;
            const MAX_SLIDES = 14;

            const slide = document.getElementById('movieSlide');
            const titleEl = document.getElementById('movieTitle');
            const dateEl = document.getElementById('movieDate');
            const downloadBtn = document.getElementById('movieDownloadBtn');
            const viewBtn = document.getElementById('movieViewBtn');
            const detailBtn = document.getElementById('movieDetailBtn');
            const thumbnails = document.getElementById('movieThumbnails');
            const prevBtn = document.getElementById('moviePrev');
            const nextBtn = document.getElementById('movieNext');

            function updateSlide(index) {
                if (!allData || allData.length === 0) return;
                const item = allData[index];
                if (!item) return;

                const imgUrl = isMobile ? getMobileUrl(item.bing_url || '') : get1080pUrl(item.bing_url || '');
                const title = item.subtitle || item.title || '壁纸';

                slide.style.backgroundImage = `url('${imgUrl}')`;
                titleEl.textContent = title;
                dateEl.textContent = '';

                const hd4k = get4kUrl(item.bing_url || '');
                const hd1080 = isMobile ? getMobileUrl(item.bing_url || '') : get1080pUrl(item.bing_url || '');
                downloadBtn.href = hd4k;
                viewBtn.href = hd1080;

                const detailUrl = getDetailUrl(item.title || item.subtitle || '', item.date);
                detailBtn.href = detailUrl;

                document.querySelectorAll('.thumb-item').forEach((el, i) => {
                    el.classList.toggle('active', i === index);
                });

                prevBtn.style.visibility = index === 0 ? 'hidden' : 'visible';
                nextBtn.style.visibility = index >= allData.length - 1 ? 'hidden' : 'visible';
            }

            function nextSlide() {
                if (!allData || allData.length === 0) return;
                const maxIndex = Math.min(allData.length, MAX_SLIDES) - 1;
                currentIndex = currentIndex >= maxIndex ? 0 : currentIndex + 1;
                updateSlide(currentIndex);
            }

            function prevSlide() {
                if (!allData || allData.length === 0) return;
                currentIndex = currentIndex <= 0 ? Math.min(allData.length, MAX_SLIDES) - 1 : currentIndex - 1;
                updateSlide(currentIndex);
            }

            function goToSlide(index) {
                if (!allData || allData.length === 0) return;
                const maxIndex = Math.min(allData.length, MAX_SLIDES) - 1;
                if (index < 0 || index > maxIndex) return;
                currentIndex = index;
                updateSlide(currentIndex);
                resetAutoPlay();
            }

            function resetAutoPlay() {
                if (autoPlayTimer) {
                    clearInterval(autoPlayTimer);
                    autoPlayTimer = null;
                }
                const maxIndex = Math.min(allData.length, MAX_SLIDES) - 1;
                if (maxIndex > 0) {
                    autoPlayTimer = setInterval(nextSlide, AUTOPLAY_INTERVAL);
                }
            }

            async function loadCarousel() {
                try {
                    const resp = await fetch('zh.2026.json');
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error('数据为空');
                    }

                    // ===== 电脑端：过滤掉今天的数据 =====
                    let filteredData = data;
                    if (!isMobile) {
                        const todayStr = getTodayStr();
                        filteredData = data.filter(item => {
                            const date = item.date ? item.date.trim() : '';
                            return date !== todayStr;
                        });
                        if (filteredData.length === 0) {
                            filteredData = data.slice(1); // 如果没有昨天的，取第二条
                        }
                    }

                    allData = filteredData.slice(0, MAX_SLIDES);
                    currentIndex = 0;

                    thumbnails.innerHTML = '';
                    allData.forEach((item, idx) => {
                        const thumb = document.createElement('div');
                        thumb.className = 'thumb-item' + (idx === 0 ? ' active' : '');
                        const thumbUrl = isMobile ? getMobileUrl(item.bing_url || '') : get1080pUrl(item.bing_url || '');
                        thumb.style.backgroundImage = `url('${thumbUrl}')`;
                        thumb.title = item.title || '壁纸';
                        thumb.addEventListener('click', () => goToSlide(idx));
                        thumbnails.appendChild(thumb);
                    });

                    if (allData.length > 0) {
                        updateSlide(0);
                        resetAutoPlay();
                    } else {
                        slide.style.backgroundImage = '';
                        titleEl.textContent = '暂无壁纸';
                    }
                } catch (e) {
                    console.warn('轮播加载失败:', e);
                    slide.style.backgroundImage = '';
                    titleEl.textContent = '加载失败';
                }
            }

            // ===== 事件绑定 =====
            prevBtn.addEventListener('click', () => { prevSlide();
                resetAutoPlay(); });
            nextBtn.addEventListener('click', () => { nextSlide();
                resetAutoPlay(); });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') { prevSlide();
                    resetAutoPlay();
                    e.preventDefault(); }
                if (e.key === 'ArrowRight') { nextSlide();
                    resetAutoPlay();
                    e.preventDefault(); }
            });

            let touchStartX = 0;
            let touchEndX = 0;
            const carouselEl = document.querySelector('.carousel-movie');
            if (carouselEl) {
                carouselEl.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                carouselEl.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    const diff = touchStartX - touchEndX;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) { nextSlide();
                            resetAutoPlay(); } else { prevSlide();
                            resetAutoPlay(); }
                    }
                }, { passive: true });
            }

            // ===== 滚动提示控制（仅今日壁纸页显示） =====
            const viewport = document.getElementById('viewport');
            const carouselSection = document.getElementById('movieCarouselSection');

            function updateScrollHint() {
                if (!carouselSection) return;
                const rect = carouselSection.getBoundingClientRect();
                const isCarouselVisible = rect.top < window.innerHeight * 0.5 && rect.bottom > 0;
                const hintEl = document.querySelector('.today-scroll-hint');
                if (hintEl) {
                    hintEl.style.display = isCarouselVisible ? 'none' : 'inline-block';
                }
            }

            if (viewport) {
                viewport.addEventListener('scroll', updateScrollHint);
                viewport.addEventListener('resize', updateScrollHint);
                setTimeout(updateScrollHint, 500);
            }

            // ===== 初始化 =====
            loadToday();
            loadCarousel();

            console.log('✨ 整屏切换已启用' + (isMobile ? ' · 移动端模式' : ' · 电脑端模式'));
        })();
    </script>
</body>
</html>
