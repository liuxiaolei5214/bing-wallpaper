<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bing 每日壁纸 · 4K</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌅</text></svg>" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>🌅 Bing 每日壁纸</h1>
            <p>每日更新 · 4K 超清 · 免费下载</p>
            <div id="currentTime" class="time-display"></div>
        </div>
    </header>

    <main>
        <!-- 今日壁纸 -->
        <section id="today">
            <h2>📸 今日壁纸</h2>
            <div id="todayCard">
                <div class="loading">加载中...</div>
            </div>
        </section>

        <!-- ===== 轮播区域 ===== -->
        <section id="carouselSection">
            <h2>🔄 历史壁纸 · 回顾</h2>
            <div class="carousel-container">
                <button class="carousel-btn prev" id="carouselPrev">‹</button>
                <div class="carousel-track-wrapper">
                    <div class="carousel-track" id="carouselTrack">
                        <div class="loading">加载历史壁纸中...</div>
                    </div>
                </div>
                <button class="carousel-btn next" id="carouselNext">›</button>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
        </section>

        <!-- 历史壁纸网格 -->
        <section id="history">
            <h2>📚 历史壁纸</h2>
            <div id="historyGrid">
                <div class="loading">加载中...</div>
            </div>
        </section>
    </main>

    <footer>
        <p>数据来源：Bing 每日壁纸 · 自动更新 · 仅供个人欣赏</p>
        <p class="footer-small">Powered by GitHub Pages</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
