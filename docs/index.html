<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>光影回顾 · Bing 每日壁纸</title>
    <meta name="description" content="每日更新的必应超清壁纸，4K 高清下载 · 光影回顾" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌅</text></svg>" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== 隐藏所有滚动条 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        .viewport {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .viewport::-webkit-scrollbar {
            display: none;
        }

        .fullscreen-section {
            height: 100vh;
            width: 100vw;
            max-width: 100vw;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 今日壁纸 ===== */
        #today {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 30% 20%, #1f2a30, #0e1218);
        }

        #todayCard {
            width: 100%;
            height: 100%;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #1e232b;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #todayCard img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== 电影感轮播 ===== */
        #movieCarouselSection {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 70% 60%, #1a262e, #0b1015);
        }

        .carousel-movie {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #14191f;
        }

        .movie-slide {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        /* ===== 标题 - 独立在左上角 ===== */
        .movie-title-bar {
            position: absolute;
            top: 1.2rem;
            left: 2.5rem;
            z-index: 15;
            pointer-events: none;
        }

        .movie-title-bar .movie-info {
            color: #f0f0ea;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
            pointer-events: auto;
        }

        .movie-title-bar .movie-title {
            font-size: 1.5rem !important;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.1rem;
            line-height: 1.4;
        }

        .movie-title-bar .movie-date {
            font-size: clamp(0.7rem, 1vw, 0.9rem);
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* ===== 按钮 - 独立在右上角 ===== */
        .movie-actions {
            position: absolute;
            top: 1.2rem;
            right: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 240, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 20;
            pointer-events: auto;
        }

        .btn {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.8px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }
        .btn-primary {
            background: rgba(220, 210, 180, 0.15);
            border-color: rgba(240, 230, 200, 0.2);
        }
        .btn-primary:hover {
            background: rgba(220, 210, 180, 0.3);
            transform: scale(1.03);
        }
        .btn-secondary:hover {
            background: rgba(200, 200, 200, 0.15);
            transform: scale(1.02);
        }

        /* ===== 轮播控制按钮 ===== */
        .movie-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 14, 18, 0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(200, 200, 200, 0.1);
            color: #e0ddd0;
            font-size: 2.2rem;
            font-weight: 200;
            width: 3.4rem;
            height: 3.4rem;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            z-index: 10;
            opacity: 0.7;
            line-height: 1;
        }
        .movie-btn:hover {
            background: rgba(30, 40, 48, 0.7);
            opacity: 1;
            transform: translateY(-50%) scale(1.05);
        }
        .movie-btn.prev {
            left: 1.2rem;
        }
        .movie-btn.next {
            right: 1.2rem;
        }

        /* ===== 缩略图导航 - 在底部 ===== */
        .movie-thumbnails {
            position: absolute;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.6rem;
            padding: 0.4rem 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 240, 0.06);
            z-index: 20;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80%;
        }
        .movie-thumbnails .thumb-item {
            width: 3.4rem;
            height: 2.2rem;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s;
            opacity: 0.5;
            flex-shrink: 0;
        }
        .movie-thumbnails .thumb-item.active {
            border-color: #e8e0d0;
            opacity: 1;
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(200, 180, 140, 0.25);
        }
        .movie-thumbnails .thumb-item:hover {
            opacity: 0.9;
            transform: scale(1.04);
        }

        /* ===== 底部滚动指示 - 仅今日壁纸页显示 ===== */
        .scroll-hint {
            position: fixed;
            bottom: 1.8rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 18, 24, 0.5);
            backdrop-filter: blur(6px);
            padding: 0.3rem 1.6rem;
            border-radius: 60px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #b0c0c8;
            border: 1px solid rgba(180, 190, 180, 0.08);
            z-index: 30;
            pointer-events: none;
            white-space: nowrap;
            opacity: 0.6;
            transition: opacity 0.5s;
        }
        .scroll-hint span {
            display: inline-block;
            animation: bobble 2.4s infinite;
        }
        @keyframes bobble {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        /* ===== 响应式（仅移动端） ===== */
        @media (max-width: 768px) {
            /* ===== 1. 今日壁纸图片强制竖版 1080x1920 ===== */
            #todayCard img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: center;
            }

            /* ===== 2. 今日壁纸按钮：一行显示，自动适配大小 ===== */
            #todayCard .actions .btn-group {
                display: flex;
                flex-wrap: nowrap;
                gap: 0.3rem;
                justify-content: center;
                width: 100%;
            }
            #todayCard .actions .btn-group .btn {
                font-size: 0.5rem;
                padding: 0.25rem 0.5rem;
                flex: 1 1 auto;
                min-width: 0;
                text-align: center;
                white-space: nowrap;
                letter-spacing: 0.3px;
            }

            /* 今日壁纸左下角按钮位置 */
            #todayCard .actions {
                bottom: 4.5rem !important;
                left: 0.8rem !important;
                right: 0.8rem !important;
                width: auto !important;
            }

            /* ===== 3. 轮播页标题：移到缩略图上方 ===== */
            .movie-title-bar {
                top: auto;
                bottom: 5.5rem;
                left: 1.2rem;
                right: 1.2rem;
                max-width: 100%;
                z-index: 15;
            }
            .movie-title-bar .movie-info {
                max-width: 100%;
            }
            .movie-title-bar .movie-title {
                font-size: 0.9rem !important;
                line-height: 1.3;
            }
            .movie-title-bar .movie-date {
                font-size: 0.65rem;
            }

            /* ===== 4. 轮播页按钮：右上角，使用和今日壁纸一样的样式 ===== */
            .movie-actions {
                position: absolute;
                top: 0.8rem;
                right: 0.8rem;
                bottom: auto;
                left: auto;
                display: flex;
                flex-wrap: nowrap;
                gap: 0.2rem;
                align-items: center;
                background: rgba(0, 0, 0, 0.55);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                padding: 0.25rem 0.6rem;
                border-radius: 40px;
                border: 1px solid rgba(255, 255, 240, 0.08);
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
                z-index: 25;
                pointer-events: auto;
            }
            .movie-actions .btn {
                font-size: 0.4rem;
                padding: 0.12rem 0.35rem;
                white-space: nowrap;
                letter-spacing: 0.2px;
                border-radius: 30px;
                flex: 1 1 auto;
                min-width: 0;
                text-align: center;
            }
            .movie-actions .btn-primary {
                font-size: 0.4rem;
                padding: 0.12rem 0.35rem;
            }
            .movie-actions .btn-secondary {
                font-size: 0.4rem;
                padding: 0.12rem 0.35rem;
            }

            /* ===== 5. 缩略图强制一行，左右到头 ===== */
            .movie-thumbnails {
                bottom: 0;
                left: 0;
                right: 0;
                transform: none;
                border-radius: 0;
                padding: 0.25rem 0.5rem;
                gap: 0.25rem;
                max-width: 100%;
                width: 100%;
                justify-content: flex-start;
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: none;
                overflow-x: auto;
                flex-wrap: nowrap;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            .movie-thumbnails::-webkit-scrollbar {
                display: none;
            }
            .movie-thumbnails .thumb-item {
                width: 2.6rem;
                height: 1.5rem;
                flex-shrink: 0;
                border-radius: 4px;
            }

            /* ===== 轮播控制按钮 ===== */
            .movie-btn {
                width: 2rem;
                height: 2rem;
                font-size: 1.2rem;
            }
            .movie-btn.prev {
                left: 0.2rem;
            }
            .movie-btn.next {
                right: 0.2rem;
            }

            /* ===== 底部滚动提示 ===== */
            .scroll-hint {
                bottom: 0.8rem;
                font-size: 0.45rem;
                padding: 0.2rem 0.8rem;
                opacity: 0.4;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 整屏滚动容器 ===== -->
    <div class="viewport" id="viewport">

        <!-- ===== 今日壁纸 - 全屏 ===== -->
        <section id="today" class="fullscreen-section">
            <div id="todayCard">
                <div class="loading">加载中...</div>
            </div>
        </section>

        <!-- ===== 电影感壁纸轮播（光影回顾）- 全屏 ===== -->
        <section id="movieCarouselSection" class="fullscreen-section">
            <div class="carousel-movie">
                <div class="movie-slide active" id="movieSlide" style="background-image: url('');">
                    <!-- 标题 - 独立在左上角 -->
                    <div class="movie-title-bar">
                        <div class="movie-info">
                            <div class="movie-title" id="movieTitle"></div>
                            <div class="movie-date" id="movieDate"></div>
                        </div>
                    </div>
                    <!-- 按钮 - 独立在右上角 -->
                    <div class="movie-actions" id="movieActions" style="display:flex !important; opacity:1 !important; visibility:visible !important;">
                        <a href="#" class="btn btn-primary" id="movieDownloadBtn" target="_blank">⬇️ 4K</a>
                        <a href="#" class="btn btn-secondary" id="movieViewBtn" target="_blank">⬇️ 1080P</a>
                        <a href="#" class="btn btn-secondary" id="movieDetailBtn" target="_blank">📖 回顾</a>
                        <a href="/archive.html" class="btn btn-secondary">📚 归档</a>
                    </div>
                    <!-- 缩略图 -->
                    <div class="movie-thumbnails" id="movieThumbnails"></div>
                    <button class="movie-btn prev" id="moviePrev">‹</button>
                    <button class="movie-btn next" id="movieNext">›</button>
                </div>
            </div>
        </section>
    </div>

    <!-- 底部提示 -->
    <div class="scroll-hint"><span>⬇ 滚动 · 整屏切换</span></div>

    <script src="js/main.js"></script>
    <script>
        (function() {
            "use strict";

            // ===== 检测移动端，强制使用 1080x1920 竖版图片 =====
            const isMobile = window.innerWidth <= 768;

            // 保存原始 updateMovieSlide 引用
            const originalUpdate = window.updateMovieSlide;

            // 重写 updateMovieSlide 以支持移动端竖版
            const originalUpdateMovieSlide = window.updateMovieSlide;
            if (typeof updateMovieSlide === 'function') {
                const origFunc = updateMovieSlide;
                updateMovieSlide = function(data) {
                    // 调用原函数
                    origFunc(data);

                    // 移动端强制使用 1080x1920
                    if (isMobile && data && data.bing_url) {
                        const slide = document.getElementById('movieSlide');
                        if (slide) {
                            let mobileUrl = data.bing_url || '';
                            // 替换为 1080x1920 竖版
                            mobileUrl = mobileUrl.replace(/_UHD\.jpg/g, '_1080x1920.jpg');
                            mobileUrl = mobileUrl.replace(/_1920x1080\.jpg/g, '_1080x1920.jpg');
                            // 如果替换后和原来一样，尝试直接添加
                            if (mobileUrl === data.bing_url) {
                                mobileUrl = data.bing_url.replace(/\.jpg/g, '_1080x1920.jpg');
                            }
                            slide.style.backgroundImage = `url('${mobileUrl}')`;
                            console.log('📱 移动端使用竖版图片:', mobileUrl);
                        }
                    }
                };
                // 挂载到全局
                window.updateMovieSlide = updateMovieSlide;
            }

            // ===== 滚动指示器交互 - 轮播页隐藏 =====
            const hint = document.querySelector('.scroll-hint');
            const viewport = document.getElementById('viewport');
            const carouselSection = document.getElementById('movieCarouselSection');
            let hintTimeout;

            function updateHintVisibility() {
                if (!hint || !carouselSection) return;
                const rect = carouselSection.getBoundingClientRect();
                const isCarouselVisible = rect.top < window.innerHeight * 0.5 && rect.bottom > 0;
                // 轮播页可见时隐藏提示
                if (isCarouselVisible) {
                    hint.style.opacity = '0';
                    hint.style.pointerEvents = 'none';
                } else {
                    hint.style.opacity = '0.6';
                    hint.style.pointerEvents = 'none';
                }
            }

            if (hint && viewport) {
                viewport.addEventListener('scroll', function() {
                    // 滚动指示器淡出效果
                    hint.style.opacity = '0.15';
                    clearTimeout(hintTimeout);
                    hintTimeout = setTimeout(() => {
                        updateHintVisibility();
                    }, 300);
                });

                // 初始检测
                setTimeout(updateHintVisibility, 500);
            }

            // 窗口大小变化时重新检测
            window.addEventListener('resize', updateHintVisibility);

            // ===== 强制显示按钮容器 =====
            const actionsContainer = document.getElementById('movieActions');
            if (actionsContainer) {
                actionsContainer.style.display = 'flex';
                actionsContainer.style.opacity = '1';
                actionsContainer.style.visibility = 'visible';
                actionsContainer.style.pointerEvents = 'auto';
            }

            console.log('✨ 整屏切换已启用 · 轮播页自动隐藏滚动提示');
        })();
    </script>
</body>
</html>
