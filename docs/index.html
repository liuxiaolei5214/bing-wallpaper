<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>光影回顾 · Bing 每日壁纸</title>
    <meta name="description" content="每日更新的必应超清壁纸，4K 高清下载 · 光影回顾" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌅</text></svg>" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== 隐藏所有滚动条 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        .viewport {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .viewport::-webkit-scrollbar {
            display: none;
        }

        .fullscreen-section {
            height: 100vh;
            width: 100vw;
            max-width: 100vw;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 今日壁纸 ===== */
        #today {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 30% 20%, #1f2a30, #0e1218);
        }

        #todayCard {
            width: 100%;
            height: 100%;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #1e232b;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #todayCard img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== 电影感轮播 ===== */
        #movieCarouselSection {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            background: radial-gradient(circle at 70% 60%, #1a262e, #0b1015);
        }

        .carousel-movie {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #14191f;
        }

        .movie-slide {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        .movie-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.7) 10%, rgba(0, 0, 0, 0.1) 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem 2.5rem;
        }

        /* ===== 文字信息 - 在缩略图上方 ===== */
        .movie-info-wrapper {
            position: absolute;
            bottom: 5.5rem;
            left: 0;
            right: 0;
            padding: 0 2.5rem;
            z-index: 15;
            pointer-events: none;
        }

        .movie-info {
            color: #f0f0ea;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
            pointer-events: auto;
        }
        .movie-title {
            font-size: clamp(1.2rem, 2.8vw, 2.2rem);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.1rem;
            line-height: 1.4;
        }
        .movie-date {
            font-size: clamp(0.7rem, 1vw, 0.9rem);
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* ===== 按钮固定在右上角 ===== */
        .movie-actions {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 240, 0.08);
            z-index: 50;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .btn {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.8px;
            text-decoration: none;
            color: #f0ede8;
            background: rgba(200, 200, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            white-space: nowrap;
        }
        .btn-primary {
            background: rgba(220, 210, 180, 0.15);
            border-color: rgba(240, 230, 200, 0.2);
        }
        .btn-primary:hover {
            background: rgba(220, 210, 180, 0.3);
            transform: scale(1.03);
        }
        .btn-secondary:hover {
            background: rgba(200, 200, 200, 0.15);
            transform: scale(1.02);
        }

        /* ===== 轮播控制按钮 ===== */
        .movie-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 14, 18, 0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(200, 200, 200, 0.1);
            color: #e0ddd0;
            font-size: 2.2rem;
            font-weight: 200;
            width: 3.4rem;
            height: 3.4rem;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            z-index: 10;
            opacity: 0.7;
            line-height: 1;
        }
        .movie-btn:hover {
            background: rgba(30, 40, 48, 0.7);
            opacity: 1;
            transform: translateY(-50%) scale(1.05);
        }
        .movie-btn.prev {
            left: 1.2rem;
        }
        .movie-btn.next {
            right: 1.2rem;
        }

        /* ===== 缩略图导航 - 在底部 ===== */
        .movie-thumbnails {
            position: absolute;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.6rem;
            padding: 0.4rem 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 240, 0.06);
            z-index: 20;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80%;
        }
        .movie-thumbnails .thumb-item {
            width: 3.4rem;
            height: 2.2rem;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s;
            opacity: 0.5;
            flex-shrink: 0;
        }
        .movie-thumbnails .thumb-item.active {
            border-color: #e8e0d0;
            opacity: 1;
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(200, 180, 140, 0.25);
        }
        .movie-thumbnails .thumb-item:hover {
            opacity: 0.9;
            transform: scale(1.04);
        }

        /* ===== 底部滚动指示 ===== */
        .scroll-hint {
            position: fixed;
            bottom: 1.8rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 18, 24, 0.5);
            backdrop-filter: blur(6px);
            padding: 0.3rem 1.6rem;
            border-radius: 60px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #b0c0c8;
            border: 1px solid rgba(180, 190, 180, 0.08);
            z-index: 30;
            pointer-events: none;
            white-space: nowrap;
            opacity: 0.6;
            transition: opacity 0.5s;
        }
        .scroll-hint span {
            display: inline-block;
            animation: bobble 2.4s infinite;
        }
        @keyframes bobble {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .movie-info-wrapper {
                bottom: 4.5rem;
                padding: 0 1.2rem;
            }
            .movie-actions {
                top: 0.6rem;
                right: 0.6rem;
                padding: 0.4rem 0.8rem;
                gap: 0.3rem;
                border-radius: 40px;
            }
            .btn {
                font-size: 0.55rem;
                padding: 0.2rem 0.6rem;
            }
            .movie-btn {
                width: 2.6rem;
                height: 2.6rem;
                font-size: 1.8rem;
            }
            .movie-btn.prev {
                left: 0.4rem;
            }
            .movie-btn.next {
                right: 0.4rem;
            }
            .movie-thumbnails .thumb-item {
                width: 2.4rem;
                height: 1.6rem;
            }
            .movie-thumbnails {
                gap: 0.3rem;
                padding: 0.3rem 0.6rem;
                bottom: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 整屏滚动容器 ===== -->
    <div class="viewport" id="viewport">

        <!-- ===== 今日壁纸 - 全屏 ===== -->
        <section id="today" class="fullscreen-section">
            <div id="todayCard">
                <div class="loading">加载中...</div>
            </div>
        </section>

        <!-- ===== 电影感壁纸轮播（光影回顾）- 全屏 ===== -->
        <section id="movieCarouselSection" class="fullscreen-section">
            <div class="carousel-movie">
                <div class="movie-slide active" id="movieSlide" style="background-image: url('');">
                    <!-- 文字信息 - 独立在缩略图上方 -->
                    <div class="movie-info-wrapper">
                        <div class="movie-info">
                            <div class="movie-title" id="movieTitle"></div>
                            <div class="movie-date" id="movieDate"></div>
                        </div>
                    </div>
                    <!-- 缩略图 -->
                    <div class="movie-thumbnails" id="movieThumbnails"></div>
                    <button class="movie-btn prev" id="moviePrev">‹</button>
                    <button class="movie-btn next" id="movieNext">›</button>
                </div>
            </div>
        </section>
    </div>

    <!-- ===== 按钮固定在右上角 ===== -->
    <div class="movie-actions" id="movieActions">
        <a href="#" class="btn btn-primary" id="movieDownloadBtn" target="_blank">⬇️ 下载 4K</a>
        <a href="#" class="btn btn-secondary" id="movieViewBtn" target="_blank">🖼️ 查看原图</a>
        <a href="#" class="btn btn-secondary" id="movieDetailBtn" target="_blank">📖 光影回顾</a>
        <a href="/archive.html" class="btn btn-secondary">📚 壁纸归档</a>
    </div>

    <!-- 底部提示 -->
    <div class="scroll-hint"><span>⬇ 滚动 · 整屏切换</span></div>

    <script src="js/main.js"></script>
    <script>
        (function() {
            "use strict";

            // ===== 滚动指示器交互 =====
            const hint = document.querySelector('.scroll-hint');
            const viewport = document.getElementById('viewport');
            let hintTimeout;

            if (hint && viewport) {
                viewport.addEventListener('scroll', function() {
                    hint.style.opacity = '0.15';
                    clearTimeout(hintTimeout);
                    hintTimeout = setTimeout(() => {
                        const sections = document.querySelectorAll('.fullscreen-section');
                        const lastSection = sections[sections.length - 1];
                        if (lastSection) {
                            const rect = lastSection.getBoundingClientRect();
                            if (rect.top < window.innerHeight && rect.bottom > 0) {
                                hint.style.opacity = '0.1';
                            } else {
                                hint.style.opacity = '0.6';
                            }
                        } else {
                            hint.style.opacity = '0.6';
                        }
                    }, 1000);
                });

                setTimeout(() => {
                    hint.style.opacity = '0.6';
                }, 300);
            }

            console.log('✨ 整屏切换已启用 · 文字在缩略图上方');
        })();
    </script>
</body>
</html>
